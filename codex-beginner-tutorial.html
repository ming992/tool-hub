# Codex 保姆级入门使用教程\\(小白到高手版\\)

## 前言:这本知识库该怎么读



先说一句大实话:网上关于 Codex 的教程,十篇里有八篇是互相抄的,要么只教你 \`npm install\` 一行命令就完事,要么上来就是一堆 config\\.toml 字段让你照抄,你抄完报错了也不知道为什么。这本知识库不想这样。



我自己的习惯是,工具要先搞清楚"它是干嘛的、为什么这么设计",再去记命令。因为命令会变\\(Codex 这半年版本号从 0\\.4 蹦到 0\\.13,菜单都改过好几次\\),但设计思路不太变。所以这本书的结构是这样安排的:



第一部分\\(第 1\\~5 章\\)讲认知,搞清楚 Codex 到底是个什么东西,跟你以前用过的 Copilot、Cursor 有啥不一样。这部分没有命令,但是最值钱,看懂了你后面少走一半弯路。



第二部分\\(第 6\\~10 章\\)专门解决国内用户的账号和网络问题。这是中国人用 Codex 最大的门槛,比安装本身难十倍。我会把订阅、付款、网络、中转 API 这几条路都讲清楚,你按自己情况选一条走。



第三部分\\(第 11\\~17 章\\)是真正的"动手装"。Windows、Mac、Linux、WSL2 四种环境分开讲,装完跑通第一个任务,最后给你一份高频报错排查清单。



第四到第八部分\\(第 18\\~45 章\\)是配置和进阶:config\\.toml 怎么调、斜杠命令怎么用、沙箱权限怎么管、AGENTS\\.md 怎么写、MCP 和 Skills 怎么玩。



第九部分\\(第 46\\~50 章\\)是五个完整实战案例,从读懂陌生项目到搭全栈应用再到团队落地,每个案例都是从头跟到尾的。



读的时候有个建议:如果你是纯小白,老老实实从第 1 章往后看;如果你已经会用命令行、只是想快速上手,可以直接跳到第 11 章开始装,装完回头补第 1\\~5 章的认知;如果你已经在用 Codex、只想解决某个具体问题,直接看目录定位章节。



最后提醒一句:Codex 是个迭代极快的工具,模型名\\(GPT\\-5\\-Codex 系列\\)、菜单项、个别参数随时可能变。所以本书所有命令我都会告诉你"怎么验证它在你这台机器上还成立"——比如 \`codex --version\`、\`codex --help\`、官方文档地址,而不是让你死记。工具会变,排查方法不会变,这才是保姆级该教的东西。



好,开始。

# 第一部分:先把 Codex 是什么搞明白



## 第 1 章 Codex 到底是什么:从"代码补全"到"AI 编程智能体"



很多人第一次听到 Codex,脑子里冒出来的是 2021 年那个给 GitHub Copilot 当后台的"Codex 模型"。我先把这个误会澄清掉:那个老 Codex 模型的 API 已经在 2023 年正式退役了。今天我们说的 Codex,是 OpenAI 在 2025 到 2026 年推出的一套全新东西,核心是一个叫 **Codex CLI** 的终端编程智能体\\(agent\\)。它是开源的,用 Rust 写的,采用 Apache\\-2\\.0 协议,在 GitHub 上的 star 数已经冲到八万多。名字一样,但完全是两回事。



那"AI 编程智能体"和你熟悉的代码补全有什么区别?这是理解 Codex 的钥匙,我用一个生活化的比喻讲清楚。



代码补全工具\\(比如早期的 Copilot 行内补全\\)像是一个站在你身后的实习生,你打字打到一半,它猜你下一行想写什么,弹个灰色提示让你按 Tab 接受。它的能力边界很清楚:它只能"建议",不能"动手"。它看不到你整个项目的结构,不会去读你另外十个文件,更不会自己跑命令、自己改文件、自己运行测试看通没通过。



Codex 不一样。你给它一句话,比如"帮这个项目的登录接口加上 JWT 鉴权,然后接上 MySQL,改完跑一遍测试",它会真的去做这一整串事:先进你的项目目录,把相关文件读一遍搞清楚现状,然后动手改代码,改完之后它自己在终端里敲命令把测试跑起来,测试挂了它还能看报错继续改。整个过程它是"自主的"——会自己把一个大任务拆成好几步,一步步执行,遇到拿不准要不要执行的危险操作\\(比如删文件、装依赖\\)才停下来问你一句"我要这么干,行不行"。



所以一句话概括:**代码补全是"建议下一行",Codex 是"替你干完整件事"**。前者是辅助打字,后者是一个能进项目、读文件、执行命令、自主完成多步任务的开发搭子。



这个差别带来的体验跳跃非常大。举个我自己常遇到的场景:接手一个别人写的、文档几乎没有的老项目。以前我得花大半天点开一个个文件去理解它的结构。现在我直接在项目根目录启动 Codex,丢一句"这个项目是干嘛的,核心模块有哪些,数据是怎么流转的,用通俗的话给我讲一遍",它会自己把项目扫一遍,然后给我一份相当靠谱的导读。这件事代码补全工具是做不到的,因为它根本不会"主动去读你的整个仓库"。



要把这个能力跑起来,Codex 依赖两样东西:一个是足够强的大模型\\(目前是 GPT\\-5\\-Codex 这一系列,专门为编程和工具调用训练过的\\),另一个是它本身这个"壳"\\(harness\\)——也就是那个用 Rust 写的、运行在你终端里的程序。模型负责"想",壳负责"读你的文件、执行命令、管理权限、维护上下文"。两者合起来才是完整的 Codex。理解这一点很重要,因为后面你会发现,很多配置\\(比如换模型、接国内中转\\)调的是"模型那一头",而很多操作\\(比如沙箱权限、审批、斜杠命令\\)管的是"壳这一头"。



这一章你只要记住三件事:第一,今天的 Codex 不是 2021 年那个老模型;第二,它是一个能自主干活的编程智能体,不是补全工具;第三,它由"模型"和"壳"两部分组成。带着这三个认知往下看,后面所有东西都好理解。



## 第 2 章 Codex 家族全景:CLI、App、IDE 插件、Cloud 四大入口



刚接触 Codex 的人很容易懵:官网上又是 Codex CLI,又是 Codex App,又是 IDE Extension,还有个 Codex Cloud,到底装哪个?这一章我把这四个入口一次性讲清楚,讲完你就知道自己该用哪个了。



先说一个关键事实:这四个东西底层是同一套能力、同一套配置\\(它们共享 \`~/.codex/config.toml\` 这个配置文件\\),区别只在于"你从哪个界面去用它"。换句话说,你在 CLI 里配好的 MCP 服务器、AGENTS\\.md 规则,切到 IDE 插件里照样生效,不用重配。这个设计很贴心,记住它能省很多事。



**第一个入口:Codex App\\(桌面图形客户端\\)**。这是最像"软件"的那个,下载下来双击打开,界面是图形化的,你选一个项目文件夹,然后像聊天一样跟它对话、让它执行任务。适合谁?适合那种一看见黑乎乎的终端就头疼、平时也不怎么写命令行的人。如果你是产品经理、设计师、运营,或者只是想体验一下 Codex 能干啥,先装 App 是最快的。



**第二个入口:Codex CLI\\(命令行工具\\)**。这是 Codex 的"本体",运行在终端里,效率最高,功能最全。所有进阶玩法——非交互脚本、CI/CD 集成、把 Codex 当 MCP server 嵌进别的 agent——都在 CLI 上。如果你是开发者,真要把 Codex 变成日常工作流的一部分,直接上 CLI。本书绝大部分篇幅讲的也是 CLI,因为它能力最完整,学会了 CLI,其他三个入口你随便用。



**第三个入口:IDE Extension\\(编辑器插件\\)**。支持 VS Code、Cursor、Windsurf 这些主流编辑器。装上之后你不用离开编辑器,直接在侧边栏里调 Codex,改动还能在编辑器里直接看 diff。适合谁?适合那些已经习惯在某个编辑器里写代码、不想在终端和编辑器之间来回切的人。注意一点,IDE 插件和 CLI 共享同一份 config\\.toml,所以你可以 CLI、插件混着用。



**第四个入口:Codex Cloud / Web\\(云端\\)**。这个最特别——前三个都是"在你自己电脑上跑",而 Cloud 是"把任务丢到云端的后台去跑",可以并行处理多个任务。比如你睡前丢三个任务给它,让它分别在三个分支上干活,第二天起来看结果。它需要 ChatGPT 订阅\\(Plus、Team、Pro、Enterprise 都行\\),入口在 chatgpt\\.com/codex 或者 ChatGPT App 里。适合那种任务量大、想"批处理"的团队场景。



那到底先装哪个?给你一句话决策:



- 想最快上手、不碰命令行 → 先装 **Codex App**

- 想真正进开发工作流、要全部功能 → 直接装 **Codex CLI**\\(本书主线\\)

- 已经离不开 VS Code / Cursor → 装 **IDE Extension**

- 任务量大、想云端批处理 → 用 **Codex Cloud**

    

我的个人建议是:如果你打算认真学,直接奔 CLI 去,别在 App 上耽误时间。App 上手快,但天花板也低,你迟早要回到 CLI。而且本书后面的进阶内容,八成是围绕 CLI 展开的。



## 第 3 章 Codex 跟 Claude Code、Cursor、Copilot 到底差在哪



你大概率用过或听过别的 AI 编程工具。这一章横向对比一下,帮你把 Codex 在这个赛道里的位置摆正,也帮你判断它适不适合你。



先讲 **GitHub Copilot**。Copilot 最早是做行内补全起家的,后来也加了 Chat 和 Agent 模式,但它的基因还是"在编辑器里辅助你写代码"。它和编辑器\\(尤其 VS Code\\)绑得很深,体验很顺滑。但如果你要的是"把一整个任务交出去让它自主完成",Copilot 的 agent 能力相对没那么"放得开"。Codex 的定位更靠近"自主执行",它更愿意自己去跑命令、自己迭代。



再讲 **Cursor**。Cursor 是一个独立的编辑器\\(基于 VS Code 改的\\),把 AI 深度整合进了编辑体验里,Tab 补全、Cmd\\+K 改代码、Composer 多文件编辑都很强。它是"以编辑器为中心"的。Codex 则是"以 agent 为中心",CLI 是它的主场。有意思的是,你可以在 Cursor 里通过配置调用 Codex 模型\\(走 OpenAI API 计费\\),所以两者不是完全互斥。很多人的用法是 Cursor 写日常代码、Codex CLI 干重活。



然后是 **Claude Code**,这是 Codex 最直接的对标对象,两者太像了——都是终端里的编程 agent,都读你的仓库、改代码、跑命令,都有审批/权限机制,都支持 MCP。区别在哪?根据大量国内用户的实测反馈,有几个常被提到的点:Codex 在**指令遵循**上以"听话、不乱发挥"著称——你让它只改 CSS,它就只改 CSS,不会顺手把你的代码重构一遍;你让它写测试,它就写测试,不越界。这一点在团队协作里其实很重要,因为可控性高,review 起来轻松。另外 Codex 在**代码审查**\\(review\\)上口碑不错,很多人专门拿它做 PR 审查。当然 Claude Code 也有自己的强项,这两个工具本质上是"神仙打架",选哪个很大程度看你能稳定拿到哪家的账号、网络和价格。



最后说额度和价格这个现实问题。Codex 的一个明显优势是:**它的使用额度跟你的 ChatGPT 订阅绑定**。也就是说,只要你有 ChatGPT Plus 或 Pro,不用单独充 API 余额就能用 Codex CLI\\(这是 OpenAI 后来放开的政策,降低了一大截门槛\\)。额度上,GPT\\-5 这一档,Plus 用户大概每 5 小时能发 30\\~150 条消息,Pro 用户每 5 小时 300\\~1500 条\\(具体数字 OpenAI 会调,以你账号实际为准\\)。对中度使用者来说,订阅制比按 API 量计费往往更划算。



还有一个 Codex 比较突出的点:**原生支持外接模型**。通过 config\\.toml 里的 model\\_providers,你甚至可以同时配好几个不同的模型提供商,随时切换。这对国内用户尤其有用,因为这正是"接国内中转 API"的技术基础\\(第 10 章和第 20 章会细讲\\)。



总结成一句话:如果你要一个**听话、可控、擅长读代码和审查、额度跟 ChatGPT 订阅绑定、还能灵活换模型**的终端 agent,Codex 很值得用。如果你的核心诉求是顺滑的编辑器内补全体验,那 Cursor / Copilot 可能更顺手。工具没有绝对高下,合适最重要。



## 第 4 章 谁适合用 Codex:六类典型用户画像



这一章帮你对号入座。我把最适合用 Codex 的人分成六类,看看你是哪一类,以及你该重点学本书的哪些章节。



**第一类:接手陌生项目的人**。你刚进新公司、新团队,或者接了个外包/开源项目,代码是别人写的,文档约等于没有。Codex 能在几分钟内帮你把项目结构、核心模块、数据流梳理清楚。重点看第 46 章\\(读懂陌生项目案例\\)。



**第二类:做中小规模独立开发的人**。个人开发者、独立开发者、做副业项目的人。一个人要顶一个团队,前后端、测试、部署都得自己来。Codex 能帮你把"补测试、修小 bug、写脚手架、查文档"这类重复劳动接走。重点看第 47、49 章。



**第三类:被代码审查折磨的人**。团队里负责 review PR 的那个倒霉蛋。Codex 的 \`/review\` 在查安全漏洞和逻辑回归上很能打,可以当你的"一审"。重点看第 25 章\\(斜杠命令\\)和第 50 章\\(审查\\+CI 案例\\)。



**第四类:想做工程化协作的团队**。你们团队想统一代码风格、统一 AI 用法,不希望每个人各玩各的。Codex 的 AGENTS\\.md 机制就是干这个的——把团队约定写进文件,所有人的 Codex 自动遵守。重点看第 36\\~39 章。



**第五类:运维/自动化/CI 场景的人**。你想在流水线里调 Codex 做自动化任务,或者写脚本批量处理。\`codex exec\` 非交互模式和 API Key 登录方式是为你准备的。重点看第 29 章和第 9 章。



**第六类:纯小白,想试试 AI 编程能不能帮上忙的人**。你不是程序员,但想让 AI 帮你写点小工具、处理点数据、改改网站。完全可以。先从 Codex App 入手,看第 2 章选入口,第 16 章跑通第一个任务。



如果你六类都不太沾边,也别急着走。Codex 的能力边界一直在扩,而且会"读文件、执行命令、自主多步完成任务"这种能力,迟早会渗透到每个跟电脑打交道的岗位。先了解着,没坏处。



## 第 5 章 开始前必须吃透的四个核心概念



这一章是整个第一部分里最重要的。下面四个概念,后面每一章都会反复用到,现在花十分钟搞懂,能让你后面学得飞快。我尽量用大白话讲。



**概念一:Agent\\(智能体\\)**。前面讲过了,这里再钉一下。Agent 和普通 AI 聊天的根本区别是"它能行动"。普通聊天:你问,它答,仅此而已。Agent:你给目标,它自己拆解步骤、调用工具\\(读文件、跑命令\\)、一步步逼近目标,中途会自我纠错。你可以把 Codex 想成一个有手有脚、能进你电脑干活的助手,而不是一个只会动嘴的顾问。理解了这一点,你才会明白为什么 Codex 需要"权限"和"审批"——因为它真的会动你的文件和系统。



**概念二:Context\\(上下文/上下文窗口\\)**。模型不是无限记忆的,它一次能"装进脑子里"的信息量有上限,这个上限就是上下文窗口。Codex 工作时,会把你的指令、相关代码文件、之前的对话、AGENTS\\.md 规则等一起塞进上下文。问题来了:聊得久了、读的文件多了,上下文会被塞满。塞满了会怎样?它会开始"忘事",或者变慢变贵。所以 Codex 提供了 \`/compact\` 命令——把前面冗长的对话压缩成摘要,腾出空间。后面第 25 章会讲怎么用。你现在只要知道:**上下文是有限资源,要省着用,该压缩就压缩,该开新会话就开新会话**。



**概念三:Sandbox\\(沙箱\\)**。这是 Codex 的安全护城河。因为 agent 真的会执行命令、改文件,万一它脑子一抽把你重要文件删了怎么办?沙箱就是给它划一个"活动范围"。Codex 有几档沙箱策略:只读\\(read\\-only,只能看不能改\\)、工作区可写\\(workspace\\-write,只能改你指定的工作目录\\)、完全访问\\(danger\\-full\\-access,啥都能干,危险\\)。默认是相对安全的。理解沙箱的意义在于:**你既要给 Codex 足够权限让它干活,又不能给太多以免出事,沙箱就是这个平衡点的旋钮**。第 31 章会把每一档讲透。



**概念四:Approval\\(审批机制\\)**。和沙箱配套的。当 Codex 想干一件它自己拿不准、或者超出当前沙箱权限的事\\(比如装个包、删个文件、访问网络\\),它会停下来问你:"我要执行这条命令,批准吗?"你可以批准、拒绝,或者改成"以后这类操作都别问我了"。审批策略通过 \`--ask-for-approval\` 这个参数控制,有"每次都问""只在必要时问""从不问"几档。小白阶段我强烈建议保持"会问"的状态,看清楚它要干啥再放行,养成习惯了再放宽。第 32 章细讲。



把这四个概念串起来理解就是:Codex 是个**会行动的 Agent**,它干活时把信息装进有限的**上下文**里,它的行动被**沙箱**框定范围,超范围或危险操作要走**审批**。这四个词,就是 Codex 的世界观。记牢了,往下走。

# 第二部分:账号与网络——国内用户的真正门槛



## 第 6 章 ChatGPT 账号怎么选:Plus / Pro / Team / Business



对国内用户来说,装 Codex 本身不难,难的是前面这一关:你得有个能用的 ChatGPT 账号,而且最好是付费档。这一章讲清楚各档位的区别,帮你选。



先说为什么需要付费账号。Codex 目前是付费功能,免费的 ChatGPT 用户用不了 Codex CLI。能用的档位是 **Plus、Pro、Team、Business、Enterprise**。也就是说,你至少得是 Plus。这一点没有捷径\\(除非走第 10 章讲的第三方中转 API,那是另一条路\\)。



各档位的核心区别,对 Codex 用户来说主要是**额度**和**能用的模型**:



**Plus**:个人档,目前大概一个月二十美元的量级\\(价格 OpenAI 会调\\)。额度上,GPT\\-5 这一档大约每 5 小时 30\\~150 条消息。对个人开发者、轻中度使用完全够用。绝大多数国内个人用户,Plus 就够了,这是性价比最高的选择。



**Pro**:个人高配档,价格高一个数量级。额度大幅提升,GPT\\-5 档每 5 小时大约 300\\~1500 条,而且能更早用上最新最强的模型。适合重度使用者——你一天到晚都在让 Codex 干活、动不动跑大任务,Plus 的额度不够你折腾,才考虑 Pro。



**Team / Business**:面向团队。除了更高的额度,还有团队管理、成员协作、数据隔离这些企业特性。适合公司/团队统一采购。个人不用考虑。



**Enterprise**:大企业定制,有专门的销售对接,普通人接触不到,跳过。



选择建议非常直接:**个人先上 Plus**,用一段时间觉得额度真的不够,再升 Pro。团队走 Team/Business。别一上来就买 Pro,大概率用不满,浪费钱。



还有一个常被问的:API Key 算哪档?这是另一条计费线——你在 platform\\.openai\\.com 充 API 余额,按调用量付费,跟 ChatGPT 订阅是两套体系。API 方式适合自动化、CI 这类程序化场景,正常人个人使用,订阅制\\(Plus/Pro\\)通常比 API 划算。这个第 9 章会专门讲。



## 第 7 章 国内如何订阅 ChatGPT Plus\\(支付方式详解\\)



这是国内用户最头疼的一关:OpenAI 不直接支持国内的支付方式,你拿支付宝/微信/国内信用卡,在官网那个付款页面大概率刷不过去。这一章把可行的几条路摆给你,你按自己情况选。



**第一类:自己搞境外支付方式**。如果你有境外信用卡\\(比如某些香港卡、虚拟信用卡服务发的卡\\),理论上可以直接在 ChatGPT 官网订阅。这条路最"正",续费稳定,不依赖第三方。但门槛在于你得先有那张卡,以及付款时通常需要配合合适的网络环境\\(IP 归属地最好和卡的区域一致,否则容易触发风控\\)。如果你本来就有境外卡,这是首选。



**第二类:虚拟信用卡 \\+ 境外网络**。市面上有一些虚拟信用卡服务\\(Depay 类、各种 visa/master 虚拟卡\\),充值后拿来订阅 OpenAI。能用,但要注意两点:一是选口碑好、跑路风险低的服务商;二是开卡和充值本身有手续费,算总成本。这条路灵活,但有踩坑风险,自己甄别。



**第三类:代充值 / 代订阅服务**。这是国内最多人走的路——找第三方服务,用支付宝/微信付人民币,对方帮你把账号升级到 Plus。网上搜"ChatGPT Plus 代充值""国内自助升级 ChatGPT Plus"能找到一堆。优点是省事,人民币直接付。**但风险也最大**,我必须把丑话说前面:



- 账号安全:你可能要把自己的 ChatGPT 账号密码交给对方,有被盗、被改密、关联封号的风险。能用"代付"\\(对方只帮你付款不碰你账号\\)就别用"代登录"。

- 跑路风险:小服务商可能收钱不办事,或者办了几个月就消失。

- 封号风险:代充号、共享号\\(那种几个人合用一个账号的\\)被 OpenAI 风控封号的概率明显更高,而且封了基本没法申诉。

    

我的建议:如果你打算认真长期用 Codex,优先想办法搞一张自己的境外卡,用自己的独立账号订阅,虽然前期麻烦,但稳。代充作为过渡可以,但别把重要工作压在一个随时可能被封的代充号上。



**第四类:干脆不订阅,走第三方中转 API**。如果你既搞不定支付,又对 OpenAI 官方账号没执念,那其实有第四条路:不订阅 ChatGPT,转而用国内的第三方中转 API\\(它们用人民币充值,提供兼容 OpenAI 协议的接口\\),在 Codex 里把 base\\_url 指过去。这条路完全绕开了订阅这一关。具体怎么配在第 10 章和第 20 章。对纯小白和"只想用上、不在乎是不是官方账号"的人,这条路反而最省心。



这一章的核心结论:订阅 ChatGPT Plus 在国内确实有门槛,但路子不止一条。能搞境外卡就搞,搞不定就走中转 API,实在要代充就挑靠谱的、用代付别用代登录、别拿重要工作冒险。



## 第 8 章 网络环境准备:代理、节点、稳定性



Codex CLI 默认要连 OpenAI 的服务器\\(api\\.openai\\.com、chatgpt\\.com 这些域名\\),国内网络直连不上。所以走"官方账号"这条路的话,你需要一个稳定的网络环境。这一章讲清楚要注意什么——注意,本书只讲技术层面的网络配置原理和稳定性,不涉及也不推荐任何具体的获取渠道,这部分请你自行依法解决。



**第一,稳定性比速度重要**。Codex 是 agent,一个任务可能要来回跟服务器交互几十次。如果你的网络时断时续,Codex 干到一半连接断了,任务就废了,体验极差。所以选网络环境时,"稳"是第一位的,偶尔慢一点能忍,频繁掉线不能忍。



**第二,注意 IP 归属和风控**。OpenAI 有风控,如果你的网络出口 IP 是那种被大量账号共用的、或者频繁变动的,容易触发账号风控甚至封号。理想情况是出口 IP 相对干净、稳定。这也是为什么不建议用那种几百人共用的廉价节点。



**第三,理解"全局"和"系统代理"的区别**。这一点在配 IDE 插件\\(尤其 Cursor\\)时特别关键。有些工具不会自动走系统代理,你开了代理它还是连不上,报"This model provider doesn't serve your region"这类错。这时候你要么开"全局/增强模式",要么在那个工具的设置里单独填代理地址。Codex CLI 相对好一些,但也建议你了解自己机器上代理是怎么生效的。



**第四,给 CLI 单独配代理的方法**。如果你的代理不是全局的,可以通过环境变量给 Codex 单独指定代理。在终端里设置 \`HTTPS_PROXY\` 和 \`HTTP_PROXY\` 环境变量指向你的本地代理端口\\(比如 \`http://127.0.0.1:7890\` 这种,具体端口看你的代理软件\\),Codex 走网络时就会用这个代理。这个方法在第 21 章会和 config\\.toml 一起细讲。



**第五,如果网络实在折腾不定,认真考虑走中转 API**。再强调一次:走第三方国内中转 API 的话,Codex 连的是国内服务器,根本不需要代理,网络问题直接消失。这是为什么我反复提中转方案——对很多国内用户,它把"账号"和"网络"两个最大的坑一次性填了。代价是模型可能不是 OpenAI 官方最新的、或者要为中转服务付费,自己权衡。



小结:走官方账号 = 要解决稳定网络\\(求稳不求快、注意 IP 风控、搞清代理生效方式\\);怕折腾 = 走中转 API 绕开网络问题。两条路,按自己情况选。



## 第 9 章 API Key 方式 vs ChatGPT 登录方式:到底怎么选



Codex 登录有两种方式,这是个很多人没搞清楚就乱配、然后报错的地方。这一章一次讲明白。



**方式一:ChatGPT 登录\\(OAuth\\)**。你用 ChatGPT 账号\\(Plus/Pro/Team 等\\)授权登录,Codex 的使用额度走你的**订阅额度**。命令是 \`codex login\`,会弹浏览器让你授权,授权完就好了。



特点:省心,不用管 API 余额,额度是订阅给的\\(每 5 小时多少条那种\\)。而且 ChatGPT 登录通常能**更早用上最新的模型**。对绝大多数个人开发者,这是推荐方式。



**方式二:API Key 登录**。你在 platform\\.openai\\.com 创建一个 API Key,配给 Codex,使用走 **API 按量计费**\\(用多少花多少钱\\),跟订阅是两套账。



特点:适合**程序化、自动化场景**——CI/CD 流水线、定时脚本、需要稳定无人值守的任务。因为这些场景里你没法每次都去点浏览器授权,API Key 是写死在环境里的,更适合机器跑。缺点:正常人手动使用的话,API 通常比订阅贵;而且 API 拿到新模型的时间有时会比 ChatGPT 登录晚一点。



怎么选,记这个口诀:



- **个人日常手动用 → ChatGPT 登录**\\(省心、可能更早用上新模型、订阅更划算\\)

- **自动化 / CI / 脚本 / 无人值守 → API Key**\\(适合机器跑、计费清晰\\)

- **走国内第三方中转 → 用 API Key 的形式,但 base\\_url 指向中转服务**\\(见第 10、20 章\\)

    

特别注意一个安全红线:**API Key 是密码级的机密,绝对不能泄露**。别把它直接写进会提交到 Git 的文件里,别在公开场合\\(截图、issue、群聊\\)贴出来。正确做法是放进环境变量,或者放进 \`~/.codex/\` 下不会被提交的配置里。一旦泄露,有人能拿你的 Key 疯狂调用,账单算你的。这一点第 21 章和第 34 章还会强调。



还有个实操细节:ChatGPT 登录后,登录凭证会缓存在 \`~/.codex/\` 目录下\\(Windows 是对应的用户目录\\)。如果你换了机器、或者授权过期,重新 \`codex login\` 一次即可。要登出就 \`codex logout\`。



## 第 10 章 国内中转 API 方案详解\\(base\\_url 配置思路\\)



这一章是给"搞不定官方账号/网络,或者想用国内服务省心"的同学准备的核心方案。把原理讲透,具体字段第 20 章再配。



**先理解原理**。Codex CLI 默认调用 \`api.openai.com\`。但 Codex 设计上支持"OpenAI 兼容协议"——意思是,任何一个对外提供"长得跟 OpenAI 一样的 API 接口"的服务,Codex 都能连。所以国内冒出来很多"中转服务"或"兼容端点",它们在国内有服务器,提供兼容 OpenAI 协议的接口,你只要在 Codex 的配置里把请求地址\\(base\\_url\\)从 \`api.openai.com\` 改成它们的地址,再填上它们给你的 Key,Codex 就会去连国内服务器,而不是 OpenAI。



**这样做的好处**:第一,不用翻墙——连的是国内服务器;第二,不用境外账号——用人民币在中转服务那充值就行;第三,网络稳定。一句话:把"账号"和"网络"两个坑一次性绕过去了。



**代价和风险**:第一,你用的模型取决于中转服务支持哪些。有的中转能提供 GPT\\-5\\-Codex 这一系列\\(那体验最接近官方\\),有的只提供 DeepSeek、Claude、Kimi 等其他模型\\(那就不是"真 Codex 模型"了,只是借 Codex 这个壳跑别的模型,能用但效果有差异\\);第二,你的代码和请求会经过第三方服务器,**有数据安全顾虑**——别拿它处理敏感/涉密代码;第三,中转服务良莠不齐,有跑路、限速、偷偷降级模型的风险,挑口碑好的。



**配置长什么样\\(先有个印象,第 20 章细讲\\)**。核心就是在 \`~/.codex/config.toml\` 里加一段,告诉 Codex:用哪个 provider、provider 的 base\\_url 是什么、用哪个模型。大致结构是这样\\(占位,实际值填你服务商给的\\):



\`\`\`TOML
model = "gpt-5-codex"          # 改成你的服务商支持的模型名
model_provider = "custom"       # 给你的 provider 起的名字

[model_providers.custom]
name = "custom"
base_url = "https://你的中转服务地址/v1"   # 服务商给你的 API 地址
wire_api = "responses"          # 协议类型,看服务商文档
\`\`\`



然后把 API Key 通过环境变量提供\\(比如 \`OPENAI_API_KEY\`\\)。这样 Codex 就改连你指定的国内端点了。



**重要提醒**:有些配置项是不允许在项目级配置里改的\\(比如 \`openai_base_url\`、\`model_provider\` 这类涉及凭证和请求去向的 key\\),只能在用户级的 \`~/.codex/config.toml\` 里设。Codex 这么设计是出于安全——防止你打开一个不信任的项目,它偷偷把你的请求和凭证导到别处。所以中转配置要写在你自己的用户级配置里。这点第 18、23 章会专门讲清楚。



**怎么验证配好了**:配完跑一句简单任务,比如 \`codex "用一句话介绍你自己"\`,如果它正常回应、没报连接错误,就说明通了。如果报 region、连接超时、401 这类错,大概率是 base\\_url、Key、或 wire\\_api 填错了,对着服务商文档逐项核对。



这一章你要带走的认知:**Codex 不是只能连 OpenAI,它支持兼容协议,这给了国内用户一条绕过账号和网络的路**。这条路省心,但要接受"模型可能非官方、有数据安全顾虑、要挑靠谱服务商"这三个代价。

# 第三部分:动手安装,跑通第一个任务



## 第 11 章 安装前置:Node\\.js 全流程\\(Windows / Mac\\)



Codex CLI 主要通过 npm 安装,而 npm 是 Node\\.js 自带的包管理器。所以装 Codex 之前,你机器上得先有 Node\\.js。官方要求 Node 18 以上,我建议直接装 22 或更新的 LTS 版本,省得遇到兼容问题。这一章手把手装 Node。



**先检查你是不是已经装了**。打开终端\\(Windows 是 PowerShell 或 Windows Terminal,Mac 是"终端"App\\),输入:



\`\`\`Bash
node -v
npm -v
\`\`\`



如果两条都打印出版本号\\(比如 v22\\.x\\.x\\),并且 node 版本 ≥ 18,那你跳过这一章,直接去第 12 / 13 章。如果提示"找不到命令"或者版本太老,往下看。



**Windows 装 Node\\.js**。最省事的方式是用 winget\\(Win10/11 自带的包管理器\\)。打开 PowerShell,输入:



\`\`\`PowerShell
winget install OpenJS.NodeJS.LTS
\`\`\`



等它装完,**关掉 PowerShell 重新打开**\\(这一步很重要,不重开新窗口,PATH 环境变量不刷新,你 \`node -v\` 还是找不到\\),再 \`node -v\` 验证。



如果你不喜欢命令行,也可以去 Node\\.js 官网下载 LTS 版本的 \\.msi 安装包,双击一路下一步,装完同样重开终端验证。



**Mac 装 Node\\.js**。如果你装了 Homebrew\\(Mac 上最常用的包管理器\\),一行搞定:



\`\`\`Bash
brew install node
\`\`\`



没装 Homebrew 的话,要么先装 Homebrew\\(去它官网复制那行安装命令\\),要么去 Node\\.js 官网下 macOS 的 \\.pkg 安装包双击安装。装完 \`node -v\` 验证。



**国内 npm 加速\\(强烈建议先做\\)**。npm 默认从国外源下载,国内慢得令人发指,而且经常下到一半断。装 Codex 之前先把 npm 源换成国内镜像,后面省心一万倍。执行:



\`\`\`Bash
npm config set registry https://registry.npmmirror.com
\`\`\`



这行的意思是把 npm 的下载源换成淘宝\\(npmmirror\\)的国内镜像。验证一下:



\`\`\`Bash
npm config get registry
\`\`\`



打印出 \`https://registry.npmmirror.com\` 就对了。**这一步是国内安装 90% 卡顿问题的解药**,务必先做。



**一个常见坑:权限**。Mac/Linux 上全局安装 npm 包\\(\`-g\`\\)有时会报权限错误\\(EACCES\\)。不建议用 \`sudo\` 硬装\\(后患无穷\\),正确做法是配置一下 npm 的全局目录到你自己有权限的地方。如果你遇到了,第 17 章排查清单里有详细解法,先记着有这回事。



装完 Node、换好源,前置就齐了。下一章开始装 Codex 本体。



## 第 12 章 Windows 安装 Codex CLI 完整步骤



Windows 用户单独开一章,因为坑相对多一点。先给结论:**Windows 上有两条路——原生安装,或者 WSL2 里安装**。能用原生就用原生\\(简单\\),原生遇到沙箱/权限问题再上 WSL2\\(第 14 章\\)。



**前提检查**。确认这三样齐了:Node\\.js ≥ 18\\(\`node -v\` 验证过\\)、npm 源已换国内镜像\\(第 11 章\\)、网络环境就绪\\(走官方账号需要代理,走中转不需要\\)。Git 建议也装上,后面 Codex 干活经常要用到 git。



**第一步:安装**。打开 PowerShell 或 Windows Terminal,执行:



\`\`\`PowerShell
npm install -g @openai/codex
\`\`\`



如果你前面没换 npm 源、又觉得慢,可以临时指定镜像源:



\`\`\`PowerShell
npm install -g @openai/codex --registry=https://registry.npmmirror.com
\`\`\`



**第二步:验证安装**。装完执行:



\`\`\`PowerShell
codex --version
\`\`\`



打印出版本号\\(比如 0\\.130\\.x\\)就说明装好了。如果提示 \`codex\` 不是内部或外部命令——这是 Windows 最经典的坑,意思是 npm 的全局安装目录不在系统 PATH 里。解法:先 \`npm config get prefix\` 看看全局目录在哪\\(通常是类似 \`C:\\Users\\你的名字\\AppData\\Roaming\\npm\`\\),确认这个路径在你的系统环境变量 PATH 里;不在就手动加进去,然后**重开终端**\\(再次强调,PATH 改了必须重开窗口\\)。



**第三步:登录**。执行:



\`\`\`PowerShell
codex login
\`\`\`



它会弹出浏览器让你用 ChatGPT 账号授权\\(走官方账号的话\\)。授权成功,终端会提示登录完成。如果你走中转 API,这一步不用 login,直接去配 config\\.toml\\(第 20 章\\),用环境变量提供 Key。



**第四步:启动**。在你想让 Codex 工作的项目文件夹里,执行:



\`\`\`PowerShell
cd 你的项目路径
codex
\`\`\`



进入交互界面,你就可以开始给它派活了。



**Windows 特别提醒**。如果你是 Windows 10 用户,Codex 原生能用,但在沙箱、权限上偶尔会遇到一些策略问题\\(比如执行策略不允许、沙箱用户启动失败之类的错\\)。Win11 体验更顺。如果你原生折腾不顺,官方和社区的共识是:**Windows 用户卡住了就上 WSL2**\\(第 14 章\\),WSL2 是个完整的 Linux 环境,Codex 在里面跑最舒服,坑最少。另外,对完全不想碰命令行的 Windows 用户,直接用 Codex App\\(图形界面\\)也是合理选择。



## 第 13 章 macOS / Linux 安装 Codex CLI 完整步骤



Mac 和 Linux 用户,Codex 装起来比 Windows 省心,因为它本来就是 Unix 环境长大的工具。



**前提检查**。同样三样:Node\\.js ≥ 18、npm 国内源、网络就绪。Git 一般 Mac/Linux 自带或很容易装。



**Mac 安装,两种方式任选**。



方式一,用 npm\\(通用,推荐\\):



\`\`\`Bash
npm install -g @openai/codex
\`\`\`



方式二,用 Homebrew\\(如果你习惯用 brew 管理软件\\):



\`\`\`Bash
brew install --cask codex
\`\`\`



两种都行。npm 方式的好处是和 Linux 一致、升级方便;brew 方式的好处是和你其他 brew 软件统一管理。新手用 npm 那条即可。



**Linux 安装**。直接 npm:



\`\`\`Bash
npm install -g @openai/codex
\`\`\`



各发行版\\(Ubuntu/Debian/CentOS 等\\)只要 Node 装好了,这条命令通用。



**验证**:



\`\`\`Bash
codex --version
\`\`\`



**登录**:



\`\`\`Bash
codex login
\`\`\`



弹浏览器授权\\(官方账号\\)。如果是在没有图形界面的远程 Linux 服务器上,浏览器弹不出来,可以用设备授权\\(device auth\\)或者把 access token 通过 stdin 传入——\`codex login --help\` 看具体选项。走中转的话同样跳过 login,配 config\\.toml。



**启动**:



\`\`\`Bash
cd 你的项目目录
codex
\`\`\`



**Mac/Linux 常见坑:全局安装权限\\(EACCES\\)**。如果 \`npm install -g\` 报权限错误,别急着 \`sudo\`。推荐的干净解法是给 npm 配一个你自己拥有权限的全局目录:



\`\`\`Bash
mkdir -p ~/.npm-global
npm config set prefix '~/.npm-global'
\`\`\`



然后把 \`~/.npm-global/bin\` 加到你的 PATH 里。具体做法:编辑你的 shell 配置文件\\(用 bash 就是 \`~/.bashrc\`,用 zsh——Mac 默认——就是 \`~/.zshrc\`\\),在末尾加一行:



\`\`\`Bash
export PATH=~/.npm-global/bin:$PATH
\`\`\`



保存后执行 \`source ~/.zshrc\`\\(或 \`source ~/.bashrc\`\\)让它生效,再重新 \`npm install -g @openai/codex\`。这样就不需要 sudo,也不会污染系统目录。



**升级 Codex**。Codex 迭代很快,隔三差五升一下能少踩很多坑。升级方式:



\`\`\`Bash
npm install -g @openai/codex@latest
\`\`\`



或者 Codex 自带的自更新\\(新版本支持\\):



\`\`\`Bash
codex --upgrade
\`\`\`



\\(具体子命令以 \`codex --help\` 为准,不同版本可能略有差异。\\)



到这里,Mac/Linux 用户已经装好、登录、能启动了。一个非常实用的习惯:**当你发现网上某篇教程里的界面、命令、菜单和你本机对不上时,第一件事不是怀疑自己,而是先升级一次 Codex**——大概率是教程写的版本和你装的版本不一样。Codex 这半年改动太频繁了,升级到最新再对照,能解决一大半"怎么跟教程不一样"的困惑。

## 前言:这本知识库该怎么读

先说一句大实话:网上关于 Codex 的教程,十篇里有八篇是互相抄的,要么只教你 \`npm install\` 一行命令就完事,要么上来就是一堆 config\\.toml 字段让你照抄,你抄完报错了也不知道为什么。这本知识库不想这样。

我自己的习惯是,工具要先搞清楚"它是干嘛的、为什么这么设计",再去记命令。因为命令会变\\(Codex 这半年版本号从 0\\.4 蹦到 0\\.13,菜单都改过好几次\\),但设计思路不太变。所以这本书的结构是这样安排的:

第一部分\\(第 1\\~5 章\\)讲认知,搞清楚 Codex 到底是个什么东西,跟你以前用过的 Copilot、Cursor 有啥不一样。这部分没有命令,但是最值钱,看懂了你后面少走一半弯路。

第二部分\\(第 6\\~10 章\\)专门解决国内用户的账号和网络问题。这是中国人用 Codex 最大的门槛,比安装本身难十倍。我会把订阅、付款、网络、中转 API 这几条路都讲清楚,你按自己情况选一条走。

第三部分\\(第 11\\~17 章\\)是真正的"动手装"。Windows、Mac、Linux、WSL2 四种环境分开讲,装完跑通第一个任务,最后给你一份高频报错排查清单。

第四到第八部分\\(第 18\\~45 章\\)是配置和进阶:config\\.toml 怎么调、斜杠命令怎么用、沙箱权限怎么管、AGENTS\\.md 怎么写、MCP 和 Skills 怎么玩。

第九部分\\(第 46\\~50 章\\)是五个完整实战案例,从读懂陌生项目到搭全栈应用再到团队落地,每个案例都是从头跟到尾的。

读的时候有个建议:如果你是纯小白,老老实实从第 1 章往后看;如果你已经会用命令行、只是想快速上手,可以直接跳到第 11 章开始装,装完回头补第 1\\~5 章的认知;如果你已经在用 Codex、只想解决某个具体问题,直接看目录定位章节。

最后提醒一句:Codex 是个迭代极快的工具,模型名\\(GPT\\-5\\-Codex 系列\\)、菜单项、个别参数随时可能变。所以本书所有命令我都会告诉你"怎么验证它在你这台机器上还成立"——比如 \`codex --version\`、\`codex --help\`、官方文档地址,而不是让你死记。工具会变,排查方法不会变,这才是保姆级该教的东西。

好,开始。

# 第一部分:先把 Codex 是什么搞明白

## 第 1 章 Codex 到底是什么:从"代码补全"到"AI 编程智能体"

很多人第一次听到 Codex,脑子里冒出来的是 2021 年那个给 GitHub Copilot 当后台的"Codex 模型"。我先把这个误会澄清掉:那个老 Codex 模型的 API 已经在 2023 年正式退役了。今天我们说的 Codex,是 OpenAI 在 2025 到 2026 年推出的一套全新东西,核心是一个叫 **Codex CLI** 的终端编程智能体\\(agent\\)。它是开源的,用 Rust 写的,采用 Apache\\-2\\.0 协议,在 GitHub 上的 star 数已经冲到八万多。名字一样,但完全是两回事。

那"AI 编程智能体"和你熟悉的代码补全有什么区别?这是理解 Codex 的钥匙,我用一个生活化的比喻讲清楚。

代码补全工具\\(比如早期的 Copilot 行内补全\\)像是一个站在你身后的实习生,你打字打到一半,它猜你下一行想写什么,弹个灰色提示让你按 Tab 接受。它的能力边界很清楚:它只能"建议",不能"动手"。它看不到你整个项目的结构,不会去读你另外十个文件,更不会自己跑命令、自己改文件、自己运行测试看通没通过。

Codex 不一样。你给它一句话,比如"帮这个项目的登录接口加上 JWT 鉴权,然后接上 MySQL,改完跑一遍测试",它会真的去做这一整串事:先进你的项目目录,把相关文件读一遍搞清楚现状,然后动手改代码,改完之后它自己在终端里敲命令把测试跑起来,测试挂了它还能看报错继续改。整个过程它是"自主的"——会自己把一个大任务拆成好几步,一步步执行,遇到拿不准要不要执行的危险操作\\(比如删文件、装依赖\\)才停下来问你一句"我要这么干,行不行"。

所以一句话概括:**代码补全是"建议下一行",Codex 是"替你干完整件事"**。前者是辅助打字,后者是一个能进项目、读文件、执行命令、自主完成多步任务的开发搭子。

这个差别带来的体验跳跃非常大。举个我自己常遇到的场景:接手一个别人写的、文档几乎没有的老项目。以前我得花大半天点开一个个文件去理解它的结构。现在我直接在项目根目录启动 Codex,丢一句"这个项目是干嘛的,核心模块有哪些,数据是怎么流转的,用通俗的话给我讲一遍",它会自己把项目扫一遍,然后给我一份相当靠谱的导读。这件事代码补全工具是做不到的,因为它根本不会"主动去读你的整个仓库"。

要把这个能力跑起来,Codex 依赖两样东西:一个是足够强的大模型\\(目前是 GPT\\-5\\-Codex 这一系列,专门为编程和工具调用训练过的\\),另一个是它本身这个"壳"\\(harness\\)——也就是那个用 Rust 写的、运行在你终端里的程序。模型负责"想",壳负责"读你的文件、执行命令、管理权限、维护上下文"。两者合起来才是完整的 Codex。理解这一点很重要,因为后面你会发现,很多配置\\(比如换模型、接国内中转\\)调的是"模型那一头",而很多操作\\(比如沙箱权限、审批、斜杠命令\\)管的是"壳这一头"。

这一章你只要记住三件事:第一,今天的 Codex 不是 2021 年那个老模型;第二,它是一个能自主干活的编程智能体,不是补全工具;第三,它由"模型"和"壳"两部分组成。带着这三个认知往下看,后面所有东西都好理解。

## 第 2 章 Codex 家族全景:CLI、App、IDE 插件、Cloud 四大入口

刚接触 Codex 的人很容易懵:官网上又是 Codex CLI,又是 Codex App,又是 IDE Extension,还有个 Codex Cloud,到底装哪个?这一章我把这四个入口一次性讲清楚,讲完你就知道自己该用哪个了。

先说一个关键事实:这四个东西底层是同一套能力、同一套配置\\(它们共享 \`~/.codex/config.toml\` 这个配置文件\\),区别只在于"你从哪个界面去用它"。换句话说,你在 CLI 里配好的 MCP 服务器、AGENTS\\.md 规则,切到 IDE 插件里照样生效,不用重配。这个设计很贴心,记住它能省很多事。

**第一个入口:Codex App\\(桌面图形客户端\\)**。这是最像"软件"的那个,下载下来双击打开,界面是图形化的,你选一个项目文件夹,然后像聊天一样跟它对话、让它执行任务。适合谁?适合那种一看见黑乎乎的终端就头疼、平时也不怎么写命令行的人。如果你是产品经理、设计师、运营,或者只是想体验一下 Codex 能干啥,先装 App 是最快的。

**第二个入口:Codex CLI\\(命令行工具\\)**。这是 Codex 的"本体",运行在终端里,效率最高,功能最全。所有进阶玩法——非交互脚本、CI/CD 集成、把 Codex 当 MCP server 嵌进别的 agent——都在 CLI 上。如果你是开发者,真要把 Codex 变成日常工作流的一部分,直接上 CLI。本书绝大部分篇幅讲的也是 CLI,因为它能力最完整,学会了 CLI,其他三个入口你随便用。

**第三个入口:IDE Extension\\(编辑器插件\\)**。支持 VS Code、Cursor、Windsurf 这些主流编辑器。装上之后你不用离开编辑器,直接在侧边栏里调 Codex,改动还能在编辑器里直接看 diff。适合谁?适合那些已经习惯在某个编辑器里写代码、不想在终端和编辑器之间来回切的人。注意一点,IDE 插件和 CLI 共享同一份 config\\.toml,所以你可以 CLI、插件混着用。

**第四个入口:Codex Cloud / Web\\(云端\\)**。这个最特别——前三个都是"在你自己电脑上跑",而 Cloud 是"把任务丢到云端的后台去跑",可以并行处理多个任务。比如你睡前丢三个任务给它,让它分别在三个分支上干活,第二天起来看结果。它需要 ChatGPT 订阅\\(Plus、Team、Pro、Enterprise 都行\\),入口在 chatgpt\\.com/codex 或者 ChatGPT App 里。适合那种任务量大、想"批处理"的团队场景。

那到底先装哪个?给你一句话决策:

- 想最快上手、不碰命令行 → 先装 **Codex App**

- 想真正进开发工作流、要全部功能 → 直接装 **Codex CLI**\\(本书主线\\)

- 已经离不开 VS Code / Cursor → 装 **IDE Extension**

- 任务量大、想云端批处理 → 用 **Codex Cloud**

我的个人建议是:如果你打算认真学,直接奔 CLI 去,别在 App 上耽误时间。App 上手快,但天花板也低,你迟早要回到 CLI。而且本书后面的进阶内容,八成是围绕 CLI 展开的。

## 第 3 章 Codex 跟 Claude Code、Cursor、Copilot 到底差在哪

你大概率用过或听过别的 AI 编程工具。这一章横向对比一下,帮你把 Codex 在这个赛道里的位置摆正,也帮你判断它适不适合你。

先讲 **GitHub Copilot**。Copilot 最早是做行内补全起家的,后来也加了 Chat 和 Agent 模式,但它的基因还是"在编辑器里辅助你写代码"。它和编辑器\\(尤其 VS Code\\)绑得很深,体验很顺滑。但如果你要的是"把一整个任务交出去让它自主完成",Copilot 的 agent 能力相对没那么"放得开"。Codex 的定位更靠近"自主执行",它更愿意自己去跑命令、自己迭代。

再讲 **Cursor**。Cursor 是一个独立的编辑器\\(基于 VS Code 改的\\),把 AI 深度整合进了编辑体验里,Tab 补全、Cmd\\+K 改代码、Composer 多文件编辑都很强。它是"以编辑器为中心"的。Codex 则是"以 agent 为中心",CLI 是它的主场。有意思的是,你可以在 Cursor 里通过配置调用 Codex 模型\\(走 OpenAI API 计费\\),所以两者不是完全互斥。很多人的用法是 Cursor 写日常代码、Codex CLI 干重活。

然后是 **Claude Code**,这是 Codex 最直接的对标对象,两者太像了——都是终端里的编程 agent,都读你的仓库、改代码、跑命令,都有审批/权限机制,都支持 MCP。区别在哪?根据大量国内用户的实测反馈,有几个常被提到的点:Codex 在**指令遵循**上以"听话、不乱发挥"著称——你让它只改 CSS,它就只改 CSS,不会顺手把你的代码重构一遍;你让它写测试,它就写测试,不越界。这一点在团队协作里其实很重要,因为可控性高,review 起来轻松。另外 Codex 在**代码审查**\\(review\\)上口碑不错,很多人专门拿它做 PR 审查。当然 Claude Code 也有自己的强项,这两个工具本质上是"神仙打架",选哪个很大程度看你能稳定拿到哪家的账号、网络和价格。

最后说额度和价格这个现实问题。Codex 的一个明显优势是:**它的使用额度跟你的 ChatGPT 订阅绑定**。也就是说,只要你有 ChatGPT Plus 或 Pro,不用单独充 API 余额就能用 Codex CLI\\(这是 OpenAI 后来放开的政策,降低了一大截门槛\\)。额度上,GPT\\-5 这一档,Plus 用户大概每 5 小时能发 30\\~150 条消息,Pro 用户每 5 小时 300\\~1500 条\\(具体数字 OpenAI 会调,以你账号实际为准\\)。对中度使用者来说,订阅制比按 API 量计费往往更划算。

还有一个 Codex 比较突出的点:**原生支持外接模型**。通过 config\\.toml 里的 model\\_providers,你甚至可以同时配好几个不同的模型提供商,随时切换。这对国内用户尤其有用,因为这正是"接国内中转 API"的技术基础\\(第 10 章和第 20 章会细讲\\)。

总结成一句话:如果你要一个**听话、可控、擅长读代码和审查、额度跟 ChatGPT 订阅绑定、还能灵活换模型**的终端 agent,Codex 很值得用。如果你的核心诉求是顺滑的编辑器内补全体验,那 Cursor / Copilot 可能更顺手。工具没有绝对高下,合适最重要。

## 第 4 章 谁适合用 Codex:六类典型用户画像

这一章帮你对号入座。我把最适合用 Codex 的人分成六类,看看你是哪一类,以及你该重点学本书的哪些章节。

**第一类:接手陌生项目的人**。你刚进新公司、新团队,或者接了个外包/开源项目,代码是别人写的,文档约等于没有。Codex 能在几分钟内帮你把项目结构、核心模块、数据流梳理清楚。重点看第 46 章\\(读懂陌生项目案例\\)。

**第二类:做中小规模独立开发的人**。个人开发者、独立开发者、做副业项目的人。一个人要顶一个团队,前后端、测试、部署都得自己来。Codex 能帮你把"补测试、修小 bug、写脚手架、查文档"这类重复劳动接走。重点看第 47、49 章。

**第三类:被代码审查折磨的人**。团队里负责 review PR 的那个倒霉蛋。Codex 的 \`/review\` 在查安全漏洞和逻辑回归上很能打,可以当你的"一审"。重点看第 25 章\\(斜杠命令\\)和第 50 章\\(审查\\+CI 案例\\)。

**第四类:想做工程化协作的团队**。你们团队想统一代码风格、统一 AI 用法,不希望每个人各玩各的。Codex 的 AGENTS\\.md 机制就是干这个的——把团队约定写进文件,所有人的 Codex 自动遵守。重点看第 36\\~39 章。

**第五类:运维/自动化/CI 场景的人**。你想在流水线里调 Codex 做自动化任务,或者写脚本批量处理。\`codex exec\` 非交互模式和 API Key 登录方式是为你准备的。重点看第 29 章和第 9 章。

**第六类:纯小白,想试试 AI 编程能不能帮上忙的人**。你不是程序员,但想让 AI 帮你写点小工具、处理点数据、改改网站。完全可以。先从 Codex App 入手,看第 2 章选入口,第 16 章跑通第一个任务。

如果你六类都不太沾边,也别急着走。Codex 的能力边界一直在扩,而且会"读文件、执行命令、自主多步完成任务"这种能力,迟早会渗透到每个跟电脑打交道的岗位。先了解着,没坏处。

## 第 5 章 开始前必须吃透的四个核心概念

这一章是整个第一部分里最重要的。下面四个概念,后面每一章都会反复用到,现在花十分钟搞懂,能让你后面学得飞快。我尽量用大白话讲。

**概念一:Agent\\(智能体\\)**。前面讲过了,这里再钉一下。Agent 和普通 AI 聊天的根本区别是"它能行动"。普通聊天:你问,它答,仅此而已。Agent:你给目标,它自己拆解步骤、调用工具\\(读文件、跑命令\\)、一步步逼近目标,中途会自我纠错。你可以把 Codex 想成一个有手有脚、能进你电脑干活的助手,而不是一个只会动嘴的顾问。理解了这一点,你才会明白为什么 Codex 需要"权限"和"审批"——因为它真的会动你的文件和系统。

**概念二:Context\\(上下文/上下文窗口\\)**。模型不是无限记忆的,它一次能"装进脑子里"的信息量有上限,这个上限就是上下文窗口。Codex 工作时,会把你的指令、相关代码文件、之前的对话、AGENTS\\.md 规则等一起塞进上下文。问题来了:聊得久了、读的文件多了,上下文会被塞满。塞满了会怎样?它会开始"忘事",或者变慢变贵。所以 Codex 提供了 \`/compact\` 命令——把前面冗长的对话压缩成摘要,腾出空间。后面第 25 章会讲怎么用。你现在只要知道:**上下文是有限资源,要省着用,该压缩就压缩,该开新会话就开新会话**。

**概念三:Sandbox\\(沙箱\\)**。这是 Codex 的安全护城河。因为 agent 真的会执行命令、改文件,万一它脑子一抽把你重要文件删了怎么办?沙箱就是给它划一个"活动范围"。Codex 有几档沙箱策略:只读\\(read\\-only,只能看不能改\\)、工作区可写\\(workspace\\-write,只能改你指定的工作目录\\)、完全访问\\(danger\\-full\\-access,啥都能干,危险\\)。默认是相对安全的。理解沙箱的意义在于:**你既要给 Codex 足够权限让它干活,又不能给太多以免出事,沙箱就是这个平衡点的旋钮**。第 31 章会把每一档讲透。

**概念四:Approval\\(审批机制\\)**。和沙箱配套的。当 Codex 想干一件它自己拿不准、或者超出当前沙箱权限的事\\(比如装个包、删个文件、访问网络\\),它会停下来问你:"我要执行这条命令,批准吗?"你可以批准、拒绝,或者改成"以后这类操作都别问我了"。审批策略通过 \`--ask-for-approval\` 这个参数控制,有"每次都问""只在必要时问""从不问"几档。小白阶段我强烈建议保持"会问"的状态,看清楚它要干啥再放行,养成习惯了再放宽。第 32 章细讲。

把这四个概念串起来理解就是:Codex 是个**会行动的 Agent**,它干活时把信息装进有限的**上下文**里,它的行动被**沙箱**框定范围,超范围或危险操作要走**审批**。这四个词,就是 Codex 的世界观。记牢了,往下走。

# 第二部分:账号与网络——国内用户的真正门槛

## 第 6 章 ChatGPT 账号怎么选:Plus / Pro / Team / Business

对国内用户来说,装 Codex 本身不难,难的是前面这一关:你得有个能用的 ChatGPT 账号,而且最好是付费档。这一章讲清楚各档位的区别,帮你选。

先说为什么需要付费账号。Codex 目前是付费功能,免费的 ChatGPT 用户用不了 Codex CLI。能用的档位是 **Plus、Pro、Team、Business、Enterprise**。也就是说,你至少得是 Plus。这一点没有捷径\\(除非走第 10 章讲的第三方中转 API,那是另一条路\\)。

各档位的核心区别,对 Codex 用户来说主要是**额度**和**能用的模型**:

**Plus**:个人档,目前大概一个月二十美元的量级\\(价格 OpenAI 会调\\)。额度上,GPT\\-5 这一档大约每 5 小时 30\\~150 条消息。对个人开发者、轻中度使用完全够用。绝大多数国内个人用户,Plus 就够了,这是性价比最高的选择。

**Pro**:个人高配档,价格高一个数量级。额度大幅提升,GPT\\-5 档每 5 小时大约 300\\~1500 条,而且能更早用上最新最强的模型。适合重度使用者——你一天到晚都在让 Codex 干活、动不动跑大任务,Plus 的额度不够你折腾,才考虑 Pro。

**Team / Business**:面向团队。除了更高的额度,还有团队管理、成员协作、数据隔离这些企业特性。适合公司/团队统一采购。个人不用考虑。

**Enterprise**:大企业定制,有专门的销售对接,普通人接触不到,跳过。

选择建议非常直接:**个人先上 Plus**,用一段时间觉得额度真的不够,再升 Pro。团队走 Team/Business。别一上来就买 Pro,大概率用不满,浪费钱。

还有一个常被问的:API Key 算哪档?这是另一条计费线——你在 platform\\.openai\\.com 充 API 余额,按调用量付费,跟 ChatGPT 订阅是两套体系。API 方式适合自动化、CI 这类程序化场景,正常人个人使用,订阅制\\(Plus/Pro\\)通常比 API 划算。这个第 9 章会专门讲。

## 第 7 章 国内如何订阅 ChatGPT Plus\\(支付方式详解\\)

这是国内用户最头疼的一关:OpenAI 不直接支持国内的支付方式,你拿支付宝/微信/国内信用卡,在官网那个付款页面大概率刷不过去。这一章把可行的几条路摆给你,你按自己情况选。

**第一类:自己搞境外支付方式**。如果你有境外信用卡\\(比如某些香港卡、虚拟信用卡服务发的卡\\),理论上可以直接在 ChatGPT 官网订阅。这条路最"正",续费稳定,不依赖第三方。但门槛在于你得先有那张卡,以及付款时通常需要配合合适的网络环境\\(IP 归属地最好和卡的区域一致,否则容易触发风控\\)。如果你本来就有境外卡,这是首选。

**第二类:虚拟信用卡 \\+ 境外网络**。市面上有一些虚拟信用卡服务\\(Depay 类、各种 visa/master 虚拟卡\\),充值后拿来订阅 OpenAI。能用,但要注意两点:一是选口碑好、跑路风险低的服务商;二是开卡和充值本身有手续费,算总成本。这条路灵活,但有踩坑风险,自己甄别。

**第三类:代充值 / 代订阅服务**。这是国内最多人走的路——找第三方服务,用支付宝/微信付人民币,对方帮你把账号升级到 Plus。网上搜"ChatGPT Plus 代充值""国内自助升级 ChatGPT Plus"能找到一堆。优点是省事,人民币直接付。**但风险也最大**,我必须把丑话说前面:

- 账号安全:你可能要把自己的 ChatGPT 账号密码交给对方,有被盗、被改密、关联封号的风险。能用"代付"\\(对方只帮你付款不碰你账号\\)就别用"代登录"。

- 跑路风险:小服务商可能收钱不办事,或者办了几个月就消失。

- 封号风险:代充号、共享号\\(那种几个人合用一个账号的\\)被 OpenAI 风控封号的概率明显更高,而且封了基本没法申诉。

我的建议:如果你打算认真长期用 Codex,优先想办法搞一张自己的境外卡,用自己的独立账号订阅,虽然前期麻烦,但稳。代充作为过渡可以,但别把重要工作压在一个随时可能被封的代充号上。

**第四类:干脆不订阅,走第三方中转 API**。如果你既搞不定支付,又对 OpenAI 官方账号没执念,那其实有第四条路:不订阅 ChatGPT,转而用国内的第三方中转 API\\(它们用人民币充值,提供兼容 OpenAI 协议的接口\\),在 Codex 里把 base\\_url 指过去。这条路完全绕开了订阅这一关。具体怎么配在第 10 章和第 20 章。对纯小白和"只想用上、不在乎是不是官方账号"的人,这条路反而最省心。

这一章的核心结论:订阅 ChatGPT Plus 在国内确实有门槛,但路子不止一条。能搞境外卡就搞,搞不定就走中转 API,实在要代充就挑靠谱的、用代付别用代登录、别拿重要工作冒险。

## 第 8 章 网络环境准备:代理、节点、稳定性

Codex CLI 默认要连 OpenAI 的服务器\\(api\\.openai\\.com、chatgpt\\.com 这些域名\\),国内网络直连不上。所以走"官方账号"这条路的话,你需要一个稳定的网络环境。这一章讲清楚要注意什么——注意,本书只讲技术层面的网络配置原理和稳定性,不涉及也不推荐任何具体的获取渠道,这部分请你自行依法解决。

**第一,稳定性比速度重要**。Codex 是 agent,一个任务可能要来回跟服务器交互几十次。如果你的网络时断时续,Codex 干到一半连接断了,任务就废了,体验极差。所以选网络环境时,"稳"是第一位的,偶尔慢一点能忍,频繁掉线不能忍。

**第二,注意 IP 归属和风控**。OpenAI 有风控,如果你的网络出口 IP 是那种被大量账号共用的、或者频繁变动的,容易触发账号风控甚至封号。理想情况是出口 IP 相对干净、稳定。这也是为什么不建议用那种几百人共用的廉价节点。

**第三,理解"全局"和"系统代理"的区别**。这一点在配 IDE 插件\\(尤其 Cursor\\)时特别关键。有些工具不会自动走系统代理,你开了代理它还是连不上,报"This model provider doesn't serve your region"这类错。这时候你要么开"全局/增强模式",要么在那个工具的设置里单独填代理地址。Codex CLI 相对好一些,但也建议你了解自己机器上代理是怎么生效的。

**第四,给 CLI 单独配代理的方法**。如果你的代理不是全局的,可以通过环境变量给 Codex 单独指定代理。在终端里设置 \`HTTPS_PROXY\` 和 \`HTTP_PROXY\` 环境变量指向你的本地代理端口\\(比如 \`http://127.0.0.1:7890\` 这种,具体端口看你的代理软件\\),Codex 走网络时就会用这个代理。这个方法在第 21 章会和 config\\.toml 一起细讲。

**第五,如果网络实在折腾不定,认真考虑走中转 API**。再强调一次:走第三方国内中转 API 的话,Codex 连的是国内服务器,根本不需要代理,网络问题直接消失。这是为什么我反复提中转方案——对很多国内用户,它把"账号"和"网络"两个最大的坑一次性填了。代价是模型可能不是 OpenAI 官方最新的、或者要为中转服务付费,自己权衡。

小结:走官方账号 = 要解决稳定网络\\(求稳不求快、注意 IP 风控、搞清代理生效方式\\);怕折腾 = 走中转 API 绕开网络问题。两条路,按自己情况选。

## 第 9 章 API Key 方式 vs ChatGPT 登录方式:到底怎么选

Codex 登录有两种方式,这是个很多人没搞清楚就乱配、然后报错的地方。这一章一次讲明白。

**方式一:ChatGPT 登录\\(OAuth\\)**。你用 ChatGPT 账号\\(Plus/Pro/Team 等\\)授权登录,Codex 的使用额度走你的**订阅额度**。命令是 \`codex login\`,会弹浏览器让你授权,授权完就好了。

特点:省心,不用管 API 余额,额度是订阅给的\\(每 5 小时多少条那种\\)。而且 ChatGPT 登录通常能**更早用上最新的模型**。对绝大多数个人开发者,这是推荐方式。

**方式二:API Key 登录**。你在 platform\\.openai\\.com 创建一个 API Key,配给 Codex,使用走 **API 按量计费**\\(用多少花多少钱\\),跟订阅是两套账。

特点:适合**程序化、自动化场景**——CI/CD 流水线、定时脚本、需要稳定无人值守的任务。因为这些场景里你没法每次都去点浏览器授权,API Key 是写死在环境里的,更适合机器跑。缺点:正常人手动使用的话,API 通常比订阅贵;而且 API 拿到新模型的时间有时会比 ChatGPT 登录晚一点。

怎么选,记这个口诀:

- **个人日常手动用 → ChatGPT 登录**\\(省心、可能更早用上新模型、订阅更划算\\)

- **自动化 / CI / 脚本 / 无人值守 → API Key**\\(适合机器跑、计费清晰\\)

- **走国内第三方中转 → 用 API Key 的形式,但 base\\_url 指向中转服务**\\(见第 10、20 章\\)

特别注意一个安全红线:**API Key 是密码级的机密,绝对不能泄露**。别把它直接写进会提交到 Git 的文件里,别在公开场合\\(截图、issue、群聊\\)贴出来。正确做法是放进环境变量,或者放进 \`~/.codex/\` 下不会被提交的配置里。一旦泄露,有人能拿你的 Key 疯狂调用,账单算你的。这一点第 21 章和第 34 章还会强调。

还有个实操细节:ChatGPT 登录后,登录凭证会缓存在 \`~/.codex/\` 目录下\\(Windows 是对应的用户目录\\)。如果你换了机器、或者授权过期,重新 \`codex login\` 一次即可。要登出就 \`codex logout\`。

## 第 10 章 国内中转 API 方案详解\\(base\\_url 配置思路\\)

这一章是给"搞不定官方账号/网络,或者想用国内服务省心"的同学准备的核心方案。把原理讲透,具体字段第 20 章再配。

**先理解原理**。Codex CLI 默认调用 \`api.openai.com\`。但 Codex 设计上支持"OpenAI 兼容协议"——意思是,任何一个对外提供"长得跟 OpenAI 一样的 API 接口"的服务,Codex 都能连。所以国内冒出来很多"中转服务"或"兼容端点",它们在国内有服务器,提供兼容 OpenAI 协议的接口,你只要在 Codex 的配置里把请求地址\\(base\\_url\\)从 \`api.openai.com\` 改成它们的地址,再填上它们给你的 Key,Codex 就会去连国内服务器,而不是 OpenAI。

**这样做的好处**:第一,不用翻墙——连的是国内服务器;第二,不用境外账号——用人民币在中转服务那充值就行;第三,网络稳定。一句话:把"账号"和"网络"两个坑一次性绕过去了。

**代价和风险**:第一,你用的模型取决于中转服务支持哪些。有的中转能提供 GPT\\-5\\-Codex 这一系列\\(那体验最接近官方\\),有的只提供 DeepSeek、Claude、Kimi 等其他模型\\(那就不是"真 Codex 模型"了,只是借 Codex 这个壳跑别的模型,能用但效果有差异\\);第二,你的代码和请求会经过第三方服务器,**有数据安全顾虑**——别拿它处理敏感/涉密代码;第三,中转服务良莠不齐,有跑路、限速、偷偷降级模型的风险,挑口碑好的。

**配置长什么样\\(先有个印象,第 20 章细讲\\)**。核心就是在 \`~/.codex/config.toml\` 里加一段,告诉 Codex:用哪个 provider、provider 的 base\\_url 是什么、用哪个模型。大致结构是这样\\(占位,实际值填你服务商给的\\):

\`\`\`TOML
model = "gpt-5-codex"          # 改成你的服务商支持的模型名
model_provider = "custom"       # 给你的 provider 起的名字

[model_providers.custom]
name = "custom"
base_url = "https://你的中转服务地址/v1"   # 服务商给你的 API 地址
wire_api = "responses"          # 协议类型,看服务商文档
\`\`\`

然后把 API Key 通过环境变量提供\\(比如 \`OPENAI_API_KEY\`\\)。这样 Codex 就改连你指定的国内端点了。

**重要提醒**:有些配置项是不允许在项目级配置里改的\\(比如 \`openai_base_url\`、\`model_provider\` 这类涉及凭证和请求去向的 key\\),只能在用户级的 \`~/.codex/config.toml\` 里设。Codex 这么设计是出于安全——防止你打开一个不信任的项目,它偷偷把你的请求和凭证导到别处。所以中转配置要写在你自己的用户级配置里。这点第 18、23 章会专门讲清楚。

**怎么验证配好了**:配完跑一句简单任务,比如 \`codex "用一句话介绍你自己"\`,如果它正常回应、没报连接错误,就说明通了。如果报 region、连接超时、401 这类错,大概率是 base\\_url、Key、或 wire\\_api 填错了,对着服务商文档逐项核对。

这一章你要带走的认知:**Codex 不是只能连 OpenAI,它支持兼容协议,这给了国内用户一条绕过账号和网络的路**。这条路省心,但要接受"模型可能非官方、有数据安全顾虑、要挑靠谱服务商"这三个代价。

# 第三部分:动手安装,跑通第一个任务

## 第 11 章 安装前置:Node\\.js 全流程\\(Windows / Mac\\)

Codex CLI 主要通过 npm 安装,而 npm 是 Node\\.js 自带的包管理器。所以装 Codex 之前,你机器上得先有 Node\\.js。官方要求 Node 18 以上,我建议直接装 22 或更新的 LTS 版本,省得遇到兼容问题。这一章手把手装 Node。

**先检查你是不是已经装了**。打开终端\\(Windows 是 PowerShell 或 Windows Terminal,Mac 是"终端"App\\),输入:

\`\`\`Bash
node -v
npm -v
\`\`\`

如果两条都打印出版本号\\(比如 v22\\.x\\.x\\),并且 node 版本 ≥ 18,那你跳过这一章,直接去第 12 / 13 章。如果提示"找不到命令"或者版本太老,往下看。

**Windows 装 Node\\.js**。最省事的方式是用 winget\\(Win10/11 自带的包管理器\\)。打开 PowerShell,输入:

\`\`\`PowerShell
winget install OpenJS.NodeJS.LTS
\`\`\`

等它装完,**关掉 PowerShell 重新打开**\\(这一步很重要,不重开新窗口,PATH 环境变量不刷新,你 \`node -v\` 还是找不到\\),再 \`node -v\` 验证。

如果你不喜欢命令行,也可以去 Node\\.js 官网下载 LTS 版本的 \\.msi 安装包,双击一路下一步,装完同样重开终端验证。

**Mac 装 Node\\.js**。如果你装了 Homebrew\\(Mac 上最常用的包管理器\\),一行搞定:

\`\`\`Bash
brew install node
\`\`\`

没装 Homebrew 的话,要么先装 Homebrew\\(去它官网复制那行安装命令\\),要么去 Node\\.js 官网下 macOS 的 \\.pkg 安装包双击安装。装完 \`node -v\` 验证。

**国内 npm 加速\\(强烈建议先做\\)**。npm 默认从国外源下载,国内慢得令人发指,而且经常下到一半断。装 Codex 之前先把 npm 源换成国内镜像,后面省心一万倍。执行:

\`\`\`Bash
npm config set registry https://registry.npmmirror.com
\`\`\`

这行的意思是把 npm 的下载源换成淘宝\\(npmmirror\\)的国内镜像。验证一下:

\`\`\`Bash
npm config get registry
\`\`\`

打印出 \`https://registry.npmmirror.com\` 就对了。**这一步是国内安装 90% 卡顿问题的解药**,务必先做。

**一个常见坑:权限**。Mac/Linux 上全局安装 npm 包\\(\`-g\`\\)有时会报权限错误\\(EACCES\\)。不建议用 \`sudo\` 硬装\\(后患无穷\\),正确做法是配置一下 npm 的全局目录到你自己有权限的地方。如果你遇到了,第 17 章排查清单里有详细解法,先记着有这回事。

装完 Node、换好源,前置就齐了。下一章开始装 Codex 本体。

## 第 12 章 Windows 安装 Codex CLI 完整步骤

Windows 用户单独开一章,因为坑相对多一点。先给结论:**Windows 上有两条路——原生安装,或者 WSL2 里安装**。能用原生就用原生\\(简单\\),原生遇到沙箱/权限问题再上 WSL2\\(第 14 章\\)。

**前提检查**。确认这三样齐了:Node\\.js ≥ 18\\(\`node -v\` 验证过\\)、npm 源已换国内镜像\\(第 11 章\\)、网络环境就绪\\(走官方账号需要代理,走中转不需要\\)。Git 建议也装上,后面 Codex 干活经常要用到 git。

**第一步:安装**。打开 PowerShell 或 Windows Terminal,执行:

\`\`\`PowerShell
npm install -g @openai/codex
\`\`\`

如果你前面没换 npm 源、又觉得慢,可以临时指定镜像源:

\`\`\`PowerShell
npm install -g @openai/codex --registry=https://registry.npmmirror.com
\`\`\`

**第二步:验证安装**。装完执行:

\`\`\`PowerShell
codex --version
\`\`\`

打印出版本号\\(比如 0\\.130\\.x\\)就说明装好了。如果提示 \`codex\` 不是内部或外部命令——这是 Windows 最经典的坑,意思是 npm 的全局安装目录不在系统 PATH 里。解法:先 \`npm config get prefix\` 看看全局目录在哪\\(通常是类似 \`C:\\Users\\你的名字\\AppData\\Roaming\\npm\`\\),确认这个路径在你的系统环境变量 PATH 里;不在就手动加进去,然后**重开终端**\\(再次强调,PATH 改了必须重开窗口\\)。

**第三步:登录**。执行:

\`\`\`PowerShell
codex login
\`\`\`

它会弹出浏览器让你用 ChatGPT 账号授权\\(走官方账号的话\\)。授权成功,终端会提示登录完成。如果你走中转 API,这一步不用 login,直接去配 config\\.toml\\(第 20 章\\),用环境变量提供 Key。

**第四步:启动**。在你想让 Codex 工作的项目文件夹里,执行:

\`\`\`PowerShell
cd 你的项目路径
codex
\`\`\`

进入交互界面,你就可以开始给它派活了。

**Windows 特别提醒**。如果你是 Windows 10 用户,Codex 原生能用,但在沙箱、权限上偶尔会遇到一些策略问题\\(比如执行策略不允许、沙箱用户启动失败之类的错\\)。Win11 体验更顺。如果你原生折腾不顺,官方和社区的共识是:**Windows 用户卡住了就上 WSL2**\\(第 14 章\\),WSL2 是个完整的 Linux 环境,Codex 在里面跑最舒服,坑最少。另外,对完全不想碰命令行的 Windows 用户,直接用 Codex App\\(图形界面\\)也是合理选择。

## 第 13 章 macOS / Linux 安装 Codex CLI 完整步骤

Mac 和 Linux 用户,Codex 装起来比 Windows 省心,因为它本来就是 Unix 环境长大的工具。

**前提检查**。同样三样:Node\\.js ≥ 18、npm 国内源、网络就绪。Git 一般 Mac/Linux 自带或很容易装。

**Mac 安装,两种方式任选**。

方式一,用 npm\\(通用,推荐\\):

\`\`\`Bash
npm install -g @openai/codex
\`\`\`

方式二,用 Homebrew\\(如果你习惯用 brew 管理软件\\):

\`\`\`Bash
brew install --cask codex
\`\`\`

两种都行。npm 方式的好处是和 Linux 一致、升级方便;brew 方式的好处是和你其他 brew 软件统一管理。新手用 npm 那条即可。

**Linux 安装**。直接 npm:

\`\`\`Bash
npm install -g @openai/codex
\`\`\`

各发行版\\(Ubuntu/Debian/CentOS 等\\)只要 Node 装好了,这条命令通用。

**验证**:

\`\`\`Bash
codex --version
\`\`\`

**登录**:

\`\`\`Bash
codex login
\`\`\`

弹浏览器授权\\(官方账号\\)。如果是在没有图形界面的远程 Linux 服务器上,浏览器弹不出来,可以用设备授权\\(device auth\\)或者把 access token 通过 stdin 传入——\`codex login --help\` 看具体选项。走中转的话同样跳过 login,配 config\\.toml。

**启动**:

\`\`\`Bash
cd 你的项目目录
codex
\`\`\`

**Mac/Linux 常见坑:全局安装权限\\(EACCES\\)**。如果 \`npm install -g\` 报权限错误,别急着 \`sudo\`。推荐的干净解法是给 npm 配一个你自己拥有权限的全局目录:

\`\`\`Bash
mkdir -p ~/.npm-global
npm config set prefix '~/.npm-global'
\`\`\`

然后把 \`~/.npm-global/bin\` 加到你的 PATH 里。具体做法:编辑你的 shell 配置文件\\(用 bash 就是 \`~/.bashrc\`,用 zsh——Mac 默认——就是 \`~/.zshrc\`\\),在末尾加一行:

\`\`\`Bash
export PATH=~/.npm-global/bin:$PATH
\`\`\`

保存后执行 \`source ~/.zshrc\`\\(或 \`source ~/.bashrc\`\\)让它生效,再重新 \`npm install -g @openai/codex\`。这样就不需要 sudo,也不会污染系统目录。

**升级 Codex**。Codex 迭代很快,隔三差五升一下能少踩很多坑。升级方式:

\`\`\`Bash
npm install -g @openai/codex@latest
\`\`\`

或者 Codex 自带的自更新\\(新版本支持\\):

\`\`\`Bash
codex --upgrade
\`\`\`

\\(具体子命令以 \`codex --help\` 为准,不同版本可能略有差异。\\)

到这里,Mac/Linux 用户已经装好、登录、能启动了。一个非常实用的习惯:**当你发现网上某篇教程里的界面、命令、菜单和你本机对不上时,第一件事不是怀疑自己,而是先升级一次 Codex**——大概率是教程写的版本和你装的版本不一样。Codex 这半年改动太频繁了,升级到最新再对照,能解决一大半"怎么跟教程不一样"的困惑。

## 第 14 章 WSL2 环境搭建\\(Windows 用户进阶\\)

上一章说了,Windows 原生跑 Codex 卡住了就上 WSL2。这一章手把手把 WSL2 搭起来。先解释一下 WSL2 是啥:它是微软官方提供的"在 Windows 里跑一个完整 Linux"的技术,你不用装双系统,也不用开虚拟机,一条命令就能在 Windows 里多出一个 Ubuntu 环境。Codex 在这个 Linux 环境里跑,沙箱、权限、命令执行全都顺,坑比 Windows 原生少一大截。很多 Windows 重度用户最后都搬到 WSL2 上去了。

**第一步:开启 WSL**。用管理员身份打开 PowerShell\\(右键开始菜单选"终端\\(管理员\\)"或"PowerShell\\(管理员\\)"\\),执行:

\`\`\`PowerShell
wsl --install
\`\`\`

这一条命令会自动帮你开启必要的 Windows 功能,并默认装一个 Ubuntu。装完它会让你**重启电脑**,重启。

**第二步:初始化 Ubuntu**。重启后,开始菜单里会多出一个 Ubuntu,点开。第一次启动它会让你设一个 Linux 用户名和密码\\(这个密码是 Linux 里 sudo 用的,自己记住,跟 Windows 登录密码没关系\\)。设完你就进入了一个完整的 Ubuntu 终端。

**第三步:在 WSL2 里装 Node 和 Codex**。注意,现在你在 Linux 环境里,所以用的是 Linux 的装法\\(第 13 章那套\\),不是 Windows 的。先更新一下包列表,再装 Node。最省心的是用 nvm\\(Node 版本管理器\\)装 Node:

\`\`\`Bash
sudo apt update
curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
# 装完重开终端,或者 source ~/.bashrc
nvm install 22
\`\`\`

\\(如果上面那个 curl 因为网络下不下来,可以用国内镜像的安装方式,或者直接用 apt 装 nodejs,但 apt 源里的 Node 版本通常偏老,确认 \`node -v\` ≥ 18。\\)

然后换 npm 源、装 Codex:

\`\`\`Bash
npm config set registry https://registry.npmmirror.com
npm install -g @openai/codex
codex --version
\`\`\`

**第四步:文件放哪很关键**。WSL2 里访问 Windows 的文件\\(路径类似 \`/mnt/c/Users/你/...\`\\)是能访问的,但跨系统读写性能差、还容易有权限问题。**强烈建议你把项目放在 Linux 自己的家目录里**\\(也就是 \`~/\` 或 \`/home/你的用户名/\` 下\\),Codex 在这里跑性能最好、坑最少。需要在 Windows 里用资源管理器看这些文件的话,在地址栏输入 \`\\\\wsl$\` 就能浏览 WSL 的文件系统。

**第五步:在 WSL2 里登录和启动**。和 Linux 一样:

\`\`\`Bash
codex login
cd ~/你的项目
codex
\`\`\`

\`codex login\` 在 WSL2 里弹浏览器授权时,通常会自动调起 Windows 的默认浏览器,授权完回到终端即可。如果没自动弹,它会打印一个链接,你手动复制到浏览器打开。

**什么时候该用 WSL2,什么时候不用**?如果你 Windows 原生装完一切顺、任务跑得好,那就别折腾 WSL2,没必要。只有当你遇到原生环境下的沙箱报错、执行策略限制、权限问题,或者你本来就偏好 Linux 工作流,再上 WSL2。它是"Plan B",不是必选项。

## 第 15 章 第一次启动与登录授权:每个画面都讲清楚

装好之后第一次启动,新手最容易在这一步发懵——一堆英文提示,不知道该选啥。这一章把第一次启动会遇到的画面挨个讲。

在项目目录里敲 \`codex\` 回车后,典型流程是这样的:

**第一关:信任目录\\(trust\\)**。Codex 第一次在某个目录运行时,会问你是否信任这个目录\\(trust this folder\\)。原因前面讲过——Codex 会读这个目录里的配置和 AGENTS\\.md,如果是个来路不明的项目,这些文件可能让 Codex 做你不希望的事。所以它谨慎地问一句。如果这是你自己的项目,选信任\\(trust\\)。如果你只是想看看一个刚下载、还没审过的陌生项目,可以选不信任,这样它会跳过项目级的 \`.codex/\` 配置,更安全。

**第二关:登录\\(如果还没登录\\)**。如果你还没 \`codex login\` 过,它会提示你登录。两个选项:用 ChatGPT 账号登录\\(Sign in with ChatGPT\\),或者用 API Key。个人用户选前者,弹浏览器授权;走中转或 CI 的选后者/或提前在 config\\.toml 配好。授权成功后,Codex 会把凭证缓存在 \`~/.codex/\` 下\\(Windows 是对应用户目录\\),以后就不用再登了,除非过期。

**第三关:选模型 / 推理强度\\(可能出现\\)**。有些版本启动或在会话里会让你选用哪个模型、推理强度\\(reasoning effort\\)高还是中还是低。推理强度越高,它"想"得越深、质量越好,但越慢越费额度。新手默认即可,后面第 19 章会教你按任务类型调。

**第四关:进入交互界面\\(TUI\\)**。前面都过了,你就进到 Codex 的主界面——一个终端里的对话框,下方是输入区,你在这里打字给它派活。这个界面叫 TUI\\(Terminal UI\\),第 24 章会把界面每个区域讲一遍。

**关于登录的几个实用命令**:

- 重新登录:再跑一次 \`codex login\`

- 登出:\`codex logout\`

- 看当前登录状态/帮助:\`codex login --help\`

**一个高频疑问:浏览器授权成功了,终端却提示失败**。这是国内用户常遇到的,原因通常是:授权回调走的是本地端口\\(Codex 在本地起了个临时服务接收授权回调\\),如果你的网络/代理设置把这个本地回调拦了,就会"浏览器说成功、终端说失败"。解法:确认你的代理没有拦截 127\\.0\\.0\\.1 / localhost 的本地回环;在 WSL2 下确认回调能正确传回。实在不行换设备授权方式\\(device auth\\)。第 17 章排查清单里有更细的处理。

## 第 16 章 跑通你的第一个任务:从 "Hello" 到真改代码

环境通了,我们来真刀真枪跑第一个任务,体会一下 agent 和聊天的区别。

**热身:先确认它活着**。在交互界面里直接打一句中文:

\`\`\`Plain Text
用一句话介绍你自己,确认你能正常工作
\`\`\`

正常的话它会回你一句。如果这里就报错\\(连接超时、region、401\\),别往下走,回第 17 章排查网络/Key/base\\_url。

**第一个真任务:让它在你的目录里创建文件**。试试这句:

\`\`\`Plain Text
在当前目录创建一个 hello.py,功能是打印 "你好,Codex",然后运行它,把输出贴给我看
\`\`\`

注意观察它的行为,这是体会"agent"的关键时刻:

1. 它会说要创建 \`hello.py\`,把内容给你看;

2. 因为"创建文件"是写操作,在默认沙箱下,它可能会**停下来请求批准**\\(approval\\)——问你"我要写这个文件,行吗"。看清楚它要写啥,确认无误就批准;

3. 批准后它真的把文件写进你的目录;

4. 然后它要"运行它",运行命令也是个动作,可能再请求一次批准;

5. 批准后它执行 \`python hello.py\`,把输出 \`你好,Codex\` 贴回来给你。

整个过程你会非常直观地感受到:它不是在"假装"给你代码,它是**真的进了你的目录、真的写了文件、真的跑了命令**。这就是 agent。跑完你去文件夹里看,\`hello.py\` 真的躺在那。

**第二个任务:让它读懂再修改**。如果你手头有个现成的小项目,试试:

\`\`\`Plain Text
读一下这个项目的 README 和主入口文件,用通俗的话告诉我它是干嘛的,核心流程是什么
\`\`\`

它会自己去读文件\\(读是只读操作,一般不用批准\\),然后给你一份导读。这一步展示的是它"主动读你的仓库"的能力。

**第三个任务:让它干一件有改动的实事**。比如你有个函数没注释:

\`\`\`Plain Text
给 utils.py 里的每个函数加上中文 docstring 注释,不要改动任何逻辑
\`\`\`

注意这句话里我特意加了"不要改动任何逻辑"——这是和 Codex 打交道的一个好习惯:**把你的边界和约束明确写出来**。Codex 以听话著称,你划清楚范围,它就老老实实在范围内干,不会顺手重构。改完它会给你看 diff\\(改动对比\\),你逐行审一下,满意就接受。

**跑完第一批任务后,你该养成的三个习惯**:

第一,**任务说清楚边界**。别只说"优化一下这个文件",要说"优化这个文件的性能,但保持函数签名不变,不要引入新依赖"。约束越清楚,结果越可控。

第二,**改动一定要审 diff**。Codex 再听话也是 AI,会出错。每次它改完,花十几秒看一眼 diff,确认改对了再接受。养成这个习惯,你永远不会被它坑。

第三,**危险操作保持"会问"**。第一阶段别急着关掉审批\\(别用 \`--ask-for-approval never\`\\),让它每次写文件、跑命令、装依赖都问你一下,你看清楚再放行。等你熟了、信任它了,再按第 32 章放宽。

## 第 17 章 安装与使用高频报错排查清单\\(17 个真实坑\\)

这一章是"急救手册",建议收藏。把国内用户装 Codex、用 Codex 最常撞的坑和解法列成清单,遇到报错按这个表对。

**坑 1:****\`codex\`**** 不是内部或外部命令 / command not found**。原因:npm 全局目录不在 PATH。解法:\`npm config get prefix\` 看全局目录,把它的 bin 子目录加进系统 PATH,**重开终端**。Windows 全局目录通常是 \`AppData\\Roaming\\npm\`。

**坑 2:****\`npm install\`**** 卡住不动 / 下载超时**。原因:没换国内源。解法:\`npm config set registry https://registry.npmmirror.com\`,重装。这是国内 90% 安装卡顿的根因。

**坑 3:****\`node -v\`**** 找不到或版本太老**。原因:Node 没装好或版本 \\< 18。解法:重装 Node\\(第 11 章\\),装完重开终端。WSL2 里用 nvm 装新版本。

**坑 4:Mac/Linux 全局安装报 EACCES 权限错误**。原因:全局目录没权限。解法:别用 sudo,改用 \`~/.npm-global\` 自有目录\\(第 13 章详解\\),配好 PATH 再装。

**坑 5:浏览器授权成功但终端提示失败**。原因:本地回调端口被代理/防火墙拦,或网络回环异常。解法:确认代理不拦 127\\.0\\.0\\.1/localhost;WSL2 下确认回调能传回;换设备授权 device auth。

**坑 6:报 region 相关错\\(does not serve your region / unsupported region\\)**。原因:网络出口 IP 所在地区不被服务。解法:走官方账号的话,调整到合适的网络环境\\(注意稳定和 IP 干净\\);走中转 API 的话这个问题不存在。

**坑 7:401 Unauthorized**。原因:API Key 错、过期、没正确传入。解法:核对 Key 是否填对、是否通过正确的环境变量传入、中转服务的 Key 是否还有余额。

**坑 8:连接超时 / 网络错误\\(走官方账号\\)**。原因:代理不稳或没生效。解法:确认代理在跑、Codex 走了代理\\(必要时设 HTTPS\\_PROXY 环境变量,第 21 章\\);求稳别求快。

**坑 9:Cursor / IDE 插件里调 Codex 报 region 但 CLI 正常**。原因:IDE 没走系统代理。解法:在 IDE 设置里搜 proxy 单独填代理,或开全局/增强模式;实在不行用 CLI。

**坑 10:Windows 执行策略错误 / 沙箱用户启动失败**。原因:Windows\\(尤其 Win10\\)策略不允许沙箱用户按需启动命令。解法:升级到 Win11,或者直接上 WSL2\\(第 14 章\\)。

**坑 11:界面/命令和教程对不上**。原因:版本不一致。解法:先升级 \`npm install -g @openai/codex@latest\`,再对照。Codex 改得太频繁了。

**坑 12:中转 API 配了还是连官方 / 不生效**。原因:base\\_url、model\\_provider 配错位置或拼写错。解法:确认写在**用户级** \`~/.codex/config.toml\`\\(项目级配不了这些 key\\),核对 base\\_url 末尾的 \`/v1\`、model 名是否服务商支持、wire\\_api 是否正确。

**坑 13:中转能连但模型回答很差 / 不像 Codex**。原因:中转服务其实给你接的是别的模型\\(DeepSeek/Claude 等\\),不是 GPT\\-5\\-Codex。解法:看服务商支持哪些模型,把 model 改成它真正支持的 codex 系列;或接受用替代模型。

**坑 14:任务跑到一半断了**。原因:网络掉线,或上下文塞满。解法:网络求稳;长任务中途 \`/compact\` 压缩上下文;断了用 \`codex resume\` 续接\\(第 30 章\\)。

**坑 15:Codex 改了一堆你没让它改的东西**。原因:指令边界没说清。解法:任务里明确写"只改 X,不要动 Y";改完审 diff,不对就拒绝。

**坑 16:它要执行危险命令\\(rm、删目录、装陌生包\\)**。原因:它判断需要,但你不放心。解法:**这时审批机制救了你**——别无脑批准,看清命令,拿不准就拒绝、让它换个安全做法\\(第 34 章\\)。

**坑 17:额度用完了 / rate limit**。原因:订阅档位的额度\\(每 5 小时 N 条\\)用尽。解法:等额度刷新,或升级档位\\(Plus→Pro\\),或这段时间切到中转 API 的 provider 顶一下。

排查的总思路:**先分清是"装的问题"还是"网络/账号的问题"还是"用法的问题"**。装的问题看 PATH 和源;网络账号问题看代理、Key、base\\_url、region;用法问题看指令边界和审批。对症下药,别一报错就重装。

# 第四部分:核心配置 config\\.toml,把 Codex 调成你的样子

## 第 18 章 config\\.toml 文件结构全解

Codex 的所有配置都集中在一个文件里:\`~/.codex/config.toml\`\\(Windows 在对应用户目录下的 \`.codex\` 文件夹\\)。这个文件用 TOML 格式写,长得有点像 ini 配置。这一章先带你认识它的整体结构,后面几章逐项配。

**先找到/创建这个文件**。Mac/Linux:\`~/.codex/config.toml\`。如果不存在,自己建一个:

\`\`\`Bash
mkdir -p ~/.codex
touch ~/.codex/config.toml
\`\`\`

Windows\\(PowerShell\\):

\`\`\`PowerShell
mkdir $env:USERPROFILE\\.codex -ErrorAction SilentlyContinue
notepad $env:USERPROFILE\\.codex\\config.toml
\`\`\`

**TOML 语法速成\\(三分钟够用\\)**。你只要懂三种写法就能配 Codex:

- 键值对:\`model = "gpt-5-codex"\`\\(字符串用双引号,数字和 true/false 不用\\)

- 表\\(table\\),用方括号:\`[model_providers.custom]\` 表示下面这一段属于这个 provider

- 数组:\`profile_doc_fallback_filenames = ["A.md", "B.md"]\`

就这三样。一个小坑:**TOML 文件别用带 BOM 的编码或非 ASCII 的奇怪编码保存**,用 UTF\\-8\\(无 BOM\\)或纯 ASCII,否则 Codex 可能解析报错。Windows 用记事本存的时候注意编码选项。

**config\\.toml 里你最常配的几块**\\(后面分章细讲\\):

1. **默认模型和推理强度**:\`model\`、\`model_reasoning_effort\`\\(第 19 章\\)

2. **模型提供商**:\`model_provider\` 和 \`[model_providers.xxx]\`,接第三方/国内中转用\\(第 20 章\\)

3. **沙箱和审批**:\`sandbox_mode\`、\`approval_policy\`\\(第 31、32 章\\)

4. **MCP 服务器**:\`[mcp_servers.xxx]\`\\(第 41 章\\)

5. **AGENTS\\.md 相关**:\`project_doc_fallback_filenames\`、\`project_doc_max_bytes\`\\(第 38 章\\)

6. **子代理 / 技能**:\`[agents]\`、\`[[skills.config]]\`\\(第 42、43 章\\)

**一个非常重要的安全设计,现在就要知道**:并不是所有配置都能在"项目级"配置文件里改。Codex 把一些涉及凭证去向、请求路由、配置切换的 key 锁死在**用户级** \`~/.codex/config.toml\` 里,在项目级的 \`.codex/config.toml\` 里写这些 key 会被忽略并打印警告。这些被锁的 key 包括:\`openai_base_url\`、\`chatgpt_base_url\`、\`model_provider\`、\`model_providers\`、\`notify\`、\`profile\`、\`profiles\` 等。为什么这么设计?防止你打开一个不信任的项目,它在项目配置里偷偷把你的请求和凭证导去别处。所以记住:**接中转、换 provider 这类配置,只能写在用户级 config\\.toml**。第 23 章会把项目级和用户级的关系讲透。

**改完怎么生效**:改了 config\\.toml 后,重启 Codex\\(退出再 \`codex\`\\)或开新会话,新配置才加载。

## 第 19 章 配置默认模型与推理强度

这一章教你两个最常调的参数:用哪个模型、想多深。

**model:用哪个模型**。在 config\\.toml 顶部\\(或对应 provider 下\\)写:

\`\`\`TOML
model = "gpt-5-codex"
\`\`\`

模型名要填你的账号/服务商实际支持的。走官方 ChatGPT 登录的话,通常用 GPT\\-5\\-Codex 这一系列\\(专为编程和工具调用优化的\\);版本号会更新\\(社区里见过 gpt\\-5\\.3\\-codex、gpt\\-5\\.4 之类的迭代命名\\),**以官方文档和你账号里能选到的为准**。不确定填啥,先不写这行,用默认的,或者在交互界面里看它给你哪些模型选项。

**model\\_reasoning\\_effort:推理强度**。这个参数控制模型"想多深":

\`\`\`TOML
model_reasoning_effort = "high"   # 可选 low / medium / high(具体档位以版本为准)
\`\`\`

怎么选?给你一个实用对应表:

- **low\\(低\\)**:简单、机械的任务,比如批量改文件名、加注释、格式化。要的是快和省额度,不需要它深思。

- **medium\\(中\\)**:大多数日常开发任务的默认,写功能、改 bug、补测试。平衡。

- **high\\(高\\)**:复杂任务——架构设计、读懂大型陌生项目、查难缠的 bug、做有风险的重构。让它使劲想,质量优先,慢和费额度可以接受。

我的实战习惯:config\\.toml 里默认设 medium,遇到硬骨头任务,临时通过命令行参数或会话内切到 high。**别一直挂着 high**——又慢又费额度,简单任务用 high 是浪费。

**复习一下:模型和壳是两头**。model / reasoning 调的是"模型那一头",决定它聪明到什么程度;后面的沙箱、审批调的是"壳那一头",决定它能干什么。两头分开理解,配起来不乱。

**临时覆盖**:config\\.toml 设的是默认值。某次想临时换,可以在启动时用命令行参数覆盖,或在交互界面里切换,不用每次改文件。\`codex --help\` 能看到对应的参数。

## 第 20 章 配置 model\\_providers 接入国内/第三方 API\\(国内核心\\)

这是国内用户的核心章节,把第 10 章讲的原理落实成可抄的配置。再强调:这段配置**必须写在用户级** \`~/.codex/config.toml\`\\(项目级配不了\\)。

**完整配置模板**\\(占位值替换成你服务商给的\\):

\`\`\`TOML
# 1. 指定默认用哪个 provider 和模型
model = "gpt-5-codex"            # 改成你的服务商支持的模型名
model_provider = "custom"        # 引用下面定义的 provider,名字随便起但要一致
model_reasoning_effort = "high"  # 可选

# 2. 定义这个 provider
[model_providers.custom]
name = "custom"
base_url = "https://你的服务商地址/v1"   # 服务商给的 API 地址,注意通常以 /v1 结尾
wire_api = "responses"           # 协议类型,看服务商文档(常见 responses 或 chat)
env_key = "OPENAI_API_KEY"       # 从哪个环境变量取 Key(见下)
\`\`\`

**逐行解释**:

- \`model_provider = "custom"\`:告诉 Codex 默认用名为 custom 的那个 provider。这个名字你自己起,但要和下面 \`[model_providers.custom]\` 里的一致。

- \`base_url\`:最关键的一行,请求发到哪。从 \`api.openai.com\` 改成你服务商的地址,这就是"中转"的本质。注意结尾的 \`/v1\` 加不加要看服务商怎么要求,文档里会写。

- \`wire_api\`:用哪套接口协议。Codex 支持 \`responses\`\\(OpenAI 的 Responses API 风格\\)和 \`chat\`\\(传统 chat completions 风格\\)。**填错这个是最常见的"配了连不上"的原因之一**,务必照服务商文档填。

- \`env_key\`:Codex 去哪个环境变量里拿 API Key。这样 Key 不写死在文件里,更安全。

**提供 API Key 的两种方式**:

方式一,设环境变量\\(推荐\\)。Mac/Linux 在 \`~/.zshrc\` 或 \`~/.bashrc\` 里加:

\`\`\`Bash
export OPENAI_API_KEY="你的服务商Key"
\`\`\`

\`source\` 一下生效。Windows\\(PowerShell\\)临时设:

\`\`\`PowerShell
$env:OPENAI_API_KEY="你的服务商Key"
\`\`\`

要永久设就用系统环境变量设置界面加进去。

方式二,临时一次性用\\(适合 CI / 不污染全局\\):

\`\`\`Bash
OPENAI_API_KEY="你的Key" codex "帮我给这个项目写单元测试"
\`\`\`

这种写法 Key 只对这一条命令生效,跑完就没了,适合流水线或临时测试。

**验证配好了没**:

\`\`\`Bash
codex "用一句话介绍你自己"
\`\`\`

正常回应 = 通了。报错的话对照第 17 章坑 12、坑 13:写在用户级了吗?base\\_url 对吗?wire\\_api 对吗?model 名服务商支持吗?Key 有余额吗?逐项排查。

**关于多 provider 同时配**:Codex 允许你定义多个 provider:

\`\`\`TOML
[model_providers.providerA]
name = "providerA"
base_url = "https://A的地址/v1"
wire_api = "responses"
env_key = "PROVIDER_A_KEY"

[model_providers.providerB]
name = "providerB"
base_url = "https://B的地址/v1"
wire_api = "chat"
env_key = "PROVIDER_B_KEY"
\`\`\`

然后用 \`model_provider\` 指定默认用哪个,或者用 Profiles\\(第 22 章\\)做成几套一键切换。这对国内用户很实用——一个服务商抽风了,切到另一个顶上。

**安全和数据提醒\\(必须再说一遍\\)**:中转 = 你的代码经过第三方服务器。**别拿它处理公司涉密代码、含密钥的配置、用户隐私数据**。重要项目要么走官方账号,要么本地脱敏后再让它处理。这是底线。

## 第 21 章 配置代理与网络\\(环境变量法\\)

走官方账号的同学,这一章教你怎么让 Codex 正确走代理。

**最通用的办法:环境变量**。Codex\\(以及它底层的网络请求\\)会识别标准的代理环境变量。在你的 shell 配置里\\(Mac/Linux 的 \`~/.zshrc\` / \`~/.bashrc\`,WSL2 同理\\)加上:

\`\`\`Bash
export HTTPS_PROXY="http://127.0.0.1:7890"
export HTTP_PROXY="http://127.0.0.1:7890"
export ALL_PROXY="socks5://127.0.0.1:7890"
\`\`\`

把 \`7890\` 换成你本地代理软件实际监听的端口\\(每个代理软件端口不一样,去它的设置里看\\)。\`source ~/.zshrc\` 生效。Windows\\(PowerShell\\)临时设:

\`\`\`PowerShell
$env:HTTPS_PROXY="http://127.0.0.1:7890"
$env:HTTP_PROXY="http://127.0.0.1:7890"
\`\`\`

**WSL2 的特殊情况**。WSL2 是个独立的 Linux,它访问"运行在 Windows 上的代理软件"时,\`127.0.0.1\` 在 WSL2 里指的是 WSL 自己,不是 Windows。所以代理地址要填 Windows 主机在 WSL 网络里的 IP。较新的 WSL2\\(镜像网络模式 mirrored\\)下可以直接用 \`127.0.0.1\`;老的模式下要找宿主机 IP。如果你 WSL2 里设了 127\\.0\\.0\\.1 代理连不上,这八成是原因,查一下你的 WSL 网络模式。

**不要把代理 key 写进项目配置**。前面说过,\`notify\` 这类、以及涉及请求去向的 key 项目级配不了。代理通过环境变量给最干净,不涉及 config\\.toml 的安全限制。

**验证代理生效**:设完环境变量,在同一个终端窗口里跑 \`codex "你好"\`。注意必须是设了环境变量的**同一个终端**——新开的窗口如果没 source 配置,环境变量就没了。这也是很多人"明明设了代理还是不通"的原因:设在了 A 窗口,跑在了 B 窗口。

**实在搞不定网络的终极建议**:回去看第 20 章走中转 API,连国内服务器,代理问题彻底消失。我知道我说了好几遍了,但这真的是国内用户最省心的路,值得反复强调。

## 第 22 章 Profiles:多套配置一键切换

你可能有好几种工作场景:平时用官方账号 \\+ 高推理;赶进度时用某个国内中转省额度;CI 里用 API Key \\+ 低推理。每次手动改 config\\.toml 很烦。Profiles 就是解决这个的——**把不同场景存成命名的配置,启动时一键切换**。

**怎么用**。每个 profile 是一个独立的配置文件,放在 \`~/.codex/\` 下,命名为 \`profile名.config.toml\`。比如你想要一个叫 \`transit\`\\(中转\\)的 profile:

创建 \`~/.codex/transit.config.toml\`:

\`\`\`TOML
model = "gpt-5-codex"
model_provider = "custom"
[model_providers.custom]
name = "custom"
base_url = "https://你的中转地址/v1"
wire_api = "responses"
env_key = "TRANSIT_KEY"
\`\`\`

启动时指定用这个 profile:

\`\`\`Bash
codex --profile transit
\`\`\`

这样 Codex 就加载 \`transit.config.toml\` 而不是默认的 \`config.toml\`。你可以建多个:\`work.config.toml\`、\`ci.config.toml\`、\`transit.config.toml\`,分别对应不同场景,用 \`--profile 名字\` 切换。

**注意一个细节**:用 \`--profile\` 时,Codex 写配置\\(比如开关某个 feature\\)会写到对应的 \`profile名.config.toml\`,而不是默认 config。还有,\`CODEX_HOME\` 这个环境变量可以让你整体换一套 \`.codex\` 目录\\(比如给某个项目用一套完全独立的配置和凭证\\):

\`\`\`Bash
CODEX_HOME=$(pwd)/.codex codex "列出当前生效的指令来源"
\`\`\`

这招在"某个项目要用专门的自动化账号、和你个人配置完全隔离"时特别有用。

**实战建议**:个人用户一开始用不上 Profiles,一套默认配置够了。等你真的有了"官方账号 \\+ 中转 \\+ CI"多套并存的需求,再来配 Profiles,别一上来就搞复杂。

## 第 23 章 配置文件的优先级与项目级配置

Codex 的配置可以放好几个层级,它们之间有优先级。搞懂这个,你才不会出现"我明明配了为啥不生效"的困惑。

**配置生效的优先级\\(从高到低,高的覆盖低的\\)**,大致是这样:

1. **命令行参数**\\(临时,最高\\)——你启动时带的 \`--model\`、\`--profile\` 等,当次最优先。

2. **项目级配置**:\`.codex/config.toml\`,从项目根目录往下到你当前所在目录,**越靠近你当前目录的越优先**\\(closest wins\\),且**仅限被你信任\\(trusted\\)的项目**。

3. **Profile 文件**:\`--profile 名字\` 选中的 \`~/.codex/名字.config.toml\`。

4. **用户级配置**:\`~/.codex/config.toml\`\\(默认那套,最低\\)。

**项目级配置怎么用**。在某个项目根目录建 \`.codex/config.toml\`,可以为这个项目单独设一些配置——比如这个项目专用的沙箱策略、专属的 MCP 服务器、不同的推理强度。这样团队成员 clone 下来项目,就自动带上了项目约定的 Codex 配置。

**但项目级有两个硬限制,务必记牢**:

第一,**只有"信任的项目"才加载项目级 ****\`.codex/\`**** 配置**。你第 15 章选"信任"的那个动作,就是在决定要不要加载它的项目级配置、hooks、规则。不信任的项目,这些全跳过——这是防止恶意项目通过配置文件操纵你的 Codex。

第二,**项目级配置不能改那些涉及凭证和请求去向的 key**。前面反复说的:\`openai_base_url\`、\`chatgpt_base_url\`、\`model_provider\`、\`model_providers\`、\`notify\`、\`profile\`、\`profiles\` 这些,在项目级 \`.codex/config.toml\` 里写会被忽略并警告。这些只能在用户级配。原因还是安全:不能让一个项目偷偷把你的请求和凭证导走。

**实战中怎么用这套优先级**:

- 你的**个人通用偏好**\\(默认模型、推理强度、代理、中转 provider\\)→ 写 \`~/.codex/config.toml\`\\(用户级\\)。

- 某个**项目的专属约定**\\(这个项目用什么沙箱、接什么 MCP\\)→ 写项目里的 \`.codex/config.toml\`\\(项目级,记得信任项目\\)。

- **临时一次性的覆盖** → 命令行参数。

- **多套并存的大场景**\\(官方/中转/CI\\)→ Profiles。

这样分层,既能有个人统一偏好,又能让每个项目带自己的规矩,还不会互相打架。理解了优先级,config 这块你就彻底通了。

先说一句大实话:网上关于 Codex 的教程,十篇里有八篇是互相抄的,要么只教你 \`npm install\` 一行命令就完事,要么上来就是一堆 config\\.toml 字段让你照抄,你抄完报错了也不知道为什么。这本知识库不想这样。

我自己的习惯是,工具要先搞清楚"它是干嘛的、为什么这么设计",再去记命令。因为命令会变\\(Codex 这半年版本号从 0\\.4 蹦到 0\\.13,菜单都改过好几次\\),但设计思路不太变。所以这本书的结构是这样安排的:

第一部分\\(第 1\\~5 章\\)讲认知,搞清楚 Codex 到底是个什么东西,跟你以前用过的 Copilot、Cursor 有啥不一样。这部分没有命令,但是最值钱,看懂了你后面少走一半弯路。

第二部分\\(第 6\\~10 章\\)专门解决国内用户的账号和网络问题。这是中国人用 Codex 最大的门槛,比安装本身难十倍。我会把订阅、付款、网络、中转 API 这几条路都讲清楚,你按自己情况选一条走。

第三部分\\(第 11\\~17 章\\)是真正的"动手装"。Windows、Mac、Linux、WSL2 四种环境分开讲,装完跑通第一个任务,最后给你一份高频报错排查清单。

第四到第八部分\\(第 18\\~45 章\\)是配置和进阶:config\\.toml 怎么调、斜杠命令怎么用、沙箱权限怎么管、AGENTS\\.md 怎么写、MCP 和 Skills 怎么玩。

第九部分\\(第 46\\~50 章\\)是五个完整实战案例,从读懂陌生项目到搭全栈应用再到团队落地,每个案例都是从头跟到尾的。

读的时候有个建议:如果你是纯小白,老老实实从第 1 章往后看;如果你已经会用命令行、只是想快速上手,可以直接跳到第 11 章开始装,装完回头补第 1\\~5 章的认知;如果你已经在用 Codex、只想解决某个具体问题,直接看目录定位章节。

最后提醒一句:Codex 是个迭代极快的工具,模型名\\(GPT\\-5\\-Codex 系列\\)、菜单项、个别参数随时可能变。所以本书所有命令我都会告诉你"怎么验证它在你这台机器上还成立"——比如 \`codex --version\`、\`codex --help\`、官方文档地址,而不是让你死记。工具会变,排查方法不会变,这才是保姆级该教的东西。

好,开始。

## 第 1 章 Codex 到底是什么:从"代码补全"到"AI 编程智能体"


<!-- codex-img-04-start -->

![截图 04:第1章 - Agent 能自己读文件、改代码、跑测试](codex_tutorial_images/screenshot_04_ch01.png)

*截图 04:红框标出“多步执行流”,对应本节“Agent 能自己读文件、改代码、跑测试”的操作说明。*

![配图 04:第1章 - 智能体工作流](codex_tutorial_images/generated_04_ch01.png)

*配图 04:智能体工作流,用于把本节概念视觉化。*

<!-- codex-img-04-end -->





很多人第一次听到 Codex,脑子里冒出来的是 2021 年那个给 GitHub Copilot 当后台的"Codex 模型"。我先把这个误会澄清掉:那个老 Codex 模型的 API 已经在 2023 年正式退役了。今天我们说的 Codex,是 OpenAI 在 2025 到 2026 年推出的一套全新东西,核心是一个叫 **Codex CLI** 的终端编程智能体\\(agent\\)。它是开源的,用 Rust 写的,采用 Apache\\-2\\.0 协议,在 GitHub 上的 star 数已经冲到八万多。名字一样,但完全是两回事。

那"AI 编程智能体"和你熟悉的代码补全有什么区别?这是理解 Codex 的钥匙,我用一个生活化的比喻讲清楚。

代码补全工具\\(比如早期的 Copilot 行内补全\\)像是一个站在你身后的实习生,你打字打到一半,它猜你下一行想写什么,弹个灰色提示让你按 Tab 接受。它的能力边界很清楚:它只能"建议",不能"动手"。它看不到你整个项目的结构,不会去读你另外十个文件,更不会自己跑命令、自己改文件、自己运行测试看通没通过。

Codex 不一样。你给它一句话,比如"帮这个项目的登录接口加上 JWT 鉴权,然后接上 MySQL,改完跑一遍测试",它会真的去做这一整串事:先进你的项目目录,把相关文件读一遍搞清楚现状,然后动手改代码,改完之后它自己在终端里敲命令把测试跑起来,测试挂了它还能看报错继续改。整个过程它是"自主的"——会自己把一个大任务拆成好几步,一步步执行,遇到拿不准要不要执行的危险操作\\(比如删文件、装依赖\\)才停下来问你一句"我要这么干,行不行"。

所以一句话概括:**代码补全是"建议下一行",Codex 是"替你干完整件事"**。前者是辅助打字,后者是一个能进项目、读文件、执行命令、自主完成多步任务的开发搭子。

这个差别带来的体验跳跃非常大。举个我自己常遇到的场景:接手一个别人写的、文档几乎没有的老项目。以前我得花大半天点开一个个文件去理解它的结构。现在我直接在项目根目录启动 Codex,丢一句"这个项目是干嘛的,核心模块有哪些,数据是怎么流转的,用通俗的话给我讲一遍",它会自己把项目扫一遍,然后给我一份相当靠谱的导读。这件事代码补全工具是做不到的,因为它根本不会"主动去读你的整个仓库"。

要把这个能力跑起来,Codex 依赖两样东西:一个是足够强的大模型\\(目前是 GPT\\-5\\-Codex 这一系列,专门为编程和工具调用训练过的\\),另一个是它本身这个"壳"\\(harness\\)——也就是那个用 Rust 写的、运行在你终端里的程序。模型负责"想",壳负责"读你的文件、执行命令、管理权限、维护上下文"。两者合起来才是完整的 Codex。理解这一点很重要,因为后面你会发现,很多配置\\(比如换模型、接国内中转\\)调的是"模型那一头",而很多操作\\(比如沙箱权限、审批、斜杠命令\\)管的是"壳这一头"。

这一章你只要记住三件事:第一,今天的 Codex 不是 2021 年那个老模型;第二,它是一个能自主干活的编程智能体,不是补全工具;第三,它由"模型"和"壳"两部分组成。带着这三个认知往下看,后面所有东西都好理解。

## 第 2 章 Codex 家族全景:CLI、App、IDE 插件、Cloud 四大入口


<!-- codex-img-05-start -->

![截图 05:第2章 - CLI、App、IDE、Cloud 四大入口](codex_tutorial_images/screenshot_05_ch02.png)

*截图 05:红框标出“四个入口”,对应本节“CLI、App、IDE、Cloud 四大入口”的操作说明。*

![配图 05:第2章 - 入口选择图](codex_tutorial_images/generated_05_ch02.png)

*配图 05:入口选择图,用于把本节概念视觉化。*

<!-- codex-img-05-end -->





刚接触 Codex 的人很容易懵:官网上又是 Codex CLI,又是 Codex App,又是 IDE Extension,还有个 Codex Cloud,到底装哪个?这一章我把这四个入口一次性讲清楚,讲完你就知道自己该用哪个了。

先说一个关键事实:这四个东西底层是同一套能力、同一套配置\\(它们共享 \`~/.codex/config.toml\` 这个配置文件\\),区别只在于"你从哪个界面去用它"。换句话说,你在 CLI 里配好的 MCP 服务器、AGENTS\\.md 规则,切到 IDE 插件里照样生效,不用重配。这个设计很贴心,记住它能省很多事。

**第一个入口:Codex App\\(桌面图形客户端\\)**。这是最像"软件"的那个,下载下来双击打开,界面是图形化的,你选一个项目文件夹,然后像聊天一样跟它对话、让它执行任务。适合谁?适合那种一看见黑乎乎的终端就头疼、平时也不怎么写命令行的人。如果你是产品经理、设计师、运营,或者只是想体验一下 Codex 能干啥,先装 App 是最快的。

**第二个入口:Codex CLI\\(命令行工具\\)**。这是 Codex 的"本体",运行在终端里,效率最高,功能最全。所有进阶玩法——非交互脚本、CI/CD 集成、把 Codex 当 MCP server 嵌进别的 agent——都在 CLI 上。如果你是开发者,真要把 Codex 变成日常工作流的一部分,直接上 CLI。本书绝大部分篇幅讲的也是 CLI,因为它能力最完整,学会了 CLI,其他三个入口你随便用。

**第三个入口:IDE Extension\\(编辑器插件\\)**。支持 VS Code、Cursor、Windsurf 这些主流编辑器。装上之后你不用离开编辑器,直接在侧边栏里调 Codex,改动还能在编辑器里直接看 diff。适合谁?适合那些已经习惯在某个编辑器里写代码、不想在终端和编辑器之间来回切的人。注意一点,IDE 插件和 CLI 共享同一份 config\\.toml,所以你可以 CLI、插件混着用。

**第四个入口:Codex Cloud / Web\\(云端\\)**。这个最特别——前三个都是"在你自己电脑上跑",而 Cloud 是"把任务丢到云端的后台去跑",可以并行处理多个任务。比如你睡前丢三个任务给它,让它分别在三个分支上干活,第二天起来看结果。它需要 ChatGPT 订阅\\(Plus、Team、Pro、Enterprise 都行\\),入口在 chatgpt\\.com/codex 或者 ChatGPT App 里。适合那种任务量大、想"批处理"的团队场景。

那到底先装哪个?给你一句话决策:

- 想最快上手、不碰命令行 → 先装 **Codex App**

- 想真正进开发工作流、要全部功能 → 直接装 **Codex CLI**\\(本书主线\\)

- 已经离不开 VS Code / Cursor → 装 **IDE Extension**

- 任务量大、想云端批处理 → 用 **Codex Cloud**

我的个人建议是:如果你打算认真学,直接奔 CLI 去,别在 App 上耽误时间。App 上手快,但天花板也低,你迟早要回到 CLI。而且本书后面的进阶内容,八成是围绕 CLI 展开的。

## 第 3 章 Codex 跟 Claude Code、Cursor、Copilot 到底差在哪


<!-- codex-img-06-start -->

![截图 06:第3章 - Codex 与 Cursor / Copilot / Claude Code 对比](codex_tutorial_images/screenshot_06_ch03.png)

*截图 06:红框标出“对比表”,对应本节“Codex 与 Cursor / Copilot / Claude Code 对比”的操作说明。*

![配图 06:第3章 - 工具定位图](codex_tutorial_images/generated_06_ch03.png)

*配图 06:工具定位图,用于把本节概念视觉化。*

<!-- codex-img-06-end -->





你大概率用过或听过别的 AI 编程工具。这一章横向对比一下,帮你把 Codex 在这个赛道里的位置摆正,也帮你判断它适不适合你。

先讲 **GitHub Copilot**。Copilot 最早是做行内补全起家的,后来也加了 Chat 和 Agent 模式,但它的基因还是"在编辑器里辅助你写代码"。它和编辑器\\(尤其 VS Code\\)绑得很深,体验很顺滑。但如果你要的是"把一整个任务交出去让它自主完成",Copilot 的 agent 能力相对没那么"放得开"。Codex 的定位更靠近"自主执行",它更愿意自己去跑命令、自己迭代。

再讲 **Cursor**。Cursor 是一个独立的编辑器\\(基于 VS Code 改的\\),把 AI 深度整合进了编辑体验里,Tab 补全、Cmd\\+K 改代码、Composer 多文件编辑都很强。它是"以编辑器为中心"的。Codex 则是"以 agent 为中心",CLI 是它的主场。有意思的是,你可以在 Cursor 里通过配置调用 Codex 模型\\(走 OpenAI API 计费\\),所以两者不是完全互斥。很多人的用法是 Cursor 写日常代码、Codex CLI 干重活。

然后是 **Claude Code**,这是 Codex 最直接的对标对象,两者太像了——都是终端里的编程 agent,都读你的仓库、改代码、跑命令,都有审批/权限机制,都支持 MCP。区别在哪?根据大量国内用户的实测反馈,有几个常被提到的点:Codex 在**指令遵循**上以"听话、不乱发挥"著称——你让它只改 CSS,它就只改 CSS,不会顺手把你的代码重构一遍;你让它写测试,它就写测试,不越界。这一点在团队协作里其实很重要,因为可控性高,review 起来轻松。另外 Codex 在**代码审查**\\(review\\)上口碑不错,很多人专门拿它做 PR 审查。当然 Claude Code 也有自己的强项,这两个工具本质上是"神仙打架",选哪个很大程度看你能稳定拿到哪家的账号、网络和价格。

最后说额度和价格这个现实问题。Codex 的一个明显优势是:**它的使用额度跟你的 ChatGPT 订阅绑定**。也就是说,只要你有 ChatGPT Plus 或 Pro,不用单独充 API 余额就能用 Codex CLI\\(这是 OpenAI 后来放开的政策,降低了一大截门槛\\)。额度上,GPT\\-5 这一档,Plus 用户大概每 5 小时能发 30\\~150 条消息,Pro 用户每 5 小时 300\\~1500 条\\(具体数字 OpenAI 会调,以你账号实际为准\\)。对中度使用者来说,订阅制比按 API 量计费往往更划算。

还有一个 Codex 比较突出的点:**原生支持外接模型**。通过 config\\.toml 里的 model\\_providers,你甚至可以同时配好几个不同的模型提供商,随时切换。这对国内用户尤其有用,因为这正是"接国内中转 API"的技术基础\\(第 10 章和第 20 章会细讲\\)。

总结成一句话:如果你要一个**听话、可控、擅长读代码和审查、额度跟 ChatGPT 订阅绑定、还能灵活换模型**的终端 agent,Codex 很值得用。如果你的核心诉求是顺滑的编辑器内补全体验,那 Cursor / Copilot 可能更顺手。工具没有绝对高下,合适最重要。

这一章帮你对号入座。我把最适合用 Codex 的人分成六类,看看你是哪一类,以及你该重点学本书的哪些章节。

**第一类:接手陌生项目的人**。你刚进新公司、新团队,或者接了个外包/开源项目,代码是别人写的,文档约等于没有。Codex 能在几分钟内帮你把项目结构、核心模块、数据流梳理清楚。重点看第 46 章\\(读懂陌生项目案例\\)。

**第二类:做中小规模独立开发的人**。个人开发者、独立开发者、做副业项目的人。一个人要顶一个团队,前后端、测试、部署都得自己来。Codex 能帮你把"补测试、修小 bug、写脚手架、查文档"这类重复劳动接走。重点看第 47、49 章。

**第三类:被代码审查折磨的人**。团队里负责 review PR 的那个倒霉蛋。Codex 的 \`/review\` 在查安全漏洞和逻辑回归上很能打,可以当你的"一审"。重点看第 25 章\\(斜杠命令\\)和第 50 章\\(审查\\+CI 案例\\)。

**第四类:想做工程化协作的团队**。你们团队想统一代码风格、统一 AI 用法,不希望每个人各玩各的。Codex 的 AGENTS\\.md 机制就是干这个的——把团队约定写进文件,所有人的 Codex 自动遵守。重点看第 36\\~39 章。

**第五类:运维/自动化/CI 场景的人**。你想在流水线里调 Codex 做自动化任务,或者写脚本批量处理。\`codex exec\` 非交互模式和 API Key 登录方式是为你准备的。重点看第 29 章和第 9 章。

**第六类:纯小白,想试试 AI 编程能不能帮上忙的人**。你不是程序员,但想让 AI 帮你写点小工具、处理点数据、改改网站。完全可以。先从 Codex App 入手,看第 2 章选入口,第 16 章跑通第一个任务。

如果你六类都不太沾边,也别急着走。Codex 的能力边界一直在扩,而且会"读文件、执行命令、自主多步完成任务"这种能力,迟早会渗透到每个跟电脑打交道的岗位。先了解着,没坏处。

## 第 5 章 开始前必须吃透的四个核心概念


<!-- codex-img-08-start -->

![截图 08:第5章 - 四个核心概念](codex_tutorial_images/screenshot_08_ch05.png)

*截图 08:红框标出“核心概念”,对应本节“四个核心概念”的操作说明。*

![配图 08:第5章 - 四象限概念图](codex_tutorial_images/generated_08_ch05.png)

*配图 08:四象限概念图,用于把本节概念视觉化。*

<!-- codex-img-08-end -->





这一章是整个第一部分里最重要的。下面四个概念,后面每一章都会反复用到,现在花十分钟搞懂,能让你后面学得飞快。我尽量用大白话讲。

**概念一:Agent\\(智能体\\)**。前面讲过了,这里再钉一下。Agent 和普通 AI 聊天的根本区别是"它能行动"。普通聊天:你问,它答,仅此而已。Agent:你给目标,它自己拆解步骤、调用工具\\(读文件、跑命令\\)、一步步逼近目标,中途会自我纠错。你可以把 Codex 想成一个有手有脚、能进你电脑干活的助手,而不是一个只会动嘴的顾问。理解了这一点,你才会明白为什么 Codex 需要"权限"和"审批"——因为它真的会动你的文件和系统。

**概念二:Context\\(上下文/上下文窗口\\)**。模型不是无限记忆的,它一次能"装进脑子里"的信息量有上限,这个上限就是上下文窗口。Codex 工作时,会把你的指令、相关代码文件、之前的对话、AGENTS\\.md 规则等一起塞进上下文。问题来了:聊得久了、读的文件多了,上下文会被塞满。塞满了会怎样?它会开始"忘事",或者变慢变贵。所以 Codex 提供了 \`/compact\` 命令——把前面冗长的对话压缩成摘要,腾出空间。后面第 25 章会讲怎么用。你现在只要知道:**上下文是有限资源,要省着用,该压缩就压缩,该开新会话就开新会话**。

**概念三:Sandbox\\(沙箱\\)**。这是 Codex 的安全护城河。因为 agent 真的会执行命令、改文件,万一它脑子一抽把你重要文件删了怎么办?沙箱就是给它划一个"活动范围"。Codex 有几档沙箱策略:只读\\(read\\-only,只能看不能改\\)、工作区可写\\(workspace\\-write,只能改你指定的工作目录\\)、完全访问\\(danger\\-full\\-access,啥都能干,危险\\)。默认是相对安全的。理解沙箱的意义在于:**你既要给 Codex 足够权限让它干活,又不能给太多以免出事,沙箱就是这个平衡点的旋钮**。第 31 章会把每一档讲透。

**概念四:Approval\\(审批机制\\)**。和沙箱配套的。当 Codex 想干一件它自己拿不准、或者超出当前沙箱权限的事\\(比如装个包、删个文件、访问网络\\),它会停下来问你:"我要执行这条命令,批准吗?"你可以批准、拒绝,或者改成"以后这类操作都别问我了"。审批策略通过 \`--ask-for-approval\` 这个参数控制,有"每次都问""只在必要时问""从不问"几档。小白阶段我强烈建议保持"会问"的状态,看清楚它要干啥再放行,养成习惯了再放宽。第 32 章细讲。

把这四个概念串起来理解就是:Codex 是个**会行动的 Agent**,它干活时把信息装进有限的**上下文**里,它的行动被**沙箱**框定范围,超范围或危险操作要走**审批**。这四个词,就是 Codex 的世界观。记牢了,往下走。

## 第 6 章 ChatGPT 账号怎么选:Plus / Pro / Team / Business


<!-- codex-img-10-start -->

![截图 10:第6章 - Plus / Pro / Team / Business 怎么选](codex_tutorial_images/screenshot_10_ch06.png)

![配图 10:第6章 - 订阅选择图](codex_tutorial_images/generated_10_ch06.png)

*配图 10:订阅选择图,用于把本节概念视觉化。*

<!-- codex-img-10-end -->





对国内用户来说,装 Codex 本身不难,难的是前面这一关:你得有个能用的 ChatGPT 账号,而且最好是付费档。这一章讲清楚各档位的区别,帮你选。

先说为什么需要付费账号。Codex 目前是付费功能,免费的 ChatGPT 用户用不了 Codex CLI。能用的档位是 **Plus、Pro、Team、Business、Enterprise**。也就是说,你至少得是 Plus。这一点没有捷径\\(除非走第 10 章讲的第三方中转 API,那是另一条路\\)。

各档位的核心区别,对 Codex 用户来说主要是**额度**和**能用的模型**:

**Plus**:个人档,目前大概一个月二十美元的量级\\(价格 OpenAI 会调\\)。额度上,GPT\\-5 这一档大约每 5 小时 30\\~150 条消息。对个人开发者、轻中度使用完全够用。绝大多数国内个人用户,Plus 就够了,这是性价比最高的选择。

**Pro**:个人高配档,价格高一个数量级。额度大幅提升,GPT\\-5 档每 5 小时大约 300\\~1500 条,而且能更早用上最新最强的模型。适合重度使用者——你一天到晚都在让 Codex 干活、动不动跑大任务,Plus 的额度不够你折腾,才考虑 Pro。

**Team / Business**:面向团队。除了更高的额度,还有团队管理、成员协作、数据隔离这些企业特性。适合公司/团队统一采购。个人不用考虑。

**Enterprise**:大企业定制,有专门的销售对接,普通人接触不到,跳过。

选择建议非常直接:**个人先上 Plus**,用一段时间觉得额度真的不够,再升 Pro。团队走 Team/Business。别一上来就买 Pro,大概率用不满,浪费钱。

还有一个常被问的:API Key 算哪档?这是另一条计费线——你在 platform\\.openai\\.com 充 API 余额,按调用量付费,跟 ChatGPT 订阅是两套体系。API 方式适合自动化、CI 这类程序化场景,正常人个人使用,订阅制\\(Plus/Pro\\)通常比 API 划算。这个第 9 章会专门讲。

![配图 11:第7章 - 支付流程图](codex_tutorial_images/generated_11_ch07.png)

*配图 11:支付流程图,用于把本节概念视觉化。*

<!-- codex-img-11-end -->





这是国内用户最头疼的一关:OpenAI 不直接支持国内的支付方式,你拿支付宝/微信/国内信用卡,在官网那个付款页面大概率刷不过去。这一章把可行的几条路摆给你,你按自己情况选。

**第一类:自己搞境外支付方式**。如果你有境外信用卡\\(比如某些香港卡、虚拟信用卡服务发的卡\\),理论上可以直接在 ChatGPT 官网订阅。这条路最"正",续费稳定,不依赖第三方。但门槛在于你得先有那张卡,以及付款时通常需要配合合适的网络环境\\(IP 归属地最好和卡的区域一致,否则容易触发风控\\)。如果你本来就有境外卡,这是首选。

**第二类:虚拟信用卡 \\+ 境外网络**。市面上有一些虚拟信用卡服务\\(Depay 类、各种 visa/master 虚拟卡\\),充值后拿来订阅 OpenAI。能用,但要注意两点:一是选口碑好、跑路风险低的服务商;二是开卡和充值本身有手续费,算总成本。这条路灵活,但有踩坑风险,自己甄别。

**第三类:代充值 / 代订阅服务**。这是国内最多人走的路——找第三方服务,用支付宝/微信付人民币,对方帮你把账号升级到 Plus。网上搜"ChatGPT Plus 代充值""国内自助升级 ChatGPT Plus"能找到一堆。优点是省事,人民币直接付。**但风险也最大**,我必须把丑话说前面:

- 账号安全:你可能要把自己的 ChatGPT 账号密码交给对方,有被盗、被改密、关联封号的风险。能用"代付"\\(对方只帮你付款不碰你账号\\)就别用"代登录"。

- 跑路风险:小服务商可能收钱不办事,或者办了几个月就消失。

- 封号风险:代充号、共享号\\(那种几个人合用一个账号的\\)被 OpenAI 风控封号的概率明显更高,而且封了基本没法申诉。

我的建议:如果你打算认真长期用 Codex,优先想办法搞一张自己的境外卡,用自己的独立账号订阅,虽然前期麻烦,但稳。代充作为过渡可以,但别把重要工作压在一个随时可能被封的代充号上。

**第四类:干脆不订阅,走第三方中转 API**。如果你既搞不定支付,又对 OpenAI 官方账号没执念,那其实有第四条路:不订阅 ChatGPT,转而用国内的第三方中转 API\\(它们用人民币充值,提供兼容 OpenAI 协议的接口\\),在 Codex 里把 base\\_url 指过去。这条路完全绕开了订阅这一关。具体怎么配在第 10 章和第 20 章。对纯小白和"只想用上、不在乎是不是官方账号"的人,这条路反而最省心。

这一章的核心结论:订阅 ChatGPT Plus 在国内确实有门槛,但路子不止一条。能搞境外卡就搞,搞不定就走中转 API,实在要代充就挑靠谱的、用代付别用代登录、别拿重要工作冒险。

## 第 8 章 网络环境准备:代理、节点、稳定性


<!-- codex-img-12-start -->

![截图 12:第8章 - 代理、节点与稳定性](codex_tutorial_images/screenshot_12_ch08.png)

*截图 12:红框标出“代理状态”,对应本节“代理、节点与稳定性”的操作说明。*

![配图 12:第8章 - 网络检查图](codex_tutorial_images/generated_12_ch08.png)

*配图 12:网络检查图,用于把本节概念视觉化。*

<!-- codex-img-12-end -->





Codex CLI 默认要连 OpenAI 的服务器\\(api\\.openai\\.com、chatgpt\\.com 这些域名\\),国内网络直连不上。所以走"官方账号"这条路的话,你需要一个稳定的网络环境。这一章讲清楚要注意什么——注意,本书只讲技术层面的网络配置原理和稳定性,不涉及也不推荐任何具体的获取渠道,这部分请你自行依法解决。

**第一,稳定性比速度重要**。Codex 是 agent,一个任务可能要来回跟服务器交互几十次。如果你的网络时断时续,Codex 干到一半连接断了,任务就废了,体验极差。所以选网络环境时,"稳"是第一位的,偶尔慢一点能忍,频繁掉线不能忍。

**第二,注意 IP 归属和风控**。OpenAI 有风控,如果你的网络出口 IP 是那种被大量账号共用的、或者频繁变动的,容易触发账号风控甚至封号。理想情况是出口 IP 相对干净、稳定。这也是为什么不建议用那种几百人共用的廉价节点。

**第三,理解"全局"和"系统代理"的区别**。这一点在配 IDE 插件\\(尤其 Cursor\\)时特别关键。有些工具不会自动走系统代理,你开了代理它还是连不上,报"This model provider doesn't serve your region"这类错。这时候你要么开"全局/增强模式",要么在那个工具的设置里单独填代理地址。Codex CLI 相对好一些,但也建议你了解自己机器上代理是怎么生效的。

**第四,给 CLI 单独配代理的方法**。如果你的代理不是全局的,可以通过环境变量给 Codex 单独指定代理。在终端里设置 \`HTTPS_PROXY\` 和 \`HTTP_PROXY\` 环境变量指向你的本地代理端口\\(比如 \`http://127.0.0.1:7890\` 这种,具体端口看你的代理软件\\),Codex 走网络时就会用这个代理。这个方法在第 21 章会和 config\\.toml 一起细讲。

**第五,如果网络实在折腾不定,认真考虑走中转 API**。再强调一次:走第三方国内中转 API 的话,Codex 连的是国内服务器,根本不需要代理,网络问题直接消失。这是为什么我反复提中转方案——对很多国内用户,它把"账号"和"网络"两个最大的坑一次性填了。代价是模型可能不是 OpenAI 官方最新的、或者要为中转服务付费,自己权衡。

小结:走官方账号 = 要解决稳定网络\\(求稳不求快、注意 IP 风控、搞清代理生效方式\\);怕折腾 = 走中转 API 绕开网络问题。两条路,按自己情况选。

## 第 9 章 API Key 方式 vs ChatGPT 登录方式:到底怎么选


<!-- codex-img-13-start -->

![截图 13:第9章 - API Key 与 ChatGPT 登录方式选择](codex_tutorial_images/screenshot_13_ch09.png)

*截图 13:红框标出“认证方式”,对应本节“API Key 与 ChatGPT 登录方式选择”的操作说明。*

![配图 13:第9章 - 认证分流图](codex_tutorial_images/generated_13_ch09.png)

*配图 13:认证分流图,用于把本节概念视觉化。*

<!-- codex-img-13-end -->





Codex 登录有两种方式,这是个很多人没搞清楚就乱配、然后报错的地方。这一章一次讲明白。

**方式一:ChatGPT 登录\\(OAuth\\)**。你用 ChatGPT 账号\\(Plus/Pro/Team 等\\)授权登录,Codex 的使用额度走你的**订阅额度**。命令是 \`codex login\`,会弹浏览器让你授权,授权完就好了。

特点:省心,不用管 API 余额,额度是订阅给的\\(每 5 小时多少条那种\\)。而且 ChatGPT 登录通常能**更早用上最新的模型**。对绝大多数个人开发者,这是推荐方式。

**方式二:API Key 登录**。你在 platform\\.openai\\.com 创建一个 API Key,配给 Codex,使用走 **API 按量计费**\\(用多少花多少钱\\),跟订阅是两套账。

特点:适合**程序化、自动化场景**——CI/CD 流水线、定时脚本、需要稳定无人值守的任务。因为这些场景里你没法每次都去点浏览器授权,API Key 是写死在环境里的,更适合机器跑。缺点:正常人手动使用的话,API 通常比订阅贵;而且 API 拿到新模型的时间有时会比 ChatGPT 登录晚一点。

怎么选,记这个口诀:

- **个人日常手动用 → ChatGPT 登录**\\(省心、可能更早用上新模型、订阅更划算\\)

- **自动化 / CI / 脚本 / 无人值守 → API Key**\\(适合机器跑、计费清晰\\)

- **走国内第三方中转 → 用 API Key 的形式,但 base\\_url 指向中转服务**\\(见第 10、20 章\\)

特别注意一个安全红线:**API Key 是密码级的机密,绝对不能泄露**。别把它直接写进会提交到 Git 的文件里,别在公开场合\\(截图、issue、群聊\\)贴出来。正确做法是放进环境变量,或者放进 \`~/.codex/\` 下不会被提交的配置里。一旦泄露,有人能拿你的 Key 疯狂调用,账单算你的。这一点第 21 章和第 34 章还会强调。

还有个实操细节:ChatGPT 登录后,登录凭证会缓存在 \`~/.codex/\` 目录下\\(Windows 是对应的用户目录\\)。如果你换了机器、或者授权过期,重新 \`codex login\` 一次即可。要登出就 \`codex logout\`。

<!-- codex-img-14-end -->





这一章是给"搞不定官方账号/网络,或者想用国内服务省心"的同学准备的核心方案。把原理讲透,具体字段第 20 章再配。

**先理解原理**。Codex CLI 默认调用 \`api.openai.com\`。但 Codex 设计上支持"OpenAI 兼容协议"——意思是,任何一个对外提供"长得跟 OpenAI 一样的 API 接口"的服务,Codex 都能连。所以国内冒出来很多"中转服务"或"兼容端点",它们在国内有服务器,提供兼容 OpenAI 协议的接口,你只要在 Codex 的配置里把请求地址\\(base\\_url\\)从 \`api.openai.com\` 改成它们的地址,再填上它们给你的 Key,Codex 就会去连国内服务器,而不是 OpenAI。

**这样做的好处**:第一,不用翻墙——连的是国内服务器;第二,不用境外账号——用人民币在中转服务那充值就行;第三,网络稳定。一句话:把"账号"和"网络"两个坑一次性绕过去了。

**代价和风险**:第一,你用的模型取决于中转服务支持哪些。有的中转能提供 GPT\\-5\\-Codex 这一系列\\(那体验最接近官方\\),有的只提供 DeepSeek、Claude、Kimi 等其他模型\\(那就不是"真 Codex 模型"了,只是借 Codex 这个壳跑别的模型,能用但效果有差异\\);第二,你的代码和请求会经过第三方服务器,**有数据安全顾虑**——别拿它处理敏感/涉密代码;第三,中转服务良莠不齐,有跑路、限速、偷偷降级模型的风险,挑口碑好的。

**配置长什么样\\(先有个印象,第 20 章细讲\\)**。核心就是在 \`~/.codex/config.toml\` 里加一段,告诉 Codex:用哪个 provider、provider 的 base\\_url 是什么、用哪个模型。大致结构是这样\\(占位,实际值填你服务商给的\\):

\`\`\`TOML
model = "gpt-5-codex"          # 改成你的服务商支持的模型名
model_provider = "custom"       # 给你的 provider 起的名字

[model_providers.custom]
name = "custom"
base_url = "https://你的中转服务地址/v1"   # 服务商给你的 API 地址
wire_api = "responses"          # 协议类型,看服务商文档
\`\`\`

然后把 API Key 通过环境变量提供\\(比如 \`OPENAI_API_KEY\`\\)。这样 Codex 就改连你指定的国内端点了。

**重要提醒**:有些配置项是不允许在项目级配置里改的\\(比如 \`openai_base_url\`、\`model_provider\` 这类涉及凭证和请求去向的 key\\),只能在用户级的 \`~/.codex/config.toml\` 里设。Codex 这么设计是出于安全——防止你打开一个不信任的项目,它偷偷把你的请求和凭证导到别处。所以中转配置要写在你自己的用户级配置里。这点第 18、23 章会专门讲清楚。

**怎么验证配好了**:配完跑一句简单任务,比如 \`codex "用一句话介绍你自己"\`,如果它正常回应、没报连接错误,就说明通了。如果报 region、连接超时、401 这类错,大概率是 base\\_url、Key、或 wire\\_api 填错了,对着服务商文档逐项核对。

这一章你要带走的认知:**Codex 不是只能连 OpenAI,它支持兼容协议,这给了国内用户一条绕过账号和网络的路**。这条路省心,但要接受"模型可能非官方、有数据安全顾虑、要挑靠谱服务商"这三个代价。

## 第 11 章 安装前置:Node\\.js 全流程\\(Windows / Mac\\)


<!-- codex-img-16-start -->

![截图 16:第11章 - Node.js 前置安装检查](codex_tutorial_images/screenshot_16_ch11.png)

*截图 16:红框标出“node 版本”,对应本节“Node.js 前置安装检查”的操作说明。*

![配图 16:第11章 - 前置依赖图](codex_tutorial_images/generated_16_ch11.png)

*配图 16:前置依赖图,用于把本节概念视觉化。*

<!-- codex-img-16-end -->





Codex CLI 主要通过 npm 安装,而 npm 是 Node\\.js 自带的包管理器。所以装 Codex 之前,你机器上得先有 Node\\.js。官方要求 Node 18 以上,我建议直接装 22 或更新的 LTS 版本,省得遇到兼容问题。这一章手把手装 Node。

**先检查你是不是已经装了**。打开终端\\(Windows 是 PowerShell 或 Windows Terminal,Mac 是"终端"App\\),输入:

\`\`\`Bash
node -v
npm -v
\`\`\`

如果两条都打印出版本号\\(比如 v22\\.x\\.x\\),并且 node 版本 ≥ 18,那你跳过这一章,直接去第 12 / 13 章。如果提示"找不到命令"或者版本太老,往下看。

**Windows 装 Node\\.js**。最省事的方式是用 winget\\(Win10/11 自带的包管理器\\)。打开 PowerShell,输入:

\`\`\`PowerShell
winget install OpenJS.NodeJS.LTS
\`\`\`

等它装完,**关掉 PowerShell 重新打开**\\(这一步很重要,不重开新窗口,PATH 环境变量不刷新,你 \`node -v\` 还是找不到\\),再 \`node -v\` 验证。

如果你不喜欢命令行,也可以去 Node\\.js 官网下载 LTS 版本的 \\.msi 安装包,双击一路下一步,装完同样重开终端验证。

**Mac 装 Node\\.js**。如果你装了 Homebrew\\(Mac 上最常用的包管理器\\),一行搞定:

\`\`\`Bash
brew install node
\`\`\`

没装 Homebrew 的话,要么先装 Homebrew\\(去它官网复制那行安装命令\\),要么去 Node\\.js 官网下 macOS 的 \\.pkg 安装包双击安装。装完 \`node -v\` 验证。

**国内 npm 加速\\(强烈建议先做\\)**。npm 默认从国外源下载,国内慢得令人发指,而且经常下到一半断。装 Codex 之前先把 npm 源换成国内镜像,后面省心一万倍。执行:

\`\`\`Bash
npm config set registry https://registry.npmmirror.com
\`\`\`

这行的意思是把 npm 的下载源换成淘宝\\(npmmirror\\)的国内镜像。验证一下:

\`\`\`Bash
npm config get registry
\`\`\`

打印出 \`https://registry.npmmirror.com\` 就对了。**这一步是国内安装 90% 卡顿问题的解药**,务必先做。

**一个常见坑:权限**。Mac/Linux 上全局安装 npm 包\\(\`-g\`\\)有时会报权限错误\\(EACCES\\)。不建议用 \`sudo\` 硬装\\(后患无穷\\),正确做法是配置一下 npm 的全局目录到你自己有权限的地方。如果你遇到了,第 17 章排查清单里有详细解法,先记着有这回事。

装完 Node、换好源,前置就齐了。下一章开始装 Codex 本体。

## 第 12 章 Windows 安装 Codex CLI 完整步骤


<!-- codex-img-17-start -->

![截图 17:第12章 - Windows 安装 Codex CLI](codex_tutorial_images/screenshot_17_ch12.png)

*截图 17:红框标出“Windows 安装”,对应本节“Windows 安装 Codex CLI”的操作说明。*

![配图 17:第12章 - Windows 路线图](codex_tutorial_images/generated_17_ch12.png)

*配图 17:Windows 路线图,用于把本节概念视觉化。*

<!-- codex-img-17-end -->





Windows 用户单独开一章,因为坑相对多一点。先给结论:**Windows 上有两条路——原生安装,或者 WSL2 里安装**。能用原生就用原生\\(简单\\),原生遇到沙箱/权限问题再上 WSL2\\(第 14 章\\)。

**前提检查**。确认这三样齐了:Node\\.js ≥ 18\\(\`node -v\` 验证过\\)、npm 源已换国内镜像\\(第 11 章\\)、网络环境就绪\\(走官方账号需要代理,走中转不需要\\)。Git 建议也装上,后面 Codex 干活经常要用到 git。

**第一步:安装**。打开 PowerShell 或 Windows Terminal,执行:

\`\`\`PowerShell
npm install -g @openai/codex
\`\`\`

如果你前面没换 npm 源、又觉得慢,可以临时指定镜像源:

\`\`\`PowerShell
npm install -g @openai/codex --registry=https://registry.npmmirror.com
\`\`\`

**第二步:验证安装**。装完执行:

\`\`\`PowerShell
codex --version
\`\`\`

打印出版本号\\(比如 0\\.130\\.x\\)就说明装好了。如果提示 \`codex\` 不是内部或外部命令——这是 Windows 最经典的坑,意思是 npm 的全局安装目录不在系统 PATH 里。解法:先 \`npm config get prefix\` 看看全局目录在哪\\(通常是类似 \`C:\\Users\\你的名字\\AppData\\Roaming\\npm\`\\),确认这个路径在你的系统环境变量 PATH 里;不在就手动加进去,然后**重开终端**\\(再次强调,PATH 改了必须重开窗口\\)。

**第三步:登录**。执行:

\`\`\`PowerShell
codex login
\`\`\`

它会弹出浏览器让你用 ChatGPT 账号授权\\(走官方账号的话\\)。授权成功,终端会提示登录完成。如果你走中转 API,这一步不用 login,直接去配 config\\.toml\\(第 20 章\\),用环境变量提供 Key。

**第四步:启动**。在你想让 Codex 工作的项目文件夹里,执行:

\`\`\`PowerShell
cd 你的项目路径
codex
\`\`\`

进入交互界面,你就可以开始给它派活了。

**Windows 特别提醒**。如果你是 Windows 10 用户,Codex 原生能用,但在沙箱、权限上偶尔会遇到一些策略问题\\(比如执行策略不允许、沙箱用户启动失败之类的错\\)。Win11 体验更顺。如果你原生折腾不顺,官方和社区的共识是:**Windows 用户卡住了就上 WSL2**\\(第 14 章\\),WSL2 是个完整的 Linux 环境,Codex 在里面跑最舒服,坑最少。另外,对完全不想碰命令行的 Windows 用户,直接用 Codex App\\(图形界面\\)也是合理选择。

## 第 13 章 macOS / Linux 安装 Codex CLI 完整步骤


<!-- codex-img-18-start -->

![截图 18:第13章 - macOS / Linux 安装 Codex CLI](codex_tutorial_images/screenshot_18_ch13.png)

*截图 18:红框标出“Unix 安装”,对应本节“macOS / Linux 安装 Codex CLI”的操作说明。*

![配图 18:第13章 - 终端安装图](codex_tutorial_images/generated_18_ch13.png)

*配图 18:终端安装图,用于把本节概念视觉化。*

<!-- codex-img-18-end -->





Mac 和 Linux 用户,Codex 装起来比 Windows 省心,因为它本来就是 Unix 环境长大的工具。

**前提检查**。同样三样:Node\\.js ≥ 18、npm 国内源、网络就绪。Git 一般 Mac/Linux 自带或很容易装。

**Mac 安装,两种方式任选**。

方式一,用 npm\\(通用,推荐\\):

\`\`\`Bash
npm install -g @openai/codex
\`\`\`

方式二,用 Homebrew\\(如果你习惯用 brew 管理软件\\):

\`\`\`Bash
brew install --cask codex
\`\`\`

两种都行。npm 方式的好处是和 Linux 一致、升级方便;brew 方式的好处是和你其他 brew 软件统一管理。新手用 npm 那条即可。

**Linux 安装**。直接 npm:

\`\`\`Bash
npm install -g @openai/codex
\`\`\`

各发行版\\(Ubuntu/Debian/CentOS 等\\)只要 Node 装好了,这条命令通用。

**验证**:

\`\`\`Bash
codex --version
\`\`\`

**登录**:

\`\`\`Bash
codex login
\`\`\`

弹浏览器授权\\(官方账号\\)。如果是在没有图形界面的远程 Linux 服务器上,浏览器弹不出来,可以用设备授权\\(device auth\\)或者把 access token 通过 stdin 传入——\`codex login --help\` 看具体选项。走中转的话同样跳过 login,配 config\\.toml。

**启动**:

\`\`\`Bash
cd 你的项目目录
codex
\`\`\`

**Mac/Linux 常见坑:全局安装权限\\(EACCES\\)**。如果 \`npm install -g\` 报权限错误,别急着 \`sudo\`。推荐的干净解法是给 npm 配一个你自己拥有权限的全局目录:

\`\`\`Bash
mkdir -p ~/.npm-global
npm config set prefix '~/.npm-global'
\`\`\`

然后把 \`~/.npm-global/bin\` 加到你的 PATH 里。具体做法:编辑你的 shell 配置文件\\(用 bash 就是 \`~/.bashrc\`,用 zsh——Mac 默认——就是 \`~/.zshrc\`\\),在末尾加一行:

\`\`\`Bash
export PATH=~/.npm-global/bin:$PATH
\`\`\`

保存后执行 \`source ~/.zshrc\`\\(或 \`source ~/.bashrc\`\\)让它生效,再重新 \`npm install -g @openai/codex\`。这样就不需要 sudo,也不会污染系统目录。

**升级 Codex**。Codex 迭代很快,隔三差五升一下能少踩很多坑。升级方式:

\`\`\`Bash
npm install -g @openai/codex@latest
\`\`\`

或者 Codex 自带的自更新\\(新版本支持\\):

\`\`\`Bash
codex --upgrade
\`\`\`

\\(具体子命令以 \`codex --help\` 为准,不同版本可能略有差异。\\)

到这里,Mac/Linux 用户已经装好、登录、能启动了。一个非常实用的习惯:**当你发现网上某篇教程里的界面、命令、菜单和你本机对不上时,第一件事不是怀疑自己,而是先升级一次 Codex**——大概率是教程写的版本和你装的版本不一样。Codex 这半年改动太频繁了,升级到最新再对照,能解决一大半"怎么跟教程不一样"的困惑。

## 第 14 章 WSL2 环境搭建\\(Windows 用户进阶\\)


<!-- codex-img-19-start -->

![截图 19:第14章 - WSL2 环境搭建](codex_tutorial_images/screenshot_19_ch14.png)

*截图 19:红框标出“WSL2 命令”,对应本节“WSL2 环境搭建”的操作说明。*

![配图 19:第14章 - 双环境图](codex_tutorial_images/generated_19_ch14.png)

*配图 19:双环境图,用于把本节概念视觉化。*

<!-- codex-img-19-end -->





上一章说了,Windows 原生跑 Codex 卡住了就上 WSL2。这一章手把手把 WSL2 搭起来。先解释一下 WSL2 是啥:它是微软官方提供的"在 Windows 里跑一个完整 Linux"的技术,你不用装双系统,也不用开虚拟机,一条命令就能在 Windows 里多出一个 Ubuntu 环境。Codex 在这个 Linux 环境里跑,沙箱、权限、命令执行全都顺,坑比 Windows 原生少一大截。很多 Windows 重度用户最后都搬到 WSL2 上去了。

**第一步:开启 WSL**。用管理员身份打开 PowerShell\\(右键开始菜单选"终端\\(管理员\\)"或"PowerShell\\(管理员\\)"\\),执行:

\`\`\`PowerShell
wsl --install
\`\`\`

这一条命令会自动帮你开启必要的 Windows 功能,并默认装一个 Ubuntu。装完它会让你**重启电脑**,重启。

**第二步:初始化 Ubuntu**。重启后,开始菜单里会多出一个 Ubuntu,点开。第一次启动它会让你设一个 Linux 用户名和密码\\(这个密码是 Linux 里 sudo 用的,自己记住,跟 Windows 登录密码没关系\\)。设完你就进入了一个完整的 Ubuntu 终端。

**第三步:在 WSL2 里装 Node 和 Codex**。注意,现在你在 Linux 环境里,所以用的是 Linux 的装法\\(第 13 章那套\\),不是 Windows 的。先更新一下包列表,再装 Node。最省心的是用 nvm\\(Node 版本管理器\\)装 Node:

\`\`\`Bash
sudo apt update
curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
# 装完重开终端,或者 source ~/.bashrc
nvm install 22
\`\`\`

\\(如果上面那个 curl 因为网络下不下来,可以用国内镜像的安装方式,或者直接用 apt 装 nodejs,但 apt 源里的 Node 版本通常偏老,确认 \`node -v\` ≥ 18。\\)

然后换 npm 源、装 Codex:

\`\`\`Bash
npm config set registry https://registry.npmmirror.com
npm install -g @openai/codex
codex --version
\`\`\`

**第四步:文件放哪很关键**。WSL2 里访问 Windows 的文件\\(路径类似 \`/mnt/c/Users/你/...\`\\)是能访问的,但跨系统读写性能差、还容易有权限问题。**强烈建议你把项目放在 Linux 自己的家目录里**\\(也就是 \`~/\` 或 \`/home/你的用户名/\` 下\\),Codex 在这里跑性能最好、坑最少。需要在 Windows 里用资源管理器看这些文件的话,在地址栏输入 \`\\\\wsl$\` 就能浏览 WSL 的文件系统。

**第五步:在 WSL2 里登录和启动**。和 Linux 一样:

\`\`\`Bash
codex login
cd ~/你的项目
codex
\`\`\`

\`codex login\` 在 WSL2 里弹浏览器授权时,通常会自动调起 Windows 的默认浏览器,授权完回到终端即可。如果没自动弹,它会打印一个链接,你手动复制到浏览器打开。

**什么时候该用 WSL2,什么时候不用**?如果你 Windows 原生装完一切顺、任务跑得好,那就别折腾 WSL2,没必要。只有当你遇到原生环境下的沙箱报错、执行策略限制、权限问题,或者你本来就偏好 Linux 工作流,再上 WSL2。它是"Plan B",不是必选项。

**WSL2 三个高频坑提前说**。坑一,**装完 Node 但 codex 找不到**:WSL2 里你可能在 nvm 装 Node 后没重开终端,PATH 没刷新,\`source ~/.bashrc\` 或重开 Ubuntu 窗口即可。坑二,**代理连不上**:这是 WSL2 最大的坑,前面提过——WSL2 里的 \`127.0.0.1\` 指的是 WSL 自己不是 Windows,代理软件跑在 Windows 上时要么用 WSL 镜像网络模式直接用 127\\.0\\.0\\.1,要么填 Windows 主机 IP,详见第 21 章。坑三,**项目放在 /mnt/c 下导致又慢又有权限问题**:务必把项目放进 Linux 家目录 \`~/\` 下,这是性能和稳定性的关键,别图方便直接在 Windows 盘符下跑。这三个坑踩中任意一个都会让你怀疑人生,提前知道就不慌了。

## 第 15 章 第一次启动与登录授权:每个画面都讲清楚


<!-- codex-img-20-start -->

![截图 20:第15章 - 第一次启动与登录授权](codex_tutorial_images/screenshot_20_ch15.png)

*截图 20:红框标出“登录授权”,对应本节“第一次启动与登录授权”的操作说明。*

![配图 20:第15章 - 授权流程图](codex_tutorial_images/generated_20_ch15.png)

装好之后第一次启动,新手最容易在这一步发懵——一堆英文提示,不知道该选啥。这一章把第一次启动会遇到的画面挨个讲。

在项目目录里敲 \`codex\` 回车后,典型流程是这样的:

**第一关:信任目录\\(trust\\)**。Codex 第一次在某个目录运行时,会问你是否信任这个目录\\(trust this folder\\)。原因前面讲过——Codex 会读这个目录里的配置和 AGENTS\\.md,如果是个来路不明的项目,这些文件可能让 Codex 做你不希望的事。所以它谨慎地问一句。如果这是你自己的项目,选信任\\(trust\\)。如果你只是想看看一个刚下载、还没审过的陌生项目,可以选不信任,这样它会跳过项目级的 \`.codex/\` 配置,更安全。

**第二关:登录\\(如果还没登录\\)**。如果你还没 \`codex login\` 过,它会提示你登录。两个选项:用 ChatGPT 账号登录\\(Sign in with ChatGPT\\),或者用 API Key。个人用户选前者,弹浏览器授权;走中转或 CI 的选后者/或提前在 config\\.toml 配好。授权成功后,Codex 会把凭证缓存在 \`~/.codex/\` 下\\(Windows 是对应用户目录\\),以后就不用再登了,除非过期。

**第三关:选模型 / 推理强度\\(可能出现\\)**。有些版本启动或在会话里会让你选用哪个模型、推理强度\\(reasoning effort\\)高还是中还是低。推理强度越高,它"想"得越深、质量越好,但越慢越费额度。新手默认即可,后面第 19 章会教你按任务类型调。

**第四关:进入交互界面\\(TUI\\)**。前面都过了,你就进到 Codex 的主界面——一个终端里的对话框,下方是输入区,你在这里打字给它派活。这个界面叫 TUI\\(Terminal UI\\),第 24 章会把界面每个区域讲一遍。

**关于登录的几个实用命令**:

- 重新登录:再跑一次 \`codex login\`

- 登出:\`codex logout\`

- 看当前登录状态/帮助:\`codex login --help\`

**一个高频疑问:浏览器授权成功了,终端却提示失败**。这是国内用户常遇到的,原因通常是:授权回调走的是本地端口\\(Codex 在本地起了个临时服务接收授权回调\\),如果你的网络/代理设置把这个本地回调拦了,就会"浏览器说成功、终端说失败"。解法:确认你的代理没有拦截 127\\.0\\.0\\.1 / localhost 的本地回环;在 WSL2 下确认回调能正确传回。实在不行换设备授权方式\\(device auth\\)。第 17 章排查清单里有更细的处理。

## 第 16 章 跑通你的第一个任务:从 "Hello" 到真改代码
