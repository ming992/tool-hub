![截图 21:第16章 - 跑通第一个任务](codex_tutorial_images/screenshot_21_ch16.png)

*截图 21:红框标出“首个任务”,对应本节“跑通第一个任务”的操作说明。*

![配图 21:第16章 - 任务闭环图](codex_tutorial_images/generated_21_ch16.png)

*配图 21:任务闭环图,用于把本节概念视觉化。*

<!-- codex-img-21-end -->





环境通了,我们来真刀真枪跑第一个任务,体会一下 agent 和聊天的区别。

**热身:先确认它活着**。在交互界面里直接打一句中文:

\`\`\`Plain Text
用一句话介绍你自己,确认你能正常工作
\`\`\`

正常的话它会回你一句。如果这里就报错\\(连接超时、region、401\\),别往下走,回第 17 章排查网络/Key/base\\_url。

**第一个真任务:让它在你的目录里创建文件**。试试这句:

\`\`\`Plain Text
在当前目录创建一个 hello.py,功能是打印 "你好,Codex",然后运行它,把输出贴给我看
\`\`\`

注意观察它的行为,这是体会"agent"的关键时刻:

1. 它会说要创建 \`hello.py\`,把内容给你看;

2. 因为"创建文件"是写操作,在默认沙箱下,它可能会**停下来请求批准**\\(approval\\)——问你"我要写这个文件,行吗"。看清楚它要写啥,确认无误就批准;

3. 批准后它真的把文件写进你的目录;

4. 然后它要"运行它",运行命令也是个动作,可能再请求一次批准;

5. 批准后它执行 \`python hello.py\`,把输出 \`你好,Codex\` 贴回来给你。

整个过程你会非常直观地感受到:它不是在"假装"给你代码,它是**真的进了你的目录、真的写了文件、真的跑了命令**。这就是 agent。跑完你去文件夹里看,\`hello.py\` 真的躺在那。

**第二个任务:让它读懂再修改**。如果你手头有个现成的小项目,试试:

\`\`\`Plain Text
读一下这个项目的 README 和主入口文件,用通俗的话告诉我它是干嘛的,核心流程是什么
\`\`\`

它会自己去读文件\\(读是只读操作,一般不用批准\\),然后给你一份导读。这一步展示的是它"主动读你的仓库"的能力。

**第三个任务:让它干一件有改动的实事**。比如你有个函数没注释:

\`\`\`Plain Text
给 utils.py 里的每个函数加上中文 docstring 注释,不要改动任何逻辑
\`\`\`

注意这句话里我特意加了"不要改动任何逻辑"——这是和 Codex 打交道的一个好习惯:**把你的边界和约束明确写出来**。Codex 以听话著称,你划清楚范围,它就老老实实在范围内干,不会顺手重构。改完它会给你看 diff\\(改动对比\\),你逐行审一下,满意就接受。

**跑完第一批任务后,你该养成的三个习惯**:

第一,**任务说清楚边界**。别只说"优化一下这个文件",要说"优化这个文件的性能,但保持函数签名不变,不要引入新依赖"。约束越清楚,结果越可控。

第二,**改动一定要审 diff**。Codex 再听话也是 AI,会出错。每次它改完,花十几秒看一眼 diff,确认改对了再接受。养成这个习惯,你永远不会被它坑。

第三,**危险操作保持"会问"**。第一阶段别急着关掉审批\\(别用 \`--ask-for-approval never\`\\),让它每次写文件、跑命令、装依赖都问你一下,你看清楚再放行。等你熟了、信任它了,再按第 32 章放宽。

**附:一次完整的"小白第一个真实项目"全程演示**。光说概念不如走一遍。假设你完全不会编程,但想要一个"把一个文件夹里所有图片批量压缩"的小工具。跟着做:

第一步,建个空文件夹当项目,进去启动:

\`\`\`Bash
mkdir my-tool && cd my-tool
codex
\`\`\`

第二步,选信任目录\\(自己的文件夹,放心信任\\)。第三步,把需求用大白话说清楚,边界划明白:

\`\`\`Plain Text
我要一个 Python 脚本 compress.py,功能是:读取当前文件夹下 images 子目录里的所有 jpg/png 图片,压缩到原来质量的 70%,结果存到 output 子目录,文件名保持不变。请用 Pillow 库。写完告诉我怎么运行,还需要装什么。
\`\`\`

注意我这句话给足了细节:输入哪、输出哪、压到多少、用什么库、还要它告诉我怎么跑和装什么依赖。**需求越具体,小白越省心**,因为你不用回头追问。

第四步,看它的反应。它会:\\(1\\)告诉你需要先装 Pillow,可能请求批准执行 \`pip install pillow\`——看清是装 Pillow 这个正经库,批准;\\(2\\)写出 compress\\.py,请求批准写文件——看一眼内容,批准;\\(3\\)告诉你运行方式 \`python compress.py\`。

第五步,你按它说的,把几张图片丢进 images 文件夹,然后让它跑:

\`\`\`Plain Text
我已经在 images 里放了几张图片,帮我运行一下试试,把结果告诉我
\`\`\`

它执行脚本\\(请求批准\\),跑完告诉你 output 里生成了压缩后的图片。你去文件夹一看,真的有了。

第六步,迭代。你发现还想要它顺便打印每张图压缩前后的大小对比:

\`\`\`Plain Text
很好。再改一下:运行时打印每张图片压缩前和压缩后的文件大小(用 KB),方便我看效果。其他不要动。
\`\`\`

它改 compress\\.py\\(给你看 diff\\),你审一眼接受,再跑,这次就有大小对比输出了。

整个过程你一行代码没写,但你得到了一个能用的工具,而且全程你都看得见它在干什么、改了什么。\\*\\*这就是 Codex 对小白的意义:你负责把需求和边界说清楚、负责审一眼它的改动,它负责把活干完。\\*\\*这个"说清需求 → 看它执行 → 审 diff → 迭代"的循环,就是你和 Codex 协作的基本节奏,后面再复杂的任务,本质都是这个循环的放大。

## 第 17 章 安装与使用高频报错排查清单\\(17 个真实坑\\)


<!-- codex-img-22-start -->

![截图 22:第17章 - 高频报错排查](codex_tutorial_images/screenshot_22_ch17.png)

*截图 22:红框标出“报错清单”,对应本节“高频报错排查”的操作说明。*

![配图 22:第17章 - 排错漏斗图](codex_tutorial_images/generated_22_ch17.png)

*配图 22:排错漏斗图,用于把本节概念视觉化。*

<!-- codex-img-22-end -->





这一章是"急救手册",建议收藏。把国内用户装 Codex、用 Codex 最常撞的坑和解法列成清单,遇到报错按这个表对。

**坑 1:****\`codex\`**** 不是内部或外部命令 / command not found**。原因:npm 全局目录不在 PATH。解法:\`npm config get prefix\` 看全局目录,把它的 bin 子目录加进系统 PATH,**重开终端**。Windows 全局目录通常是 \`AppData\\Roaming\\npm\`。

**坑 2:****\`npm install\`**** 卡住不动 / 下载超时**。原因:没换国内源。解法:\`npm config set registry https://registry.npmmirror.com\`,重装。这是国内 90% 安装卡顿的根因。

**坑 3:****\`node -v\`**** 找不到或版本太老**。原因:Node 没装好或版本 \\< 18。解法:重装 Node\\(第 11 章\\),装完重开终端。WSL2 里用 nvm 装新版本。

**坑 4:Mac/Linux 全局安装报 EACCES 权限错误**。原因:全局目录没权限。解法:别用 sudo,改用 \`~/.npm-global\` 自有目录\\(第 13 章详解\\),配好 PATH 再装。

**坑 5:浏览器授权成功但终端提示失败**。原因:本地回调端口被代理/防火墙拦,或网络回环异常。解法:确认代理不拦 127\\.0\\.0\\.1/localhost;WSL2 下确认回调能传回;换设备授权 device auth。

**坑 6:报 region 相关错\\(does not serve your region / unsupported region\\)**。原因:网络出口 IP 所在地区不被服务。解法:走官方账号的话,调整到合适的网络环境\\(注意稳定和 IP 干净\\);走中转 API 的话这个问题不存在。

**坑 7:401 Unauthorized**。原因:API Key 错、过期、没正确传入。解法:核对 Key 是否填对、是否通过正确的环境变量传入、中转服务的 Key 是否还有余额。

**坑 8:连接超时 / 网络错误\\(走官方账号\\)**。原因:代理不稳或没生效。解法:确认代理在跑、Codex 走了代理\\(必要时设 HTTPS\\_PROXY 环境变量,第 21 章\\);求稳别求快。

**坑 9:Cursor / IDE 插件里调 Codex 报 region 但 CLI 正常**。原因:IDE 没走系统代理。解法:在 IDE 设置里搜 proxy 单独填代理,或开全局/增强模式;实在不行用 CLI。

**坑 10:Windows 执行策略错误 / 沙箱用户启动失败**。原因:Windows\\(尤其 Win10\\)策略不允许沙箱用户按需启动命令。解法:升级到 Win11,或者直接上 WSL2\\(第 14 章\\)。

**坑 11:界面/命令和教程对不上**。原因:版本不一致。解法:先升级 \`npm install -g @openai/codex@latest\`,再对照。Codex 改得太频繁了。

**坑 12:中转 API 配了还是连官方 / 不生效**。原因:base\\_url、model\\_provider 配错位置或拼写错。解法:确认写在**用户级** \`~/.codex/config.toml\`\\(项目级配不了这些 key\\),核对 base\\_url 末尾的 \`/v1\`、model 名是否服务商支持、wire\\_api 是否正确。

**坑 13:中转能连但模型回答很差 / 不像 Codex**。原因:中转服务其实给你接的是别的模型\\(DeepSeek/Claude 等\\),不是 GPT\\-5\\-Codex。解法:看服务商支持哪些模型,把 model 改成它真正支持的 codex 系列;或接受用替代模型。

**坑 14:任务跑到一半断了**。原因:网络掉线,或上下文塞满。解法:网络求稳;长任务中途 \`/compact\` 压缩上下文;断了用 \`codex resume\` 续接\\(第 30 章\\)。

**坑 15:Codex 改了一堆你没让它改的东西**。原因:指令边界没说清。解法:任务里明确写"只改 X,不要动 Y";改完审 diff,不对就拒绝。

**坑 16:它要执行危险命令\\(rm、删目录、装陌生包\\)**。原因:它判断需要,但你不放心。解法:**这时审批机制救了你**——别无脑批准,看清命令,拿不准就拒绝、让它换个安全做法\\(第 34 章\\)。

**坑 17:额度用完了 / rate limit**。原因:订阅档位的额度\\(每 5 小时 N 条\\)用尽。解法:等额度刷新,或升级档位\\(Plus→Pro\\),或这段时间切到中转 API 的 provider 顶一下。

排查的总思路:**先分清是"装的问题"还是"网络/账号的问题"还是"用法的问题"**。装的问题看 PATH 和源;网络账号问题看代理、Key、base\\_url、region;用法问题看指令边界和审批。对症下药,别一报错就重装。

**一个偷懒但极有效的排错技巧:让 AI 帮你装、帮你查**。这是给纯小白的福音。如果你手上已经有任何一个能用的 AI\\(比如手机上的 ChatGPT、文心、Kimi,或者另一个编程工具\\),你可以直接把你的报错信息、你的系统\\(Win11 还是 Mac\\)、你执行的命令一股脑发给它,让它给你诊断。把提示词写成这样最有效:"我在 Windows 11 上装 OpenAI Codex CLI,执行 \`codex --version\` 报'不是内部或外部命令',我前面执行过 npm install \\-g @openai/codex 显示成功了,这是什么原因,一步步教我怎么修。"AI 会给你具体步骤。甚至社区里很多人直接把"帮我自动检查环境并安装"这类需求丢给已有的 AI 编程工具\\(比如 Trae、Cursor\\),让它在终端里替你跑安装和诊断命令。**你不需要自己懂命令行,你只需要会把问题描述清楚**——这正是 AI 时代排错的新姿势。

**还有几个零散但常见的坑补充**。坑 18,**改了 config\\.toml 没生效**:99% 是没重启 Codex,退出重开。坑 19,**TOML 解析报错**:多半是引号用了中文引号、或表头括号写错、或编码带了 BOM,一行行核对语法。坑 20,**升级后旧会话恢复不了**:大版本升级偶尔会让旧会话格式不兼容,这是正常的,开新会话即可,重要内容提前让它总结保存。把这二十个坑过一遍,你装和用 Codex 路上九成的拦路虎都认识了。

# 第四部分:核心配置 config\\.toml,把 Codex 调成你的样子

## 第 18 章 config\\.toml 文件结构全解


<!-- codex-img-23-start -->

![截图 23:第18章 - config.toml 文件结构](codex_tutorial_images/screenshot_23_ch18.png)

*截图 23:红框标出“配置结构”,对应本节“config.toml 文件结构”的操作说明。*

![配图 23:第18章 - 配置分层图](codex_tutorial_images/generated_23_ch18.png)

*配图 23:配置分层图,用于把本节概念视觉化。*

<!-- codex-img-23-end -->





Codex 的所有配置都集中在一个文件里:\`~/.codex/config.toml\`\\(Windows 在对应用户目录下的 \`.codex\` 文件夹\\)。这个文件用 TOML 格式写,长得有点像 ini 配置。这一章先带你认识它的整体结构,后面几章逐项配。

**先找到/创建这个文件**。Mac/Linux:\`~/.codex/config.toml\`。如果不存在,自己建一个:

\`\`\`Bash
mkdir -p ~/.codex
touch ~/.codex/config.toml
\`\`\`

Windows\\(PowerShell\\):

\`\`\`PowerShell
mkdir $env:USERPROFILE\\.codex -ErrorAction SilentlyContinue
notepad $env:USERPROFILE\\.codex\\config.toml
\`\`\`

**TOML 语法速成\\(三分钟够用\\)**。你只要懂三种写法就能配 Codex:

- 键值对:\`model = "gpt-5-codex"\`\\(字符串用双引号,数字和 true/false 不用\\)

- 表\\(table\\),用方括号:\`[model_providers.custom]\` 表示下面这一段属于这个 provider

- 数组:\`profile_doc_fallback_filenames = ["A.md", "B.md"]\`

就这三样。一个小坑:**TOML 文件别用带 BOM 的编码或非 ASCII 的奇怪编码保存**,用 UTF\\-8\\(无 BOM\\)或纯 ASCII,否则 Codex 可能解析报错。Windows 用记事本存的时候注意编码选项。

**config\\.toml 里你最常配的几块**\\(后面分章细讲\\):

1. **默认模型和推理强度**:\`model\`、\`model_reasoning_effort\`\\(第 19 章\\)

2. **模型提供商**:\`model_provider\` 和 \`[model_providers.xxx]\`,接第三方/国内中转用\\(第 20 章\\)

3. **沙箱和审批**:\`sandbox_mode\`、\`approval_policy\`\\(第 31、32 章\\)

4. **MCP 服务器**:\`[mcp_servers.xxx]\`\\(第 41 章\\)

5. **AGENTS\\.md 相关**:\`project_doc_fallback_filenames\`、\`project_doc_max_bytes\`\\(第 38 章\\)

6. **子代理 / 技能**:\`[agents]\`、\`[[skills.config]]\`\\(第 42、43 章\\)

**一个非常重要的安全设计,现在就要知道**:并不是所有配置都能在"项目级"配置文件里改。Codex 把一些涉及凭证去向、请求路由、配置切换的 key 锁死在**用户级** \`~/.codex/config.toml\` 里,在项目级的 \`.codex/config.toml\` 里写这些 key 会被忽略并打印警告。这些被锁的 key 包括:\`openai_base_url\`、\`chatgpt_base_url\`、\`model_provider\`、\`model_providers\`、\`notify\`、\`profile\`、\`profiles\` 等。为什么这么设计?防止你打开一个不信任的项目,它在项目配置里偷偷把你的请求和凭证导去别处。所以记住:**接中转、换 provider 这类配置,只能写在用户级 config\\.toml**。第 23 章会把项目级和用户级的关系讲透。

**改完怎么生效**:改了 config\\.toml 后,重启 Codex\\(退出再 \`codex\`\\)或开新会话,新配置才加载。养成"改完必重启验证"的习惯,能省掉无数"我明明改了怎么没变"的抓狂时刻。

## 第 19 章 配置默认模型与推理强度


<!-- codex-img-24-start -->

![截图 24:第19章 - 默认模型与推理强度](codex_tutorial_images/screenshot_24_ch19.png)

*截图 24:红框标出“模型设置”,对应本节“默认模型与推理强度”的操作说明。*

![配图 24:第19章 - 模型档位图](codex_tutorial_images/generated_24_ch19.png)

*配图 24:模型档位图,用于把本节概念视觉化。*

<!-- codex-img-24-end -->





这一章教你两个最常调的参数:用哪个模型、想多深。

**model:用哪个模型**。在 config\\.toml 顶部\\(或对应 provider 下\\)写:

\`\`\`TOML
model = "gpt-5-codex"
\`\`\`

模型名要填你的账号/服务商实际支持的。走官方 ChatGPT 登录的话,通常用 GPT\\-5\\-Codex 这一系列\\(专为编程和工具调用优化的\\);版本号会更新\\(社区里见过 gpt\\-5\\.3\\-codex、gpt\\-5\\.4 之类的迭代命名\\),**以官方文档和你账号里能选到的为准**。不确定填啥,先不写这行,用默认的,或者在交互界面里看它给你哪些模型选项。

**model\\_reasoning\\_effort:推理强度**。这个参数控制模型"想多深":

\`\`\`TOML
model_reasoning_effort = "high"   # 可选 low / medium / high(具体档位以版本为准)
\`\`\`

怎么选?给你一个实用对应表:

- **low\\(低\\)**:简单、机械的任务,比如批量改文件名、加注释、格式化。要的是快和省额度,不需要它深思。

- **medium\\(中\\)**:大多数日常开发任务的默认,写功能、改 bug、补测试。平衡。

- **high\\(高\\)**:复杂任务——架构设计、读懂大型陌生项目、查难缠的 bug、做有风险的重构。让它使劲想,质量优先,慢和费额度可以接受。

我的实战习惯:config\\.toml 里默认设 medium,遇到硬骨头任务,临时通过命令行参数或会话内切到 high。**别一直挂着 high**——又慢又费额度,简单任务用 high 是浪费。

**复习一下:模型和壳是两头**。model / reasoning 调的是"模型那一头",决定它聪明到什么程度;后面的沙箱、审批调的是"壳那一头",决定它能干什么。两头分开理解,配起来不乱。

**临时覆盖**:config\\.toml 设的是默认值。某次想临时换,可以在启动时用命令行参数覆盖,或在交互界面里切换,不用每次改文件。\`codex --help\` 能看到对应的参数。一个省钱小技巧:把默认推理强度设成 medium,只在你明确感觉"这任务很难、它第一遍没做好"时才临时拉到 high,这样你大部分时间都在用更快更省的档位,只在真正需要时才花高成本,长期下来额度能省出一大截。

## 第 20 章 配置 model\\_providers 接入国内/第三方 API\\(国内核心\\)


<!-- codex-img-25-start -->

![截图 25:第20章 - model_providers 与第三方 API](codex_tutorial_images/screenshot_25_ch20.png)

*截图 25:红框标出“provider 表”,对应本节“model_providers 与第三方 API”的操作说明。*

![配图 25:第20章 - 供应商接入图](codex_tutorial_images/generated_25_ch20.png)

*配图 25:供应商接入图,用于把本节概念视觉化。*

<!-- codex-img-25-end -->





这是国内用户的核心章节,把第 10 章讲的原理落实成可抄的配置。再强调:这段配置**必须写在用户级** \`~/.codex/config.toml\`\\(项目级配不了\\)。

**完整配置模板**\\(占位值替换成你服务商给的\\):

\`\`\`TOML
# 1. 指定默认用哪个 provider 和模型
model = "gpt-5-codex"            # 改成你的服务商支持的模型名
model_provider = "custom"        # 引用下面定义的 provider,名字随便起但要一致
model_reasoning_effort = "high"  # 可选

# 2. 定义这个 provider
[model_providers.custom]
name = "custom"
base_url = "https://你的服务商地址/v1"   # 服务商给的 API 地址,注意通常以 /v1 结尾
wire_api = "responses"           # 协议类型,看服务商文档(常见 responses 或 chat)
env_key = "OPENAI_API_KEY"       # 从哪个环境变量取 Key(见下)
\`\`\`

**逐行解释**:

- \`model_provider = "custom"\`:告诉 Codex 默认用名为 custom 的那个 provider。这个名字你自己起,但要和下面 \`[model_providers.custom]\` 里的一致。

- \`base_url\`:最关键的一行,请求发到哪。从 \`api.openai.com\` 改成你服务商的地址,这就是"中转"的本质。注意结尾的 \`/v1\` 加不加要看服务商怎么要求,文档里会写。

- \`wire_api\`:用哪套接口协议。Codex 支持 \`responses\`\\(OpenAI 的 Responses API 风格\\)和 \`chat\`\\(传统 chat completions 风格\\)。**填错这个是最常见的"配了连不上"的原因之一**,务必照服务商文档填。

- \`env_key\`:Codex 去哪个环境变量里拿 API Key。这样 Key 不写死在文件里,更安全。

**提供 API Key 的两种方式**:

方式一,设环境变量\\(推荐\\)。Mac/Linux 在 \`~/.zshrc\` 或 \`~/.bashrc\` 里加:

\`\`\`Bash
export OPENAI_API_KEY="你的服务商Key"
\`\`\`

\`source\` 一下生效。Windows\\(PowerShell\\)临时设:

\`\`\`PowerShell
$env:OPENAI_API_KEY="你的服务商Key"
\`\`\`

要永久设就用系统环境变量设置界面加进去。

方式二,临时一次性用\\(适合 CI / 不污染全局\\):

\`\`\`Bash
OPENAI_API_KEY="你的Key" codex "帮我给这个项目写单元测试"
\`\`\`

这种写法 Key 只对这一条命令生效,跑完就没了,适合流水线或临时测试。

**验证配好了没**:

\`\`\`Bash
codex "用一句话介绍你自己"
\`\`\`

正常回应 = 通了。报错的话对照第 17 章坑 12、坑 13:写在用户级了吗?base\\_url 对吗?wire\\_api 对吗?model 名服务商支持吗?Key 有余额吗?逐项排查。

**关于多 provider 同时配**:Codex 允许你定义多个 provider:

\`\`\`TOML
[model_providers.providerA]
name = "providerA"
base_url = "https://A的地址/v1"
wire_api = "responses"
env_key = "PROVIDER_A_KEY"

[model_providers.providerB]
name = "providerB"
base_url = "https://B的地址/v1"
wire_api = "chat"
env_key = "PROVIDER_B_KEY"
\`\`\`

然后用 \`model_provider\` 指定默认用哪个,或者用 Profiles\\(第 22 章\\)做成几套一键切换。这对国内用户很实用——一个服务商抽风了,切到另一个顶上。

**安全和数据提醒\\(必须再说一遍\\)**:中转 = 你的代码经过第三方服务器。**别拿它处理公司涉密代码、含密钥的配置、用户隐私数据**。重要项目要么走官方账号,要么本地脱敏后再让它处理。这是底线。

## 第 21 章 配置代理与网络\\(环境变量法\\)


<!-- codex-img-26-start -->

![截图 26:第21章 - 代理与网络环境变量](codex_tutorial_images/screenshot_26_ch21.png)

*截图 26:红框标出“环境变量”,对应本节“代理与网络环境变量”的操作说明。*

![配图 26:第21章 - 代理路径图](codex_tutorial_images/generated_26_ch21.png)

*配图 26:代理路径图,用于把本节概念视觉化。*

<!-- codex-img-26-end -->





走官方账号的同学,这一章教你怎么让 Codex 正确走代理。

**最通用的办法:环境变量**。Codex\\(以及它底层的网络请求\\)会识别标准的代理环境变量。在你的 shell 配置里\\(Mac/Linux 的 \`~/.zshrc\` / \`~/.bashrc\`,WSL2 同理\\)加上:

\`\`\`Bash
export HTTPS_PROXY="http://127.0.0.1:7890"
export HTTP_PROXY="http://127.0.0.1:7890"
export ALL_PROXY="socks5://127.0.0.1:7890"
\`\`\`

把 \`7890\` 换成你本地代理软件实际监听的端口\\(每个代理软件端口不一样,去它的设置里看\\)。\`source ~/.zshrc\` 生效。Windows\\(PowerShell\\)临时设:

\`\`\`PowerShell
$env:HTTPS_PROXY="http://127.0.0.1:7890"
$env:HTTP_PROXY="http://127.0.0.1:7890"
\`\`\`

**WSL2 的特殊情况**。WSL2 是个独立的 Linux,它访问"运行在 Windows 上的代理软件"时,\`127.0.0.1\` 在 WSL2 里指的是 WSL 自己,不是 Windows。所以代理地址要填 Windows 主机在 WSL 网络里的 IP。较新的 WSL2\\(镜像网络模式 mirrored\\)下可以直接用 \`127.0.0.1\`;老的模式下要找宿主机 IP。如果你 WSL2 里设了 127\\.0\\.0\\.1 代理连不上,这八成是原因,查一下你的 WSL 网络模式。

**不要把代理 key 写进项目配置**。前面说过,\`notify\` 这类、以及涉及请求去向的 key 项目级配不了。代理通过环境变量给最干净,不涉及 config\\.toml 的安全限制。

**验证代理生效**:设完环境变量,在同一个终端窗口里跑 \`codex "你好"\`。注意必须是设了环境变量的**同一个终端**——新开的窗口如果没 source 配置,环境变量就没了。这也是很多人"明明设了代理还是不通"的原因:设在了 A 窗口,跑在了 B 窗口。

**实在搞不定网络的终极建议**:回去看第 20 章走中转 API,连国内服务器,代理问题彻底消失。我知道我说了好几遍了,但这真的是国内用户最省心的路,值得反复强调。

## 第 22 章 Profiles:多套配置一键切换


<!-- codex-img-27-start -->

![截图 27:第22章 - Profiles 多套配置切换](codex_tutorial_images/screenshot_27_ch22.png)

*截图 27:红框标出“profiles”,对应本节“Profiles 多套配置切换”的操作说明。*

![配图 27:第22章 - 配置切换图](codex_tutorial_images/generated_27_ch22.png)

*配图 27:配置切换图,用于把本节概念视觉化。*

<!-- codex-img-27-end -->





你可能有好几种工作场景:平时用官方账号 \\+ 高推理;赶进度时用某个国内中转省额度;CI 里用 API Key \\+ 低推理。每次手动改 config\\.toml 很烦。Profiles 就是解决这个的——**把不同场景存成命名的配置,启动时一键切换**。

**怎么用**。每个 profile 是一个独立的配置文件,放在 \`~/.codex/\` 下,命名为 \`profile名.config.toml\`。比如你想要一个叫 \`transit\`\\(中转\\)的 profile:

创建 \`~/.codex/transit.config.toml\`:

\`\`\`TOML
model = "gpt-5-codex"
model_provider = "custom"
[model_providers.custom]
name = "custom"
base_url = "https://你的中转地址/v1"
wire_api = "responses"
env_key = "TRANSIT_KEY"
\`\`\`

启动时指定用这个 profile:

\`\`\`Bash
codex --profile transit
\`\`\`

这样 Codex 就加载 \`transit.config.toml\` 而不是默认的 \`config.toml\`。你可以建多个:\`work.config.toml\`、\`ci.config.toml\`、\`transit.config.toml\`,分别对应不同场景,用 \`--profile 名字\` 切换。

**注意一个细节**:用 \`--profile\` 时,Codex 写配置\\(比如开关某个 feature\\)会写到对应的 \`profile名.config.toml\`,而不是默认 config。还有,\`CODEX_HOME\` 这个环境变量可以让你整体换一套 \`.codex\` 目录\\(比如给某个项目用一套完全独立的配置和凭证\\):

\`\`\`Bash
CODEX_HOME=$(pwd)/.codex codex "列出当前生效的指令来源"
\`\`\`

这招在"某个项目要用专门的自动化账号、和你个人配置完全隔离"时特别有用。

**实战建议**:个人用户一开始用不上 Profiles,一套默认配置够了。等你真的有了"官方账号 \\+ 中转 \\+ CI"多套并存的需求,再来配 Profiles,别一上来就搞复杂。

一个判断"要不要上 Profiles"的简单标准:你有没有在**频繁手动改同一个 config\\.toml**?如果你发现自己一天里要在"官方高推理"和"中转省额度"之间来回改好几次配置文件,那就是该上 Profiles 的信号了——把这两套各存一个 profile,以后 \`codex --profile work\` 和 \`codex --profile transit\` 一键切,再也不用手抖改错文件。如果你一套配置用一个月都不动,那 Profiles 对你就是多余的复杂度,跳过它一点不影响。这本书后面所有功能你都可以用这个标准衡量:**先满足需求,需求没出现就别提前给自己加负担**,这是用好任何复杂工具的通用心法。

## 第 23 章 配置文件的优先级与项目级配置


<!-- codex-img-28-start -->

![截图 28:第23章 - 配置优先级](codex_tutorial_images/screenshot_28_ch23.png)

*截图 28:红框标出“优先级”,对应本节“配置优先级”的操作说明。*

![配图 28:第23章 - 层级规则图](codex_tutorial_images/generated_28_ch23.png)

*配图 28:层级规则图,用于把本节概念视觉化。*

<!-- codex-img-28-end -->





Codex 的配置可以放好几个层级,它们之间有优先级。搞懂这个,你才不会出现"我明明配了为啥不生效"的困惑。

**配置生效的优先级\\(从高到低,高的覆盖低的\\)**,大致是这样:

1. **命令行参数**\\(临时,最高\\)——你启动时带的 \`--model\`、\`--profile\` 等,当次最优先。

2. **项目级配置**:\`.codex/config.toml\`,从项目根目录往下到你当前所在目录,**越靠近你当前目录的越优先**\\(closest wins\\),且**仅限被你信任\\(trusted\\)的项目**。

3. **Profile 文件**:\`--profile 名字\` 选中的 \`~/.codex/名字.config.toml\`。

4. **用户级配置**:\`~/.codex/config.toml\`\\(默认那套,最低\\)。

**项目级配置怎么用**。在某个项目根目录建 \`.codex/config.toml\`,可以为这个项目单独设一些配置——比如这个项目专用的沙箱策略、专属的 MCP 服务器、不同的推理强度。这样团队成员 clone 下来项目,就自动带上了项目约定的 Codex 配置。

**但项目级有两个硬限制,务必记牢**:

第一,**只有"信任的项目"才加载项目级 ****\`.codex/\`**** 配置**。你第 15 章选"信任"的那个动作,就是在决定要不要加载它的项目级配置、hooks、规则。不信任的项目,这些全跳过——这是防止恶意项目通过配置文件操纵你的 Codex。

第二,**项目级配置不能改那些涉及凭证和请求去向的 key**。前面反复说的:\`openai_base_url\`、\`chatgpt_base_url\`、\`model_provider\`、\`model_providers\`、\`notify\`、\`profile\`、\`profiles\` 这些,在项目级 \`.codex/config.toml\` 里写会被忽略并警告。这些只能在用户级配。原因还是安全:不能让一个项目偷偷把你的请求和凭证导走。

**实战中怎么用这套优先级**:

- 你的**个人通用偏好**\\(默认模型、推理强度、代理、中转 provider\\)→ 写 \`~/.codex/config.toml\`\\(用户级\\)。

- 某个**项目的专属约定**\\(这个项目用什么沙箱、接什么 MCP\\)→ 写项目里的 \`.codex/config.toml\`\\(项目级,记得信任项目\\)。

- **临时一次性的覆盖** → 命令行参数。

- **多套并存的大场景**\\(官方/中转/CI\\)→ Profiles。

这样分层,既能有个人统一偏好,又能让每个项目带自己的规矩,还不会互相打架。理解了优先级,config 这块你就彻底通了。

**一份新手可以直接抄的用户级 config\\.toml\\(走官方账号版\\)**。如果你已经 \`codex login\` 用官方账号,推荐这套最省心的起步配置:

\`\`\`TOML
# ~/.codex/config.toml —— 官方账号新手推荐起步配置
model_reasoning_effort = "medium"   # 日常默认中档,硬骨头任务临时切 high
approval_policy = "on-request"      # 让它该问就问,新手务必保持(见第 32 章)
sandbox_mode = "workspace-write"    # 只能改工作区,安全又够用(见第 31 章)

[sandbox_workspace_write]
network_access = false              # 默认不让它联网,要联网时再临时放开
\`\`\`

这套配置的逻辑是:用默认官方模型、中档推理、写操作受限在工作区、危险操作会问你、默认不联网。对刚上手的人,这是"既能干活又不容易出事"的黄金组合。等你熟了,再按第六部分逐项放宽。

**一份新手可以直接抄的用户级 config\\.toml\\(走国内中转版\\)**。如果你走第三方中转:

\`\`\`TOML
# ~/.codex/config.toml —— 国内中转起步配置
model = "gpt-5-codex"               # 改成你服务商支持的模型名
model_provider = "custom"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[model_providers.custom]
name = "custom"
base_url = "https://你的服务商地址/v1"
wire_api = "responses"              # 照服务商文档填,常见 responses / chat
env_key = "OPENAI_API_KEY"          # Key 放环境变量,别写死在这里
\`\`\`

记得在 shell 里 \`export OPENAI_API_KEY="你的Key"\`。这两份模板,你按自己走的是哪条路抄一份,改几个占位值就能跑。

**配置自检清单\\(配完对一遍\\)**。每次大改 config\\.toml 后,按这个清单自检,能挡掉绝大多数"配了不生效":

第一,**文件位置对吗**?涉及 provider、base\\_url、profile 的,必须在用户级 \`~/.codex/config.toml\`,不能在项目级。第二,**编码对吗**?UTF\\-8 无 BOM 或纯 ASCII,别用记事本默认的带 BOM 编码。第三,**引号和括号对吗**?字符串要双引号,表头是 \`[xxx]\`,provider 名上下要一致\\(\`model_provider = "custom"\` 对应 \`[model_providers.custom]\`\\)。第四,**环境变量在同一个终端里 export 了吗**?Key 和代理都靠环境变量,设在 A 窗口跑在 B 窗口是无效的。第五,**重启 Codex 了吗**?改完要退出重开或开新会话才加载。第六,**跑一句最简单的任务验证**:\`codex "用一句话介绍你自己"\`,通了再干正事。

**一个完整的排错实战流程演示**。假设你配完中转,跑任务报"连接超时",按这个顺序查,基本一查一个准:

\\(1\\)先把网络因素排除——\`codex "你好"\` 还是超时?换成 \`curl https://你的base_url地址\` 看能不能通,如果 curl 都连不上,是服务商地址写错了或服务挂了,不是 Codex 的问题。\\(2\\)curl 能通但 Codex 不行——大概率 base\\_url 末尾 \`/v1\` 加错了,或者 wire\\_api 填的协议服务商不支持,对着文档改。\\(3\\)报 401 不是超时——是 Key 问题,确认 \`echo $OPENAI_API_KEY\` 打印出来的是对的 Key、且 env\\_key 名字和 config 里一致、且 Key 还有余额。\\(4\\)报 region——走中转不该有这个错,有的话说明你的 base\\_url 其实还是指向了官方域名,检查有没有写错。这套"先 curl 探活、再分协议/Key/路由"的思路,能解决中转配置九成的连接问题。

# 第五部分:日常操作与交互——把 Codex 用顺手

## 第 24 章 交互界面 TUI 全讲解


<!-- codex-img-29-start -->

![截图 29:第24章 - TUI 交互界面](codex_tutorial_images/screenshot_29_ch24.png)

*截图 29:红框标出“TUI 区域”,对应本节“TUI 交互界面”的操作说明。*

![配图 29:第24章 - 界面结构图](codex_tutorial_images/generated_29_ch24.png)

*配图 29:界面结构图,用于把本节概念视觉化。*

<!-- codex-img-29-end -->





\`codex\` 启动后进入的那个终端界面叫 TUI\\(Terminal User Interface\\)。新手看着满屏英文容易慌,这一章把界面拆开,每个区域干嘛的讲清楚。看完你再进去就心里有数了。

TUI 大体分三块。**最上面/顶部**是状态信息区——显示当前用的模型、当前的工作目录、当前的沙箱和审批模式、登录状态这些。你随时扫一眼这里,就知道"我现在是什么配置在干活"。很多人配置改了没生效却没发现,就是因为从来不看顶部状态。

**中间**是对话/输出区——你和 Codex 的来回对话、它读了哪些文件、执行了哪条命令、命令输出了什么、改动的 diff,都滚动显示在这里。Codex 干活时这里会实时刷,你能看着它一步步推进。这是你"监工"的地方,养成扫一眼它在干什么的习惯。

**最下面**是输入区\\(composer\\)——你打字派活的地方。光标在这,你输入指令、斜杠命令、@ 引用、\\! shell 命令,都从这里发。

**几个关键的交互动作,现在记住,后面章节展开**:

- 输入 \`/\` 会弹出斜杠命令菜单\\(第 25 章\\)。

- 输入 \`@\` 会弹出工作区文件的模糊搜索,选中按 Tab 或 Enter 把文件路径塞进你的消息\\(第 26 章\\)。

- 输入 \`!\` 开头,可以直接执行一条 shell 命令\\(第 27 章\\)。

- Codex 正在干活时,按 Enter 可以**插话**\\(往当前这一轮注入新指令\\),按 Tab 可以**排队**\\(留到下一轮再执行\\)\\(第 27 章\\)。

**怎么退出**:一般是输入 \`/quit\` 或按 Ctrl\\+C\\(连按两次\\)退出会话。退出不等于丢失——Codex 会保存会话,你可以用 \`codex resume\` 续接\\(第 30 章\\)。

**一个新手常见的迷惑:它"卡住"了还是在"想"?** 当 Codex 在调模型推理、或者在跑一条耗时命令时,界面会显示一个进行中的状态\\(转圈/进度提示\\)。这不是卡死,是它在工作,尤其推理强度设 high 时会想比较久。别急着 Ctrl\\+C 打断,耐心等;真要让它停下来换个方向,用插话\\(Enter\\)比硬中断更优雅。

熟悉 TUI 没有捷径,就是多用。但记住"顶部看状态、中间看它干啥、底部派活"这个三分法,你就不会在界面里迷路了。这套界面 CLI、IDE 插件、App 大同小异,学会一个,其他入口你扫一眼就能上手。

## 第 25 章 斜杠命令大全\\(/init /review /compact /mcp /apps /skills 等\\)


<!-- codex-img-30-start -->

![截图 30:第25章 - 斜杠命令](codex_tutorial_images/screenshot_30_ch25.png)

*截图 30:红框标出“斜杠命令”,对应本节“斜杠命令”的操作说明。*

![配图 30:第25章 - 命令菜单图](codex_tutorial_images/generated_30_ch25.png)

*配图 30:命令菜单图,用于把本节概念视觉化。*

<!-- codex-img-30-end -->





斜杠命令是 Codex 的"快捷功能键",在输入区打 \`/\` 会弹出菜单。这一章把高频的几个讲透,这些是你日常用得最多的。

**/init —— 项目初始化,生成 AGENTS\\.md**。在一个项目里第一次用 Codex,强烈建议先跑 \`/init\`。它会扫描你的项目,自动生成一份 \`AGENTS.md\`\\(项目说明/规则文件,第 36 章详讲\\)。这份文件让 Codex 之后理解你的项目更准、更懂你的代码风格。**新项目第一件事:****\`/init\`**,这是个好习惯。

**/review —— 代码审查**。Codex 在审查上口碑很好,这是它的招牌功能之一。\`/review\` 让它审查代码改动,重点找安全漏洞、逻辑回归、潜在 bug。用法很灵活:可以审查你当前的改动,也可以做"PR 式审查"——针对某个基准分支\\(base 分支\\)看这次提交引入了什么问题。团队里把 \`/review\` 当"AI 一审",人再做"二审",效率高很多。

**/compact —— 压缩上下文**。前面讲过,上下文是有限资源。聊久了、读多了文件,上下文快满时,\`/compact\` 把前面冗长的对话压缩成摘要,腾出空间继续干。什么时候用?当你感觉它开始"忘事"、或者一个长任务进行到一半怕上下文不够时。这是管理长会话的关键命令。

**/mcp —— 查看 MCP 工具**。列出当前会话里通过 MCP 接进来的外部工具\\(第 40、41 章\\)。配好 MCP 后用它确认工具有没有正常加载。

**/apps —— 浏览可用连接器**。浏览可以接入的应用/连接器。

**/skills —— 查看技能**。列出当前可用的 Skills\\(技能,第 42 章\\)。Skills 是你预先封装好的工作流,用 \`/skills\` 看有哪些可调用。

**其他常见的**:\`/model\` 切换模型或推理强度;\`/clear\` 或开新会话清空当前上下文;\`/quit\` 退出。具体有哪些以你的版本为准——**在输入区打个 ****\`/\`**** 看弹出来的菜单,就是你这个版本支持的全部斜杠命令**,这比记教程靠谱,因为命令会随版本增减。

**实战中用得最多的其实就那几个**:启动新项目 \`/init\`、做审查 \`/review\`、长会话压缩 \`/compact\`、查技能 \`/skills\`。这几个吃透,日常足够。其他的用到了再现查菜单。Codex 在审查这块是公认比较强的,所以 \`/review\` 值得你专门练熟——很多团队就冲这一个功能用它。

**附:一次 ****\`/review\`**** 的完整演示**。假设你刚写完一个用户注册接口,想让 Codex 审一遍再提交。流程是这样:

第一步,确保你的改动在 git 里\\(已暂存或已提交,这样 review 有明确的对比基准\\)。第二步,在会话里输入 \`/review\`,它会让你选审查范围——是审查当前未提交的改动,还是相对某个基准分支\\(比如 main\\)审查整个特性分支。选你要的。第三步,它开始逐项分析,典型会报出这几类问题:

\`\`\`Plain Text
[安全] register 接口未对 email 做格式校验,且密码以明文存入数据库 —— 高危
[逻辑] 当用户名已存在时返回 200 而非 409,前端无法区分成功与冲突
[健壮性] 数据库插入未做异常捕获,重复主键会直接抛 500
[建议] 缺少对 register 接口的单元测试
\`\`\`

第四步,你不用全盘照单全收——AI 的审查意见也要你判断。比如"密码明文存储"这种是必须修的硬伤,"返回码语义"这种看你团队约定。你挑出真正要改的,直接让它改:"把上面前三条修了,密码用 bcrypt 哈希,其他先不动。"它改完再给你 diff。

这套"写完 → /review → 挑出真问题 → 让它修 → 审 diff"的循环,比你自己肉眼审高效得多,尤其能逮住你容易忽略的安全问题\\(明文密码、SQL 注入、未校验输入这类\\)。**很多人把 Codex 当"提交前的最后一道安检",专门跑一遍 /review 再 push**,这个习惯能挡掉大量低级但致命的 bug。需要强调的是:\`/review\` 是辅助不是替代,它的意见你要过脑子判断,真正对代码负责的还是你自己。

## 第 26 章 @ 文件引用与上下文注入


<!-- codex-img-31-start -->

![截图 31:第26章 - @ 文件引用](codex_tutorial_images/screenshot_31_ch26.png)

*截图 31:红框标出“@ 引用”,对应本节“@ 文件引用”的操作说明。*

![配图 31:第26章 - 上下文注入图](codex_tutorial_images/generated_31_ch26.png)

*配图 31:上下文注入图,用于把本节概念视觉化。*

<!-- codex-img-31-end -->





Codex 干活靠的是"它脑子里\\(上下文\\)有什么"。\`@\` 就是你**精准地把某个文件塞进它脑子**的工具。

**怎么用**。在输入区打 \`@\`,会弹出一个对工作区文件的模糊搜索框,你输几个字母,它列出匹配的文件路径,选中按 Tab 或 Enter,这个文件路径就被插进你的消息里了。然后你接着写指令。比如:

\`\`\`Plain Text
@src/auth/login.py 这个文件的登录逻辑有没有安全问题?重点看密码处理那部分
\`\`\`

这样 Codex 就明确知道你说的是哪个文件,不用猜,也不用自己满仓库找。

**为什么 @ 很重要**。不用 @ 时,你说"看看登录文件",Codex 得自己去找哪个是登录文件,可能找错、可能找一堆相关的把上下文撑爆。用 @ 直接点名,**又准又省上下文**。尤其大项目里,@ 几乎是必备习惯。

**实战技巧**:

- **一次 @ 多个文件**:涉及几个文件的任务,把相关的都 @ 进来,比如 \`@models/user.py @api/auth.py 让这两个文件的字段对齐\`。

- **@ 配合明确指令**:@ 负责"指哪个",你的话负责"干什么",两者配合。光 @ 文件不说干啥,它不知道你要它做什么。

- **别一股脑 @ 几十个文件**:上下文有限,@ 太多会撑爆,还稀释重点。只 @ 真正相关的。

**和"让它自己读"的区别**:你也可以不 @,直接说"读一下整个项目搞懂结构",让它自主探索——这适合你自己都还没搞清项目长啥样的时候。等你知道改哪个文件了,就用 @ 精准定位。**先自主探索建立全局认知,再 @ 精准动手**,这是一套很顺的节奏。掌握了 @,你会发现给 Codex 派活的精度和效率明显上一个台阶,它再也不用"猜你说的是哪个文件"了。

## 第 27 章 中途插话、排队任务、\\! 执行 shell


<!-- codex-img-32-start -->

![截图 32:第27章 - 中途插话与 ! shell](codex_tutorial_images/screenshot_32_ch27.png)

*截图 32:红框标出“插话与 shell”,对应本节“中途插话与 ! shell”的操作说明。*

![配图 32:第27章 - 交互节奏图](codex_tutorial_images/generated_32_ch27.png)

*配图 32:交互节奏图,用于把本节概念视觉化。*

<!-- codex-img-32-end -->





这一章讲三个让你和 Codex 协作更顺滑的交互技巧,都是高频但新手常不知道的。

**技巧一:中途插话\\(Codex 干活时按 Enter\\)**。Codex 正在执行一个任务,你突然发现方向不对、或者想补充一个要求,不用等它干完——直接打字按 Enter,你的新指令会被**注入到当前这一轮**。比如它正在改代码,你看出它理解偏了,马上插一句"等等,别改那个文件,我说的是另一个 config",它会接收这个纠正。这比等它干完一堆错事再返工高效太多。**学会及时插话,是和 agent 协作的核心技能**——你是监工,看到不对就喊停纠偏。

**技巧二:排队任务\\(Codex 干活时按 Tab\\)**。如果你的新指令不急、想等它干完当前的再做,按 Tab 把指令**排到下一轮**。比如它在跑测试,你先把下一步"测试过了就提交 git"排进队列,它跑完自动接着干。排队的内容可以是普通指令,也可以是斜杠命令\\(比如排一个 \`/review\`\\),还可以是 \`!\` shell 命令。

**技巧三:\\! 直接执行 shell**。在输入区以 \`!\` 开头,后面跟一条 shell 命令,Codex 会直接执行它\\(不经过模型推理\\)。比如 \`!git status\`、\`!ls -la\`、\`!npm test\`。这在你想"自己手动看一眼状态、不劳烦模型"时很方便。它和"让 Codex 去跑命令"的区别是:\`!\` 是你亲自下命令、立即执行;让 Codex 跑是它自主决定要跑什么\\(且受审批约束\\)。

**这三个技巧合起来的典型场景**:你让 Codex 重构一个模块。它开干,你看着中间区的输出。发现它要改一个你不想动的文件——按 Enter 插话纠正。它继续,你顺手 \`!git diff\` 自己瞄一眼当前改动。觉得没问题,Tab 排一个"改完跑测试并提交"。整个过程你像个指挥,它像个执行者,配合得行云流水。**很多人觉得 Codex 不好用,根子是只会"发一句等结果",不会用这套实时交互**。把这章练熟,体验立刻上一个台阶。

## 第 28 章 粘贴图片与截图驱动开发


<!-- codex-img-33-start -->

![截图 33:第28章 - 截图驱动开发](codex_tutorial_images/screenshot_33_ch28.png)

*截图 33:红框标出“截图输入”,对应本节“截图驱动开发”的操作说明。*

![配图 33:第28章 - 视觉反馈图](codex_tutorial_images/generated_33_ch28.png)

*配图 33:视觉反馈图,用于把本节概念视觉化。*

<!-- codex-img-33-end -->





Codex 能"看图"。你可以把截图、设计稿、报错截图喂给它,它读图里的内容来干活。这一章讲怎么用,以及它能干啥。

**怎么喂图**。两种方式:一是在交互界面的输入区直接**粘贴图片**\\(复制了截图后 Ctrl\\+V / Cmd\\+V\\);二是启动时在命令行**提供图片文件路径**。常见格式 PNG、JPEG 都支持。

**能干啥,几个真实场景**:

**场景一:截图报错让它修**。程序报了个错,终端或浏览器里一长串红字,你懒得敲——直接截图粘给它:"这是运行时的报错截图,帮我看看怎么修"。它读图里的错误信息,定位问题。对小白尤其友好,你不用会读报错。

**场景二:拿设计稿写界面**。你有个 UI 设计图\\(Figma 截图、手绘草图\\),粘给它:"照这个设计稿,用 HTML\\+CSS 实现这个页面布局"。它读图里的布局、配色、元素,给你生成对应代码。这是"截图驱动开发"最爽的用法之一。

**场景三:看图理解现状**。比如一张数据库表关系图、一张架构图,粘给它帮你理解,或者据此生成建表语句。

**实战提醒**:

- 图要清晰。模糊的截图它也看不清,该截全的截全\\(比如报错要把完整堆栈截进去\\)。

- 图配文字说明。光给图它不知道你要干啥,配一句"照这个实现"或"这个错怎么修"。

- 敏感信息打码。截图里如果有密钥、token、用户隐私,先打码再发,尤其你走的是中转 API\\(图也会经过第三方\\)。

截图驱动是 Codex 很被低估的能力。下次遇到"懒得描述、一张图说清"的情况,直接截图丢给它,比打半天字高效。

一个进阶玩法:**把"前后对比图"一起喂**。比如你想改一个页面样式,把"现在长这样"和"想改成这样"两张图一起粘进去,告诉它"从第一张改到第二张",它能更准地理解你的意图差异在哪。同理,排查显示异常时,把"正常时的截图"和"出问题的截图"对照着给,它定位问题更快。图像对 Codex 来说不只是"看一眼",而是可以参与推理的实打实的信息源,会用图的人能省下大量文字描述的功夫。

## 第 29 章 codex exec:非交互模式与自动化


<!-- codex-img-34-start -->

![截图 34:第29章 - codex exec 自动化](codex_tutorial_images/screenshot_34_ch29.png)

*截图 34:红框标出“exec 命令”,对应本节“codex exec 自动化”的操作说明。*

![配图 34:第29章 - 自动化流水线](codex_tutorial_images/generated_34_ch29.png)

*配图 34:自动化流水线,用于把本节概念视觉化。*

<!-- codex-img-34-end -->





前面讲的都是"交互式"——你在 TUI 里来回对话。但很多场景需要"非交互"——一条命令进去,Codex 自动干完出来,不需要人盯着。这就是 \`codex exec\`,它是自动化、脚本化、CI/CD 的基础。

**基本用法**:

\`\`\`Bash
codex exec "给这个项目所有缺测试的函数补上单元测试"
\`\`\`

和交互模式的区别:\`codex exec\` 不进 TUI,直接执行你给的任务然后结束,输出打到终端。适合写进脚本、塞进流水线。

**为什么需要它**。想象这些场景:你想每天定时让 Codex 检查一遍代码质量;你想在 CI 流水线里,每次提交自动让 Codex 审查;你想写个脚本批量处理一堆项目。这些都不可能有人坐那一个个点批准、看 TUI,必须是"一条命令自动跑完"。\`codex exec\` 就是干这个的。

**配合参数控制行为**。非交互跑,你得提前把"权限"问题解决了——总不能跑到一半停下来等批准\\(没人回应它就卡死\\)。所以 \`codex exec\` 常配合审批和沙箱参数一起用,比如指定不询问审批\\(在你充分信任、且沙箱限定了范围的前提下\\):

\`\`\`Bash
codex exec --ask-for-approval never "格式化所有 python 文件,不改逻辑"
\`\`\`

⚠️ 注意:\`--ask-for-approval never\`\\(从不询问\\)意味着它不会停下来问你,危险操作也会直接执行。**只在你非常清楚任务安全、且沙箱已经把范围锁死的情况下用**,别在没限制沙箱时无脑关审批,否则它可能干出你没预料的事。CI 场景下,正确做法是"严格限定沙箱范围 \\+ 不询问审批"配套使用,既能无人值守,又有沙箱兜底。

**配合环境变量做 CI**。CI 里通常用 API Key\\(第 9 章\\),临时传入不污染配置:

\`\`\`Bash
OPENAI_API_KEY="$CI_SECRET_KEY" codex exec --ask-for-approval never "运行 lint 并修复可自动修复的问题"
\`\`\`

**给自动化的人一句忠告**:非交互模式威力大,风险也大——因为没人盯着。上生产/重要环境前,**先在测试目录、用受限沙箱反复演练**,确认它行为可控,再放进真实流水线。自动化的第一原则是"可控",不是"省事"。

**附:一个 GitHub Actions 里跑 Codex 审查的最小示例**。让你直观感受 \`codex exec\` 怎么进流水线\\(占位,按你的实际改\\):

\`\`\`YAML
# .github/workflows/codex-review.yml
name: Codex Review
on: [pull_request]
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install -g @openai/codex
      - name: Run Codex review
        env:
          OPENAI_API_KEY: \${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec --ask-for-approval never \\
            "审查本次 PR 的改动,重点找安全漏洞和逻辑回归,把问题列成清单输出"
\`\`\`

几个要点:Key 一定放在仓库的 Secrets 里\\(\`secrets.OPENAI_API_KEY\`\\),**绝不能明文写进 yml**;CI 环境本身是临时容器、跑完即销毁,所以这里用 \`never\` 配合容器隔离是合理的;输出会留在 Actions 日志里,你也可以让它把结果写成评论发回 PR\\(需要额外脚本\\)。这只是个骨架,真正落地时你还要处理"审查结果怎么呈现给团队、要不要卡住合并"这些,第 50 章的实战案例会把团队工作流讲得更完整。先有这个印象:\`codex exec\` \\+ API Key \\+ Secrets \\+ 受限环境 = 自动化的标准配方。

## 第 30 章 codex resume:会话续接与历史


<!-- codex-img-35-start -->

![截图 35:第30章 - codex resume 会话续接](codex_tutorial_images/screenshot_35_ch30.png)

*截图 35:红框标出“resume 列表”,对应本节“codex resume 会话续接”的操作说明。*

![配图 35:第30章 - 会话时间线](codex_tutorial_images/generated_35_ch30.png)

*配图 35:会话时间线,用于把本节概念视觉化。*

<!-- codex-img-35-end -->





干活干到一半退出了、或者断网了、或者电脑要重启,之前和 Codex 的一长串对话和上下文岂不是白费?不会。\`codex resume\` 让你续上之前的会话。

**基本用法**:

\`\`\`Bash
codex resume
\`\`\`

不带参数,通常是续接你**最近的一次会话**。它会恢复之前的对话历史和上下文,你接着之前的进度往下干。

**按 ID 续接**。Codex 会给每个会话一个 ID,如果你有好几个会话想续特定的某个:

\`\`\`Bash
codex resume <会话ID>
\`\`\`

会话 ID 和历史在哪看?Codex 把会话记录存在 \`~/.codex/\` 下,具体查看方式看 \`codex resume --help\` 或 \`codex --help\`。

**fork\\(分叉\\)一个会话**。有的版本支持把一个历史会话"分叉"成一个新线程,保留原来的对话记录,在副本上继续探索不同方向——相当于"存档另开一条线"。这在你想"基于这个进度试两种不同改法"时有用。

**实战中怎么用好会话管理**:

- **长任务善用 resume**:大任务别指望一口气干完,中途想休息就退出,回头 \`codex resume\` 续上。

- **断网/崩溃的救命稻草**:网络掉了任务断了\\(国内常见\\),\`codex resume\` 续接往往能挽救,不用从头来。

- **重要会话先让它总结**:如果某次会话有很多有价值的结论,担心以后找不回,可以在退出前让它把关键结论总结成一段话,你存到项目的笔记或 AGENTS\\.md 里——这是比依赖 resume 更稳妥的"知识沉淀"。

- **开新会话 vs 续接的判断**:换了个完全不相干的新任务,就开新会话\\(干净、上下文不互相干扰\\);接着同一件事干,就 resume。别把八竿子打不着的任务堆在一个会话里,上下文会乱。

会话管理是用好 Codex 的"内功",看着不起眼,但长期重度使用时,会的人和不会的人效率差一大截。

再补一个很多人忽略的点:**会话不是越长越好,而是越聚焦越好**。有人喜欢一个会话从早开到晚,什么任务都往里塞,结果上下文越堆越乱,Codex 开始张冠李戴——它把 A 任务的上下文用到了 B 任务上。正确的姿势是"一个会话对应一件事或一组相关的事",事情干完或者换方向了,该 \`/compact\` 压缩就压缩,该开新会话就果断开新的。把会话想成"工作台":一张台子上摊太多不相干的活,你自己都找不着东西,AI 也一样。**保持会话聚焦、及时压缩、不相干就另起一张台子**,这是长期高效使用的关键习惯,比任何花哨技巧都管用。

# 第六部分:权限、沙箱与安全——别让 AI 闯祸

## 第 31 章 三种沙箱模式详解


<!-- codex-img-36-start -->

![截图 36:第31章 - 三种沙箱模式](codex_tutorial_images/screenshot_36_ch31.png)

*截图 36:红框标出“沙箱模式”,对应本节“三种沙箱模式”的操作说明。*

![配图 36:第31章 - 权限边界图](codex_tutorial_images/generated_36_ch31.png)

*配图 36:权限边界图,用于把本节概念视觉化。*

<!-- codex-img-36-end -->





沙箱是 Codex 的安全核心。因为它真的会执行命令、改文件,沙箱决定了它"能动多大范围"。这一章把三档讲透,以及怎么选。

**模式一:read\\-only\\(只读\\)**。Codex 只能读文件,不能改任何东西,也不能执行有副作用的命令。适合什么?适合你只想让它**分析、理解、审查**,完全不想它动你的代码的时候。比如读懂一个陌生项目、做纯审查、让它给改进建议\\(但不让它真改\\)。最安全,零风险。

**模式二:workspace\\-write\\(工作区可写\\)**。Codex 可以读,也可以**在你的工作区目录内**写文件、改代码、执行命令。但它动不了工作区以外的东西\\(比如系统目录、你的其他项目\\)。这是**日常开发的推荐档位**——它能干实事\\(改代码、跑测试\\),又被限制在当前项目里,出不了大乱子。本书前面给新手的推荐配置就是这一档。

workspace\\-write 还有几个细调项\\(在 config\\.toml 的 \`[sandbox_workspace_write]\` 下\\):

\`\`\`TOML
[sandbox_workspace_write]
network_access = false          # 是否允许联网,默认建议 false
exclude_slash_tmp = true        # 是否把 /tmp 排除出可写范围
exclude_tmpdir_env_var = true   # 是否把 $TMPDIR 排除出可写范围
# writable_roots = ["..."]       # 额外允许写的目录
\`\`\`

其中 \`network_access\` 最重要:默认不让它联网,需要它装依赖、拉取资源时再临时放开。为什么默认关网?因为联网意味着它能下载东西、上传东西,风险面变大,默认关上更稳。

**模式三:danger\\-full\\-access\\(完全访问\\)**。名字里带 danger 就知道了——它能干一切,读写任意位置、执行任意命令、自由联网。**除非你非常清楚自己在干什么,否则别用**。它适合的极少数场景:某些必须访问工作区外资源的复杂任务,且你在一个隔离/可丢弃的环境里\\(比如专门的容器、虚拟机\\)。在你日常的真实机器上开 full\\-access,等于把家门钥匙交给一个偶尔会犯错的助手,不值当。

**怎么设**。config\\.toml 里:

\`\`\`TOML
sandbox_mode = "workspace-write"   # read-only / workspace-write / danger-full-access
\`\`\`

或者命令行临时指定\\(看 \`codex --help\`\\)。

**选择口诀**:只想分析不想改 → read\\-only;日常开发改代码 → workspace\\-write\\(默认推荐\\);极特殊且环境隔离 → danger\\-full\\-access\\(慎用\\)。**比起 full\\-access,更推荐的做法是:保持 workspace\\-write,需要额外目录时用 ****\`--add-dir\`**** 精准授权**\\(第 33 章\\),而不是直接放开所有限制。精准授权永远比大开杀戒安全。

**三档沙箱的真实行为对照**。光看定义不直观,看它们在同一个任务下的不同表现:假设你让 Codex"分析这个项目并修复一个 bug"。

read\\-only 下:它读遍相关文件、定位到 bug、告诉你"问题在 X 文件第 Y 行,应该改成这样",但**它不会真的改**——你得自己照着改,或者切到可写模式让它改。适合你只想要诊断、不放心让它动手的时候。

workspace\\-write 下:它读文件、定位 bug、**直接动手改**,改完想跑测试验证,执行测试命令\\(可能请求批准\\),测试过了告诉你修好了。整个闭环它自己走完,但全程只在你的项目目录里活动,碰不到项目外的东西。这是绝大多数开发任务的理想状态。

danger\\-full\\-access 下:它能干上面所有事,还能在你整台机器上随便读写、自由联网。**对修这个 bug 来说,这些额外权限完全没必要**——这就是为什么日常别开它,多出来的权限对任务没帮助,只增加风险。

这个对照说明一个道理:**沙箱档位要按任务实际需要选,不是越高越好**。修个 bug 用 workspace\\-write 绰绰有余,开 full\\-access 纯属给自己埋雷。养成"这个任务到底需要多大权限"的思考习惯,你就不会动不动放开所有限制。

## 第 32 章 审批策略 \\-\\-ask\\-for\\-approval 实战


<!-- codex-img-37-start -->

![截图 37:第32章 - 审批策略](codex_tutorial_images/screenshot_37_ch32.png)

*截图 37:红框标出“审批策略”,对应本节“审批策略”的操作说明。*

![配图 37:第32章 - 审批决策图](codex_tutorial_images/generated_37_ch32.png)

*配图 37:审批决策图,用于把本节概念视觉化。*

<!-- codex-img-37-end -->





沙箱管"能动的范围",审批管"动之前要不要问你"。两者配套。这一章讲审批策略怎么调。

**审批的几档\\(\\-\\-ask\\-for\\-approval 或 config\\.toml 的 approval\\_policy\\)**,大致是:

- **untrusted**:几乎所有操作都要你批准,最谨慎。

- **on\\-request / on\\-failure**:在它判断需要时、或命令失败需要提权时才问你。日常平衡档。

- **never**:从不问,全自动。最省事,也最危险。

**新手阶段:保持"会问"**。我在前面反复强调过:刚上手时,务必让它该问就问\\(别用 never\\)。每次它要写文件、跑命令、装依赖,它停下来问,你看清楚再放行。这个过程不仅是安全,**更是学习**——你通过看它"想干什么"来理解它的行为模式,建立信任。等你用了一两周,对它的行为有谱了,再考虑放宽。

**审批时你的三个选择**。当它弹出"我要执行 XXX,批准吗",你通常能:

- **批准这一次**:看清楚没问题,放行这一条。

- **拒绝**:不对,别干。可以接着告诉它"换个做法"。

- **批准并以后别问这类**:对某类你确认安全的操作,授权它以后自动做。慎用,确认是真安全的常规操作\\(比如读文件、跑测试\\)再这么放。

**进阶:沙箱 \\+ 审批的组合策略**。这两个旋钮配合用,能调出适合不同场景的安全级别:

- **新手 / 重要项目**:workspace\\-write \\+ on\\-request\\(能干活,危险操作问你\\)。

- **纯分析 / 审查别人代码**:read\\-only \\+ 高审批\\(看都看,绝不动手\\)。

- **CI / 自动化**:严格限定沙箱 \\+ never\\(无人值守,靠沙箱兜底\\)——前提是沙箱锁死了范围。

- **隔离环境跑大任务**:容器里 full\\-access \\+ never\\(环境本身可丢弃,放开手脚\\)。

**一句话原则**:**给的自由度,要和环境的可控性匹配**。在你的真实工作机上,自由度低一点\\(会问、受限沙箱\\);在隔离的、可丢弃的环境里,才可以放开。永远别在重要的真实环境里又开 full\\-access 又关审批,那是在裸奔。

## 第 33 章 \\-\\-add\\-dir:精准授权多目录


<!-- codex-img-38-start -->

![截图 38:第33章 - --add-dir 授权目录](codex_tutorial_images/screenshot_38_ch33.png)

*截图 38:红框标出“add-dir”,对应本节“--add-dir 授权目录”的操作说明。*

![配图 38:第33章 - 目录授权图](codex_tutorial_images/generated_38_ch33.png)

*配图 38:目录授权图,用于把本节概念视觉化。*

<!-- codex-img-38-end -->





workspace\\-write 默认只让 Codex 写"当前工作区"。但有时一个任务需要它也能动工作区外的某个目录——比如改代码的同时要更新隔壁的文档仓库,或者要读写一个共享的资源目录。这时不要图省事开 full\\-access,用 \`--add-dir\` 精准加授权。

**用法**:

\`\`\`Bash
codex --add-dir /path/to/docs --add-dir /path/to/shared "把 API 变更同步更新到 docs 目录的接口文档里"
\`\`\`

\`--add-dir\` 可以重复用,加几个目录写几个。这样 Codex 的可写范围就是"当前工作区 \\+ 你额外指定的这些目录",其他地方依然动不了。

**为什么推荐 \\-\\-add\\-dir 而不是 full\\-access**。区别在于"最小授权原则":full\\-access 是"什么都能动",\\-\\-add\\-dir 是"只多给这几个明确的目录"。前者一旦它犯错,后果范围是整台机器;后者就算它犯错,也只波及你明确授权的那几个目录。**安全的精髓就是:只给完成任务所必需的最小权限,多一分都不给。** 这个原则不光用在 Codex 上,是所有涉及权限的工作的通则。

**也可以写进 config**。如果某个项目固定需要额外的可写目录,可以在 workspace\\-write 的 \`writable_roots\` 里配上,不用每次命令行带:

\`\`\`TOML
[sandbox_workspace_write]
writable_roots = ["/path/to/docs"]
\`\`\`

**实战提醒**:每次用 \\-\\-add\\-dir,心里过一遍"这个任务真的需要动这个目录吗"。需要才加,加完任务做完,下次不需要就别带。别养成"图省事一律 \\-\\-add\\-dir 一堆"的习惯,那就违背最小授权了。

## 第 34 章 安全红线:避免 AI 删库、装恶意包、泄密


<!-- codex-img-39-start -->

![截图 39:第34章 - 安全红线](codex_tutorial_images/screenshot_39_ch34.png)

*截图 39:红框标出“安全警告”,对应本节“安全红线”的操作说明。*

![配图 39:第34章 - 风险清单图](codex_tutorial_images/generated_39_ch34.png)

*配图 39:风险清单图,用于把本节概念视觉化。*

<!-- codex-img-39-end -->





这一章是"血泪教训预防针"。Codex 是 AI,会犯错;它执行的命令是真的命令,真能造成损失。把这几条红线刻进脑子。

**红线一:危险命令必须看清再放行,删除类尤其警惕**。AI 偶尔会"自信地"提议一条破坏性命令——删文件、删目录、重置 git、覆盖文件。审批弹出来时,**重点盯有没有删除、覆盖、重置类的操作**。看到 \`rm -rf\`、\`git reset --hard\`、\`> 覆盖文件\` 这类,停下来想清楚:它删的是什么?删错了能恢复吗?拿不准就拒绝,让它换个安全做法\\(比如先备份、或者用软删除\\)。**永远不要在没看清的情况下批准删除类操作。**

**红线二:警惕它装陌生依赖包**。它干活时可能提议 \`pip install\`、\`npm install\` 某个包。绝大多数是正经库,但要警惕:包名是不是和知名库很像但差一两个字母\\(这是"抢注仿冒包"的典型套路,装上可能是恶意代码\\)?这个依赖真的有必要吗?对不认识的包,审批时多瞄一眼包名,可疑就拒绝、让它说明为什么要装。

**红线三:绝不让它处理/泄露密钥和敏感数据**。你的 API Key、数据库密码、token、用户隐私数据——别让 Codex 读含这些的文件,尤其你走中转 API 时\\(数据经过第三方\\)。如果项目里有 \`.env\`、密钥配置文件,要么先脱敏,要么明确告诉它"别碰这些文件"。它的改动也别无意中把密钥写进会提交的代码里——审 diff 时留意有没有硬编码的密钥冒出来。

**红线四:重要操作前先有"后悔药"**。让 Codex 干有风险的活之前,先给自己留退路:用 git 管理代码\\(随时能回滚\\),重要文件先备份,或者干脆建个分支让它在分支上折腾\\(\`git checkout -b codex-task\`\\),搞砸了删分支就行,主干不受影响。**有了 git 和分支这两层保险,你就敢放心让它干活,因为最坏情况也能一键还原。**

**红线五:涉密/生产环境慎用,尤其慎用中转**。公司核心代码、生产数据库、含合规要求的数据,要么走官方账号\\(数据不经第三方\\),要么干脆别用 AI 处理。中转 API 再方便,也别拿它碰真正敏感的东西。这是职业底线问题,不是技术问题。

把这五条红线变成肌肉记忆:**看清删除、警惕装包、护住密钥、留好后悔药、敏感的不碰。** 做到这五条,Codex 这把"快刀"你就能用得又快又稳,不会切到自己。

## 第 35 章 团队协作中的权限治理

个人用 Codex 管好自己就行;团队用,得有规矩,否则十个人十个样,迟早出乱子。这一章讲团队怎么治理 Codex 的权限和用法。

**第一,统一沙箱和审批基线**。团队应该约定一个"默认安全基线"——比如所有人默认 workspace\\-write \\+ on\\-request,谁要放宽得有理由。可以通过项目级 \`.codex/config.toml\`\\(第 23 章\\)把项目的推荐配置随仓库分发,新人 clone 下来信任项目后就自动带上,不用口头叮嘱。

**第二,用 AGENTS\\.md 统一行为\\(第 36\\~39 章详讲\\)**。把团队的代码规范、禁区、约定写进 AGENTS\\.md 提交到仓库,所有人的 Codex 都遵守同一套规则。比如"不许引入新依赖未经评审""所有改动必须带测试""不准碰 migrations 目录"——写进去,Codex 会照办,团队风格自然统一。

**第三,凭证管理**。团队里 API Key、账号凭证是高危资产。原则:绝不进仓库\\(加进 \`.gitignore\`\\),用环境变量或公司的密钥管理服务下发,定期轮换,离职即回收。自动化/CI 用专门的服务账号和受限 Key,不要用个人账号。

**第四,自动化操作要 code review 兜底**。Codex 在 CI 里自动改的代码,不能直接合进主干,必须走和人写的代码一样的 review 流程\\(甚至更严\\)。可以让 Codex 的自动改动统一进一个分支、发 PR,由人审查后再合。AI 提效,但人对结果负责,这个不能省。

**第五,数据合规先行**。团队层面要明确:哪些项目能用 AI、能用哪种\\(官方还是中转\\)、哪些数据绝对不能喂。涉及用户隐私、商业机密、合规监管的,要有明确红线和审批流程。别让每个工程师自己拍脑袋决定,那风险不可控。

**第六,知识沉淀机制**。鼓励大家把好用的 AGENTS\\.md 写法、Skills、MCP 配置\\(后面章节讲\\)沉淀到团队共享,别各自重复造轮子。一个成熟团队用 Codex,应该是"配置即代码、规则进仓库、人人共享同一套最佳实践",而不是十个人十套野路子。

团队治理的核心思想就一句:**让 Codex 的强大能力运行在团队统一的、可控的轨道上**——统一基线、规则进仓库、凭证管好、人审兜底、合规先行、知识共享。把这套立起来,团队用 Codex 才是真正的提效,而不是引入新的混乱和风险。
